onage rights in several parish churches in the surrounding area.","The Housebook, begun in 1522, referred to the community as being in financial difficulties around that time. One of the purposes of the Housebook was to record and analyze the causes of the convent's economic difficulties and prevent future abbesses from making similar mistakes.","At the time of its dissolution, the convent possessed 429 acres of wooded areas, 6 vats(?) of wine, 10 vats of the convent's own brew(?), and 223 acres of open fields. The convent possessed a farm (Sandhof) with 425 acres of fields, and another (Rothhof) with 650 acres of fields free from tithe. The convent also possessed the (now)-deserted settlements of RingshÃ¤user with 364 acres of fields and of Weisensee near Stadtlauringen. The convent further possessed fiefs in 33 locations, including Ostheim, KÃ¶nigshofen, GroÃŸbardof, and Saal (Link, 575-576). ; In the fifteenth century, economic difficulties led to the alienation of goods from the convent. For this reason, in 1444 Bishop Gottfried von Limpurg established an administrator for the nuns, who oversaw the convent's income and expenses for ten years (Krausen, 60). Due to the efforts of Abbess Katharina Zollnerin, the convent's economic position improved.","Outside of the city, the convent held no rights and few possessions, only a few small farms and fields. Any acquisitions of the convent within the city involved the city council and overlords. ; The convent was never particularly well-off financially.","The foundation for the community was the \"Oratorium,\" which had an altar dedicated to Mary in conjunction with a chapel and garden. The chapel received income from two houses and a hospital in Goslar (RÃ¶mer-Johannsen, 262). The convent also possessed the house and farm of Provost Volkmar, four hides in Jerstedt (north-west of Goslar) and approximately eight hides of woodland in Ohlhof and half of the forest of Scherde. In 1186 a second altar was endowed with thirty stalls in the market of Goslar, which were rented out for 7 Marks yearly, in addition to eight hides (a hide =120 acres) in Ohlendorf and five and a half hides in Watenstedt (RÃ¶mer-Johannsen, 262). The letter of protection from Emperor Friedrich II on August 28, 1188 also mentions houses in a portion of Goslar known as RÃ¶merdorf, a house in the market, seven hides in StÃ¶ckhim (near WolfenbÃ¼ttel), four hides in Meimerdingerode (near Ohlendorf), in addition to property in Goslar with income from field and forest. The document also mentions a half of a mine in the silverworks in Rammelsberg (RÃ¶mer-Johannsen, 263). A document of Pope Innocent III from October 20, 1199 confirming the holdings of the convent mentions three portions of the forest in Axenberg with the neighboring smelting works, half of the forest in Camberg, and three mines in Rammelsberg. It also mentions three shares in the cobblers' shops and a house above the workshops. In addition, the convent owned seven hides in Alvesheim. In the thirteenth century, the convent expanded its land-holding, particularly through important acquisitions from 1208 to 1214 from the Benedictine monestary of S. Godehard in Hildesheim, in Alvese, Langelsheim and Bodenstein (RÃ¶mer-Johannsen, 253). In 1293 the convent was forced to hand over two of its mills to the city. The convent held property around Goslar (i.e. in Ohlhof, Jerstedt and Alvesheim) since its foundation in 1186\u002f1199, but its holdings between Liebenburg and Vienenburg developed more slowly. During the twelfth century, the convent slowly acquired acres in these areas. By 1355 the convent held 12 hides in Ohlhof, seven hides in Jerstedt, five and a half in Langelsheim, 16 hides in Alvesheim, and seven hides in Weddingen. It also acquired holdings in DÃ¶rnten (approximately 20 hides) and in Immenrode (20 hides by 1390) (RÃ¶mer-Johannsen, 264). The convent's holdings in Innerstetal were continually developed in the thirteenth century, above all through the transfer of the rights of the dukes of Wohldenberg over their vassals (RÃ¶mer-Johannsen, 265). In Klein Sehlde the convent held 2 hides in 1256\u002f58 and three in 1290; it had three hides in SÃ¶rde in 1259; in Baddeckenstedt it had three hides, three hides in Gronstede bei Steinlah and five hides in GroÃŸ Heer in 1302 (RÃ¶mer-Johannsen, 265). By 1355 the convent held 14 hides in GroÃŸ Sehlde, 14 hides in Klein Sehlde, 5 in SÃ¶rde, 9 in Baddekenstedt, and 4 hides each in Klein Elbe and GroÃŸ Heere. The convent also had substantial hodlings in the dukedom of Brunschweig; eight hides in Ohlendorf, seven in FlachstÃ¶ckheim, five and a half in Watenstedt and four in Meimerdingerode (RÃ¶mer-Johannsen, 265). In the fourteenth century the convent acquired more holdings in this area: 6 hides in GroÃŸ Mahner by 1302, 10 hides in GroÃŸ FlÃ¶theby 1309, and four hides in Lobmachtersen by 1317. To the east, the convent held six hides in Gielde, seven in Werlaburgdorf. The convent also held two hides in Achim in 1355 and nine hides in Ziesel in 1266. In the fourteenth century, the convnet preserved and expanded its holdings through purchase and exchange; it seldom sold property. In 1355 the convent held in total 235 hides of land (roughly 28,200 acres). In the fifteenth century the convent's economic growth halted and in the sixteenth century it experienced economic reverses (RÃ¶mer-Johannsen, 263). During these centuries, the convent's land acquisition halted completely. In the sixteenth century particularly the convent suffered from making forced loans to the duke of Braunschweig-WolfenbÃ¼ttel. ; Provost Johannes (1217-1251) and Bishop Konrad II of Hildesheim (1221-1246) developed the convent's economy the most. By the end of the twelfth century, the convent was so rich that it was able to build the Romanesque church still visible today. The fourteenth century was the richest period in the convent's history. (See also Contributors' Notes) ; In 1245 Bishop Konrad II of Hildesheim decreed that those who helped the convent build a water-system (plumbing) would share in the 'good works' of the convent. In 1274 and 1275 the city of Goslar was granted the right to tax the church's property. In 1304 the convent made a contribution for the support of the Holy Land. In 1366 it contributed 10 Marks silver to the diocese of Hildesheim. At this time the convent was still well-off, due to the numerous bequests for Masses and memorials from the local bourgeousie.","At the time of foundation the community probably possessed tithes, cottage tithes, and farms in the protectorship of Bienenbuettel (Urkundenbuch). The economic basis of the priory was founded on the dowries of the nuns entering the community (Riggert). The community also had numerous landholdings and holdings in the LÃ¼neburg saltworks. Among all the convents in the principality of LÃ¼neburg, Ebstorf had the largest number of saltholdings. The community held land and tithes in Bardenhagen, Bornsen, Ebstorf, Golste, Luchtmissen, Oetzfelde, Oldendorf, Tatendorf, Walmstorf, Wittenwater, Addenstorf, Bahnsen, Cote, Eddelstorf, Graulingen, and property in Abbendorf and Grieben (Urkundenbuch). The convent's possessions in these areas probably came from the founder or his son, Heinrich (Jaitner, 176). Circa 1225 the convent came into disputes with Corvey and Kemnade over six houses in Bahnsen and three in Graulingen. At the time of foundation, the convent also acquired tithes and farm land. In 1262 the convent sold a village near Eddelstorf toÂ Medingen. In 1318 the convent received the posision of Estorp bei Vinstedt, which was probably the ancestral seat of the family from Estorff (Jaitner, 175). The convent's possessions were divided between the provost and the community's holdings, as in all Benedictine convents (Urkundenbuch). In 1368 the convent received a half of the village of Hanstedt from Huner von Oedeme (Jaitner, 169). On May 25, 1372 the nephews of Huner freed the provost from the accusation-the confirmation of Duke Magnus followed on July 2- and transferred all their possessions in Hanstedt and its surroundings to the convent for 950 Marks (Jaitner, 169). Circa 1568 the provost held the largest portion of the tithes and landholdings and approximately half of the salt possessions (Urkundenbuch). In 1293 the convent acquired the tithe from Lehmke, Bohlsen and Hansen from the families from the Berge and Schulenburg. In 1300 the convent made its single biggest investment in the acquisition of the \"villam totalem Melzingen\" from the family of Meltzing for 100 Marks silver, which was composed of 15 farms and the family seat in 1568 (Urkundenbuch). There followed in 1318, two farms in Estorp; in 1324 the purchase of Barnsen for 300 Marks; 1325 three farms in Hohenbuenstorf and circa 1337 several farms in Westerweyhe and Altenebstorf (Jaitner, 177). In 1318 the convent received farms in Wessenstedt and Kirchweyhe; in 1320\u002f21 the tithes of Bargfeld and Breloh and in 1322\u002f23 several farms in Lehmke. In 1320 the convent purchased the whole villa in Linden (approximately 10 farms in 1568)for 210 Marks. In 1321 it acquired possessions in Stadorf for 335 Marks and the mill in Wittenwater for 25 Marks. The tithes from Tatendorf and Teendord were acquired for 100 Marks from Herman Klueving in 1244; from Etzen for 130 Marks from the family of Dyse in 1319; and the tithes from Bargfeld for 180 Marks from the family from the heide in 1321 (Jaitner, 178). Between 1368-1372 the convent acquired property in Oedemeschen and around Hanstedt for 1850 Marks silver. On February 14, 1368 Huner von Oedeme sold to Duke Wilhelm six farms, a half a castle, and a half a mill as well as the jurisdiction and patronage rights in the parish church in Hanstedt as well as further farms in Teendorf, Bode, Brauel, Allenbostel, Eitzen, Holthusen and Betzendorf. The duke in turn gave these to the convent in June of 1368 (Jaitner, 178). This included forest holdings and all the rights in these areas (Urkundenbuch). The community was exempt from regulations on cutting wood in Suessing in Hanstedt, Melzinger and Barnser. After 1360 the convent acquired by purchase and donation holdings in the cities of LÃ¼neburg and Uelzen, primarily consisting of rents from houses (Urkunden). From 1430-1451 the convent acquired property in MÃ¼den. In 1568 the convent held landed possessions in 66 places (40 of which belonged to the provost) (Jaitner, 177). The convent also owned mills in several locations, inluding Ebstorf, Lehmke, Eimke, Wittenwater, Stortenbuettel, Hanstedt, Barum and Hoesseringen, and Molzen (Jaitner, 179). The convent also had charge of a winery near Wessenstedt, a number of pastures, a fishery and brick-works and tile-works production, which was sold to Celle (Jaitner, 179). The convent also had extensive forest holdings, the most important of which was in SÃ¼sing. ; The community was quite wealthy. The wealth of the community is illustrated by the report that following the reform of 1469, the new abbess confiscated such quantities of gold and silver jewelry that after fashioning a portion into reliquaries so much remained that it had to be stored in a coffer (Hamburger, 119). The financial foundation of the convent rested on landed possessions, tithes and patronage-rights as well as urban possessions in the salt-works, of houses, and of rents in LÃ¼neburg and Uelzen (Jaitner, 175). The period of growth in the possessions of the convent existed from 1300-1350. In the thirteenth and fourteenth centuries the convent tried to secure and increase its economic basis. From 1293-1345 the convent was in the position to invest approximately 2440 Marks for tithes and 3060 Marks for possessions, and in 1367-1394 again approximately 180 Marks for tithes and 2850 for possessions (Jaitner, 176). After 1350 the convent experienced economic decline. ; The nuns in the principality of LÃ¼neburg were famous for their wool and silk embroidery and their textile production. It is unclear whether they received income from these productions. The convent also engaged in making loans to local families (Jaitner, 180). The convent also benefitted financially from the pilgrimages to the Ebstorf martyrs, which began during the fourteenth century (Jaitner, 187).","In 1172 Hildeswidis conveyed her personal property in Nordburstold to the convent. The convent also acquired 13 hides (hide = 120 acres) and interests in the salt works in LÃ¼neburg from the bourgeousie of Bardowikc, the cathedral chapter in Hamburg and noble gifts. Most of the convent's acquisitions of land came from the nobility, while its interests in the salt works stemmed from grants of urban residents (Reinhardt, 386). However, gifts accounted for less of the convent's holdings than purchases. It also acquired the land surrounding the chapel to S. Jacob, probably as a gift from the convent of S. Michaelis (Reinhardt, 378). In the first half of the thirteenth century the convent received property in both Dalldorf and Kalstorf as well as a little income from the salt works. No provost did more to improve the financial position of the convent than Johannes Weigergang. Between 1382 and 1405 he acquired 42 farms, five fields, wood- and fishing-rights, and income from the salt works (Reinhardt, 380). In return he sold only 10 of the convent's farms and a few small tithes and rents in the salt works. He ensured further financial stability for the community by influencing the election of his successor, his nephew Heinrich von Bodenstedt, elected by the nuns in 1412 (Reinhardt, 381). In 1369\u002f70 the convent's salt holdings encompassed 12 salt pans, 51 sections (Chor), 2 Plaustra and 2 rents. The convent was the second largest holder of salt possessions after the (male) convent of S. Michaelis in LÃ¼neburg (Reinhardt, 386). In addition to its salt holdings, the convent also owned land within the city of LÃ¼neburg. The convent acquired its first house within the city in 1271. By 1531 the convent owned six buildings within the city. Since 1391 the convent also possessed a mill in the city. The land-holdings of the convent were primarily concentrated between Ilmenau and Neetze. ; In the twelfth and early thirteenth century the convent's income was rather modest. The community's land holdings increased through personal bequests. As well as rebuilding of the convent in 1372, provost Weigergang secured the financial position of the community and acquired further privileges for the convent. By 1440 under the able leadership of provosts Johannnes Weigergang, Heinrich von Bodenstedt, and Cord van Tzerstede, the convent had achieved a level of prosperity and stability, which it would never reach again (Reinhardt, 381). ; The convent engaged in baking and brewing, which may date back to its medieval period, although definite confirmation is lacking. Reinhardt also surmises that the convent had a weaving-workshop within the cloister, although it is uncertain whether the nuns produced their tapestries for economic reasons (Reinhardt, 396). ; Circa 1389 the church in Betzendorf was incorporated into LÃ¼ne; from 1272-1536 the church in Rade was also incorporated into the convent. The chapel of S. Gangulfi was incorporated in the community from 1480-1531. The church in Adendorf was partially under the patronage of the convent from the thirteenth century. The church in Handorf was under the convent's patronage since 1282, as was the church in Thomasburg from 1361-1609. The church in Reinstrof was under the convent's patronage from 1361-1609 (Reinhardt, 392). In 1370 the provost, prioress, and convent of LÃ¼ne acquired the right of patronage over the vicary of S. Barbara in LÃ¼neburg, and since 1412 the prioress held the right to nominate the priests for the vicarage of S. Elisabeth in the S. John Church in LÃ¼neburg.","Margrave Gero I endowed the community with the city of Geronisroth, the villages of Badeborn, Greater and lesser Alsleben, Osteregeln, Westeregeln, and Groningen at its foundation. After his death, Gernrode andÂ FroseÂ inherited all his possessions and holdings. Circa 1200 the community drew up a manuscript listing all its rights of ownership, dependencies, and holdings. According to this manuscript 24 entire villages, 21 churches, and nearly 400 hides of land belonged to the communities of Gernrode andÂ Frose. Although the manuscript is a forgery (it purports to be a document issued by Margrave Gero in 964), it was accepted and strengthened by Pope Innocent III and was accepted as the truth thereafter. Although the manuscript does not record Gero's original bequest, it does reflect the communities' holdings circa 1200. At the height of their wealth, the communities ofÂ FroseÂ and Gernrode held approximately 1,000 hides of land (11,000 hectares), comprising woodland, vineyards, fish ponds, and grazing. From the thirteenth century on, the community suffered from debts, poor management by its abbesses, divisions within the chapter, the poor economic conditions of the later Middle Ages, and the aggressive territorial politics of the archbishop of Magdeburg and the bishops of Halberstadt. The community gradually lost both goods and tenants. By 1544, its possessions encompassed only Gernrode itself, 5 villages, and some abandoned fields. ; Gernrode andÂ FroseÂ were among the richest land holders in the Eastern Harz region. ; A document issued on August 5, 1352 recorded a donation of 30 Marks to the community by two of its canonesses, Agnes de Merwitz (referred to as a deaconess, decana) and Margareta de Warin (referred to as a concanonica) in order to rebuild a deserted home located close to the dormitory, which should serve as the summer dormitory. ; Tenants of the community provided yearly from one to six days of service, as well as hunting and transport services to the community. From the thirteenth century on, these service requirements could be exchanged for a monetary payment to the community. Due to the plagues and famines of the fifteenth century, Gernrode had difficulty finding people to work its land, and the abbess and chapter had to lower their expectations and demands in order to attract new tenants. Traditionally, the community demanded payments at the death of its vassals. A peasant farmer from either Alsleben or Alikendorf was required to turn over half of their property to the abbess and chapter upon death. It was traditional at the death of the man to convey the best chattel to the community, at the death of the woman, the best dress. The death taxes of the Gernrode canonesses were greater than most. In 1525 the dependents of the community revolted against an increase in fees and services, but they were not successful against Abbess Elisabeth von Weida. The abbess appointed administrators to oversee the community's agricultural land. Although little is known about the duties of these appointees, by the thirteenth century, these positions were hereditary. Members of powerful ministerial families competed for these positions. The position of advocate for the community was particularly important and lucrative, and the local nobility competed for this positon. From the twelfth century, the Askan family and the counts of Ballenstedt controlled the advocacy for Gernrode as a hereditary right. Despite attempts by the abbesses to regain control over the advocacy, they were not able to do so.","S. Felice di Vada (S. Felice de Vada) in 1257, by order of Pope Alexander IV","The buildings had belonged to the ancient community of S. Maria Valverde (S. Maria di Valverde), and were purchased from abbess of S. Marta (S. Marta) in 1386","In 1333 the community paid 25 fiorini in tax (decima).","extensive landholdings ; Very wealthy, peaking in 13th c., declining 14th - 15th c. ; banking operations","The eighth-century monastery possessed significant property holdings, including real estate in Brescia and property through the peninsula as far as the duchies of Spoleto and Benevento, and two mills located outside the Porta Bruciata. The archbishop Michele of Ravenna donated luxurious furnishings in 772. By the eleventh century, it had possession of 61 courts spread throughout northern Italy.","The convent's wealth grew due to imperial privileges and donations from the nobility. The convent was plundered during the Peasant's Revolt.","At the time of its foundation, Bishop Conrad gave the community the church in Wienhausen and all its possessions. In 1233 he bestowed fifteen fields free of tithes in Wienhausen as well as tithes in several other towns to the convent. He also granted the community a hide in Oppershausen as well as the church in Westercelle with its income. Wienhausen held tithes in the villages of Bockelskamp, Flackenhorst, Bennebostel, Bostel and Lachtehausen. Duchess Agnes acquired from the noble Hermann von Meinersen half of the right of patronage in the church at GroÃŸ Hehlen, four farms, and six cottages. She also acquired a farm in Klein Hehlen, three farms and a mill in Boye and half of all payments and tolls in HambÃ¼hren as well as farms in Wittbeck and Belson, and two farms in Garssen. Duke Otto granted the convent a saltpan in the LÃ¼neburg saltworks, four houses in Gockenholz and the income of Ottenhause, which lay west of the convent. He also gave the convent authority in the village of Nienhagen. Duchess Mathilde, the widow of Otto, continued his patronage by granting the convent toll and tax exemptions on all the goods sold in LÃ¼neburg. She also gave the convent four and a half lots of salt from the LÃ¼neburg saltworks. By 1368 the entire villages of Nienhagen, Wiedenrode and Sandlingen were incorporated in the convent's possessions. It also acquired possession in sixteen villages to the south of Wienhausen as well as seven hides in Haenigsen, Dollbergen and Ã–lerse. The convent acquired tithes in the villages northwest of Burgdorf as well as held tithes and landholdings in large numbers in Sievershausen and around Hohenhameln. ; The convent appears to have been relatively wealthy. ; The nuns may have contributed to the income of the convent by producing and selling tapestries and embroidery work. Throughout the medieval period the convents in the region of LÃ¼neburg were renown for their silk, linen, and wool embroidery. The renovations of the S. Anne's Chapel in 1510 were paid for by the sale of handwork.","The convent acquired property through gifts from the counts of Henneberg and the lords of Saueracker as well as through purchases and exchanges. The convent faced encroachments from the city of WÃ¼rzburg in 1297 after the taxes demanded from the convent by the city were rejected with reference to papal privileges. Hospital At the time of dissolution the convent's income was 390 Ducats yearly","Abbess Gerberga II ofÂ GandersheimÂ provided some of her personal property in Main as well as in Sonderhofen and Baldersheim, which had fallen to her mother, Judith of Bavaria, through a gift of Otto I. This established the foundation for the community's later property holdings (Stumpf, 228). A document from the twelfth century, falsely purporting to date to June 7, 990 and to the reign of Otto III, mentions other properties from the foundational period of the convent's history. From the earliest period the convent had possessions in Mittlingerode, FÃ¶rste, and in Osterode, Mackenrode, Gelliehausen, GÃ¶ttingen and Oldendorf near Einbeck. Besides the convent's holdings in land and pasture, it also developed the settlement of Nova Villa to the East (Stumpf, 229). The convent's possessions were increased through gifts of Emperor Otto II, who bestowed his properties from the old imperial holdings in Ambergau, north of Seesen. The previous imperial properties probably provided the foundation of the convent's landed property holdings (Stumpf, 223). The convent further acquired property in Derenburg, Utzleben and in Halberstadt, as indicated in a diploma from Heinrich II dated September 17, 1014. The convent also received gifts from the cathedral canonesses in the areas of Osterode and GÃ¶ttingen. To the east of the convent lay areas directly worked by the convent: the settlement of Nova Villa. According to Stumpf, the narrow range of the convent's property holdings and its close dependency on the imperial cathedral hindered an independent development of the convent (Stumpf, 223). The community controlled three estates or economic complexes: in the south, its possessions around Osterode; in the north, the possessions around Bornhausen\u002fSeesen; and in the east, the possessions in Derenburg (Stumpf, 229). Holding of the convent were divided between the abbesses' holdings and conventual holdings (Stumpf, 235). The economic administration of the abbess's possessions was overseen by the abbatial steward, who from the thirteenth century belonged to the conversi of the convent (Stumpf, 235). ; The convent faced economic difficulties in the late fifteenth century due to a succession of abbesses with short-terms in office and the growth of the community. Building measures placed pressure on the financial strength of the community (Stumpf, 226). Duke Heinrich the Elder (1491-1514) intended to move the convent to Brunshausen and unite both communities and their goods. The conventual buildings were to be given to the Franciscans for a new foundation. In the face of the opposition of the abbess and the cathedral chapter the plan was never implemented (Stumpf, 226). In 1563 the convent held less than 30 hides (1 hide = 120 acres) of land; in 1482 records indicate that the convent controlled over 170 hides (Stumpf, 229). S. Marien was treated as a freehold and was burdened by the raising of taxes on the land. The convent was assessed a payment of 20 Gulden in 1448 and 15 Gulden in 1476 (Stumpf, 231). ; The convent had a school for both its novices and the education of girls, who were given to the convent specifically to be educated. A balance sheet from the sixteenth century records the sale of handwork, specificallly embroidery, weaving, and knitting, as a source of income (Stumpf, 234).","The oldest verifiable documents for the history of Gandersheim are two documents of Ludwig III. These record gifts made to the community by the king and record that the community was placed under his protection. Another document records a gift of Oda, in which she grants the convent possession of her properties which she had previously loaned to King Ludwig (Heineken, 18). Counts Brun and Otto, sons of the founder, transferred the convent into the king's power; before this time they oversaw the property of the convent, although Count Liudolf had personally conferred property upon the church of Gandersheim (Heineken, 52). According to this document then, the property of Gandersheim was not alienated from the family holdings until the count's sons transferred the convent to the king's possession. On the one hand, the king protected the property of the canonesses which lay within his holdings; on the other hand, he retained control over the administration of the property over those who held its usufruct (Heineken, 53). The character of their community thus appears to have been controlled by members of the imperial family. Ludwig III bestowed a gift upon Gandersheim, and his wife, Liutgarde, maintained a close relationship with the convent (Heineken, 61). ; According to Heineken, Gandersheim was a very rich community (29). The widespread landholdings of the community enabled the abbess, when she travelled to Rome, to spend every night at one of the convent's own properties (or dependencies?) (29). According to the Saxon Annals (Annalista Saxo), Gandersheim retained only its richest properties, because Heinrich I disputed with his brothers over the property (Heineken, 51).","The original foundation for canonesses consisted of a small area in which the community held rights and possessions. This core holding comprised the village of Lamspringe (RÃ¶mer, 366). The main complex of possessions of the convent were located in the area between the Heber, Hohe Dehne and Harplage (RÃ¶mer, 355). The convent possessed 15 hides in 1149 and 1178, which were worked directly by the convent itself (RÃ¶mer, 356). The chapter of Hildesheim confirmed the bestowal of property which lay in the area of Hildesheim to the convent of Lammspringe and ceded the tithes to the convent as well (Heinken, 32). Earlier gifts from Duke Henry the Lion and Count Albrecht of Brandenburg in Banteln were confirmed in 1182 by the bishop of Minden (RÃ¶mer, 335). The convent held 1\u002f2 hide in Banteln, a hide in Bikem bei Gronau in 1178, 4 hides in Quickborn bei Eldagsen, 1 hide in Sickeroth, and 8 1\u002f2 hides in Herebergen bei Schulenburg. The convent possessed 3 and 1\u002f2 hides in Gestorp in 1178 and portions of the church in Apelern, mentioned in a grant of Duke Henry \"the lion\" and Margrave Albrecht \"the bear\" (RÃ¶mer, 360). In the thirteenth century the convent acquired several hides of land and farms in Ilde and Moteshausen in 1264 (in GroÃŸ Ilde it had 9 hides in 1149\u002f1178 and in Klein Ilde it held 14 in the same years), in WÃ¶llersheim (7 hides in 1149; 10 in 1178), in Holthusen (6 hides in 1149 and 1178), in Liermunde in 1272, 1274, in Ammenhusen in 1291, and in Brodesende 1283 (RÃ¶mer, 337). The episcopacy of Hildesheim stood behind much of Lammspringe's economic expansion in the thirteenth century. By the thirteenth to fourteenth centuries the convent's control of land in Lammspringe, Neuhof and WÃ¶llersheim was complete, only the area of Ammenhausen remained outside the control of the convent (RÃ¶mer, 356). During the thirteenth century, the convent also acquired tithes from several areas: from Rolfshagen and Hieshausen in 1285, in GroÃŸ RhÃ¼den in 1289, in Mahlum (5 hides and tithes from the entire area) in 1285 and 1295, and tithes in Hildeveshausen in 1296, Evensen (10-15 hides in 1149 and 1178)(RÃ¶mer, 337). In Wohlenhausen the convent acquired 20 hides by 1198. The convent also held possessions within the parish of Woltwiesche and in its surrounding areas, which were presumably quite ancient holdings (RÃ¶mer, 361). The convent acquired tithes and patronage rights in 1285 and 1296 in Stoery and in the church of S. Adrian. In KÃ¶nigsdahlum the convent held 37 hides in 1302 (RÃ¶mer, 361). The convent also held scattered possessions to the northwest in Gronau, Eldagsen, Springe as well as in Woltwiesche and Lafferde (RÃ¶mer, 358). By circa 1330 the period of expansion of Lammspringe's territories was complete. In the fourteenth century, there were fewer donations of money and goods and a rise in payments for the support of the nuns in connection with donations for masses and memorials (RÃ¶mer, 338-9). ; The convent was wealthy during the twelfth and thirteenth centuries, so much so that it was able to accumulate surplus wealth through the purchase of properties, such as four saltpans in Salzdetfurth in 1194, confirmed by Bishop Harbert in 1214, and six hides and 12 meadows in Honstedt in 1213 (RÃ¶mer, 335). In 1178 Bishop Adelog of Hildesheim confirmed the possessions of the convent and took the community into his protection. At that time, the possessions of Lammspringe numbered 278 hides (1 hide = 120 acres), 10 mills, tithes from 17 places, and proprietary rights in 4 parish churches (RÃ¶mer, 335). In addition, the convent began to acquire legal and political rights in the areas where it held property. Count Ludger \"von Werder\" declared in 1225 that the properties of Lammspringe within his county were free, i.e. he could not levy taxes and held no right to criminal courts\u002for scaffolds in those areas (RÃ¶mer, 336). In 1362 and 1368 two documents refer to the poverty of the convent. In 1370 some of the convent's goods were mortgaged in order to provided bread and beer for the nuns (RÃ¶mer, 340). The convent apparently faced economic difficulty in the fifteenth, as the sale of certain tithes and the relinquishment of outlying farms indicate (RÃ¶mer, 367). In 1404 eight hides of land in Neuhof and in 1406 possessions in Banteln were transferred to the chapter of the Holy Cross in Hildesheim (RÃ¶mer, 340). In 1405 the convent complained to the German king about its difficulty in providing for its nuns and members of the community due to the alienation of several villages, possessions, and tithes. It also complained that several of the cloister's buildings were old and in ruins (RÃ¶mer, 340). From 1480 on, the convent's finances improved again. In 1518 the convent re-acquired its alienated property in Neuhof (RÃ¶mer, 367). ; The convent exercised jurisdictional rights only in the villages of Lammspringe, Neuhof (Liermunde), WÃ¶llersheim, and Wohlenhausen. The convent's jurisdiction incompased laws \"commanding or forbidding\" action but not the right of criminal trials(RÃ¶mer, 364). From its first foundation, the convent also held proprietary rights over the smaller churches within its immediate district (RÃ¶mer, 368). A chapel in Neuhof is designated the \"filia\" of the conventual church in 1312, and the parish churches of Graste and GroÃŸ Ilde, north of Lammspringe, were confirmed as part of the convent's domain in 1178 (RÃ¶mer, 368). In 1331 the convent incorporated the chapel in Rolfshagen. Lammspringe acquired patronage over the churches in StÃ¶ry in 1296 and BÃ¶nnien in 1308. The convent exercised patronage rights over the church of S. Adrian in Woltwiesche presumably since its foundation; this was confirmed in 1149, 1178, 1542, and 1568 (RÃ¶mer, 369). ; The church in BÃ¶nnien was incorporated into the convent in 1308 (RÃ¶mer, 337). In 1331 the convent incorporated the chapel in Rolfshagen.","In 1234 the founders bestowed all the tithes from their joint income, to which were added later gifts of gold and other goods. The initial provision for the convent consisted of 1000 Marks silver; property in Wolframshausen, which gave the convent yearly 23 pigs, 90 hens, 14 schillings pennies, and portions of grain, corn, and wheat(?); farms and goods in Iphausen, Fugstadt, LÃ¶ffelsterz, Steinarch, Wieden, Sulzthal, Aschach, Stangenrod, Wolbach and other villages (Link, 586). The convent continued to prosper through gifts from the Counts of Henneberg and the Bishop of WÃ¼rzburg as well as through purchases of land. In 1287 the bishop of WÃ¼rzburg confirmed the grant of 10 acres of fields, which Berthold of Rothenkolben granted the convent upon the entrance of his daughter Gertrudis (Link, 586). In 1339 Fritz of Rothenkolben and his wife, Zacharia, gave their daughter Adelheid, a nun in the convent, a portion of grain from their property in Hollstadt; after her death, this portion should fall to their other daughter, Hille, another nun within the community. After the death of both the portion came into the possession of the convent (Link, 587). In 1284 Albert of Oberfeld granted his daughter, Kunigunde, a nun in the convent, a stipend from his property in Machtolshausen with a yearly income of 10 schillings denarius and a portion of corn. In the same year, the knight, Bolenand of Herbelstadt (Herbstadt) made an agreement with Abbess Hedwig for his burial and the transfer of his horse and weapons to the convent upon his death. If his heirs wished the same privilege they had to pay 6 Marks silver, and if he should die elsewhere and not be able to be buried in the convent, his wife, Sophie and his son, Rudolph, should grant the convent a portion in Hagenau. If he died without his horse, the convent should receive a farm in Hagenau in lieu of the horse or a payment of 3 Marks (!) (Link, 587). The convent experienced economic difficulties in 1434 and 1459.","In 1271 the convent received the church properties of Herlheim, which Bishop Berthold confirmed in 1286 due to the small income of the convent (Krausen, 71). ; The covent was never very wealthy. It repeatedly had to sell or alienate its properties and goods due to economic need. Hospital","The nuns ran a school for girls.","According to Link, in the Middle Ages this convent was one of the richest foundations in Bavaria.","The convent's foundation was never very rich. Documents refer to sales of property by the convent due to its economic difficulties. In 1279 and in 1291 documents record the sale of rights and property in KÃ¼rnach.","The increasing expansion of the convent's possessions encouraged the leasing of goods in place of the original self-sufficient state of the convent and led eventually to disputes (Krausen, 55).","In 1292 upon their entrance the sisters Margareta and Elisabet of Widder brought 200 pounds (Heller). Their sister Juta had joined the community previously. The three sisters were to receive three pounds Denarius yearly for their support (Link, 580). A local city-dweller, Heinrich Wender, and his wife, Petrissa, gave the convent 6 acres of vineyards. Their daughter, Berlindis, was a member of the community and retained the right of usufruct in this property for her lifetime. Agnes SchÃ¼rger and her daughter, Bertha, (who were members of the convent) received four and a half acres of vineyard in 1334. In 1359 Margareta, wife of Konrad of Lindwurm, granted the convent a variety of goods from their farm in Urfeld, including amounts of corn, wheat, oil, and hens, with the provision that her sister and daughter, who were members of the community, would have the use of these goods as well for the rest of their lives (Link, 581). According to Link, the convent came to possess large farms. Most of the convent's rents and properties were acquired through purchase. In 1324 Hohenloh, the wife of Heinrich, granted the convent goods from their\u002fher(?) property in Bleichfeld and Effeltrecht. ; The convent's wealth was augmented by bequests and donations of property from the women themselves.","The foundation comprised ecclesiastical land as well as land from the properties of the Knight Luppold in Gross Escherde. In 1203 the convent acquired additional land-holdings, a farm in Wennerde bei Sarstedt and another in Grasdorf near Hannover. In 1212 the convent was enriched through the acquisition of the tithes in Bovingehusen; these tithes played an important role in the subsequent history of the convent (Faust, 194). The convent received tithes from the following communities: Bovingehusen (1212), Eddinghausen and Oddingehusen (1241), Achem (1259), Betheln (1301), and Barfelde (1305). In subsequent years the convent acquired tithes from more distant locations: Eberholzen (1240), Gross Escherde (1268), and HÃ¶nze (1299). The tithes from Barfelde went for the support of a hospital and the tithes went for the clothes of the nuns (Faust, 205). In a document from 1219 Bishop Siegfreid I confirmed that the brothers Volkmar and Ludolf von Ysissem sold their property in Wennerde to the convent. The document of transfer from 1236 displays the development of the covent's possessions through gifts and perhaps the dowries of entering nuns. In the middle of the thirteenth century the convent acquired land-holdings in Oddingehusen, Achem and Betheln; later it acquired holdings in Gronau and in Rheden. In 1296 Knight Dietrich von Escherde gave the convent a farm and 10 acres of land in Gross Escherde. According to calculations from the documents, it is estimated that in the fourteenth century the convent held 300 acres in Bovingehusen, Oddingehusen, Eddinghausen, Achem, Betheln and Barfelde. It also possessed 250 acres in the more distant areas of Gross Escherde, Eberholzen, Rheden, Brueggen and Wallenstedt (Faust, 206). In 1324 the convent held vassals in Eddinghausen. All farmers in Betheln were required to pay tithes in produce and meat to the convent beginning in 1301 and lasting until 1811 (Faust, 206). The convent benefitted from an improved economic climate in the fourteenth century. However, many feuds towards the end of the fourteenth century brought the convent to a poverty level, as they did for the community ofÂ Lammspringe. In 1369 the convent had to sell 120 acres of land. Other sales of land followed in the fourteenth century. In 1427 the convent's burdens were lessened by the dissolution of some of the convent's responsibilities through the payment of a one-time sum (Faust, 195). The convent also relied on possession of lime for its financial upkeep (Faust, 195). ; The convent was supported through tithes and land acquisitions, some of which came from the dowries of women who entered the convent (see notable members). ; The parish church of Gross Escherde was later incorporated into the convent of Escherde.","The founder and his family gave the convent a more solid economic basis through numerous grants of rights. The abbesses of SchÃ¶nau had jurisdictional rights within SchÃ¶nau, Reichenbach and Seifriedsburg as well as held rights of patronage in Wiesenfel (until 1304) and WolfmÃ¼nster (until 1348). During the sixteenth century the convent suffered economic difficulties. In 1509 the abbot of Ebrach established an administrator over the convent's properties and in 1514 he tried to reestablish claustration. In 1525 the nuns fled from the Peasant Uprising into WÃ¼rzburg (Krausen, 88). ; The purchase sum for S. Kilian's church was 140 Marks, according to Link (Link, 584).","Very Wealthy","The economic foundation of the convent lay in three portions: the hereditary property and the rights of the nobles of Buxtehude, the hereditary property of Floria, and the income from the parish church of Buxtehude, which was incorporated into the convent at the time of foundation. At the time of foundation, the charter records that the nobles,Gerlach and Heinrich, bestowed on the convent the property from the farms and land from the church of S. Peter to the old buildings of S. Mary. It is unclear whether these two churches became part of the cloister-complex; Kappelhoff contends that the church of S. Peter definitely did not become a church for the convent, as no records of altars or chapels dedicated to the saint exist in the conventual records (Kappelhoff, 136). He also believe that the buildings of S. Mary refer to buildings which were no longer used as a church. The nobles also conveyed to water-mills into the possession of the convent (Kappelhoff, 148). The convent also recieved all the cultivated and uncultivated land on the east bank of the Este river from Buxtehude to the north \"up to the people of Holland\" (Kappelhoff, 148). The nobles also gave the community possessions in Zesterbach in modern Borstel and three hides of land on the Este River. The convent received tithes from these areas as well. From the property of Floria the convent recieved four hides and a quarter-hide on the Este. The property of the parish church in Buxtehude encompassed 49 and a half hides in Eilendorf, Immenbeck, Ardesdorf, Villenhusen, Pippensen, Hollenstedt, Eversen, Grauen, Sproetze, Hosterem, Walesdorpe, Tostedt, Ottensen, Rahmsdorf, Wulmsdorf, Drestedt, Ludelmesdorpe, Trintlo, Eckhorst, Oersdorf, Stelle, Adelmesdorpe, Oldendorf and Goldbeck (Kappelhoff, 148). It also included tithes from eight farms in Villenhusen and Immenbeck. During the fourteenth century the convent expanded its possessions (both in tithes and land) in a methodical way. ; Initially, the convent seems to have been well-endowed (see assets\u002fproperty below). The convent faced economic difficulties because of the foundation of the new city of Buxtehude by Archbishop Giselbert of Bremen circa 1285. The archbishop took portions of the convent property and placed the convent under his power of excommunication (Kappelhoff, 137). The convent suffered damages in a conflict between the dukes of LÃ¼neburg and Duke Albrecht of Saxony; a document of March 1, 1287 records the damages done to the convent, primarily due to the nearness of the city and the loss of income from tithes, taxes and tolls. The use of the moors and fields were returned to the convent (Kappelhoff, 138). The convent also recieved a portion of its land back. Damages were repaid by 250 Mark of Stade pennies. The proximity of the new town infringed upon the ability of the convent to develop economically. Despite the proximity of the town, the convent prospered during the fourteenth century. In fact, the convent appears to have been able to rebuild itself after damage incurred during the 1420s without recourse to any loans (Kappelhoff, 149). However, under Provost Johannes Glasewerth the convent again suffered economic difficulties that led to the provost's resignation and the election of Hienrich Brunow. By his death in 1476, the convent was again in better economic circumstances. ; The convent also engaged in the provision of rents to farmers from deposits of credit (loaning activities?). ; The convent incorporated the parish of modern EstebrÃ¼gge in 1388. This was confirmed in 1389 by Pope Urban VI.","Johannes Schulte provided the initial endowment for the community from his own residence. The convent also received a portion of moorland in 1274. The convent retained these possessions even after it was transferred to Bredenbeck in 1286. In 1302 the convent sold its income from salt in LÃ¼neburg and acquired a farm in Grauen (Bohmbach, 449). The convent held patronage rights in Neukirchen (since 1286) and Bliedersdorf (before 1570-1638). The first detailed documentation of the convent's holdings comes from an inventory of 1335. According to this document, the convent had acquired through gifts houses in Mekkelsen and Holwede; a farm in Twielenfleth; land in RÃ¼bke, Huttfleth, HamelwÃ¶rden, and Wisch; a salt rent in LÃ¼neburg; and the new church in Lu with land and a farm in Nottensdorf (Bohmbach, 453). The convent also acquired tithes in Sittensen, Daghestorp, Grundoldendorf, Hardestorp, Hedendorf, Wulmstorf, Sotrumm, Vierden, and Frankop, which totaled approximately 2000 Marks. The convent held land and farms in Meckelsen, Holwede, Geldbeck, Emmen, hardestorp, Hedendorf, EstebrÃ¼gge, Leswig, RÃ¼bke, Frankop, Jork, Neuenkirchen, Huttfleth, Hollern, Wethe, Assel, and Oldenbetenen, amounting to 1200 Marks. The convent's holdings, which totaled more than 3000 Marks since 1300, were concentrated in the land and city of Geest, primarily south-east of the LÃ¼he river. The convent also held numerous rights in the saltworks in LÃ¼neburg. In the mid-fourteenth century, the convent received further donations from the city council of LÃ¼neburg (Bohmbach, 453). The community's assets and property remained much the same after 1350 despite the occurrence of sales and gifts. In 1363 the convent acquired a farm in Wisch with 44 hides. In 1385 Marquard of Zesterfleth gave the convent his house and farm near the mill in Buxtehude; in 1391 the convent sold this for 230 Marks to the city council of Buxtehude. Particularly important among the convent's possessions were its portion of the forest in Buxtehude. The rights of both Buxtehude convents were frequently threatened by the citizens of Horneburg (see litigations). The fifteenth century witnessed increased donations to the convent by the citizens of Hamburg; in 1445 the city council established a book to record entries of donations to the convent. From 1445-1460 the convent received an income from rent of 6.067 1\u002f2 Marks. The donations and income coming from Hamburg are likely a result of the convent's role in educating and caring for the daughters of wealthy Hamburg families. The fifteenth century, however, also witnessed a drastic decline in the convent's income, evidenced by the nuns' begging at the biannual markets in Stade and the 1465 decree that new entrants must receive a pension of 3-4 Marks that would fall to the convent upon their death (Bohmbach, 454). (See relative wealth) An income register of 1479 indicates that the convent held only the tithes in Bliedersdorf, Wulmstorf, Nienkop, and Neuenkirchen; property and assets in Hedendorf, Nottensdorf, Daghestorp, Wiersdorf, Sittensen, Vierden, Kehdingen, and Hollern, Steinkirchen, Mittelnkirchen, Jork, Borstel, EstebrÃ¼gge, and Nienkop had been given up or sold. ; The first systematic compilation of the community's holdings was made in 1335 and seems to indicate that the convent had substantial wealth. The convent appears to reflect a positive economic development throughout the fourteenth century. In the fifteenth century, the community experienced some economic decline. In 1454 Clau Tamme, from the city of Stade, granted a yearly annuity to the convent of 5 Marks, so that the nuns living there no longer had to beg at the biannual markets in Stade. Such a grant appears to indicate the difficult economic position of the community at that time. Likewise, sometime before Septermber 1465, Bishop Johann of Verden decreed that on account of the number of nuns and the poverty of the community no more nuns might be accepted into the community without an annuity of 3-4 Marks, which would fall to the convent upon their death. The convent had clearly exceeded the bounds of its economic means. In 1473 the Bishop also declared that the convent could not join the Bursfeld reform due to its limited economic means; the convent was so poor it had only one cooking pot (Bohmbach, 450). In 1495 the convent appealed to the mayor of LÃ¼neburg, Cord Lange, for aid, due to its financial difficulties. The same year the convent received aid from the city council (Bohmbach, 451). In 1499 the convent was destroyed and the nuns were forced to reside in the residences of citizens of Buxtehude. The convent was able to be rebuilt due primarily to the support of LÃ¼neburg. The destruction and rebuilding presumably left the convent in great poverty. A now-lost income register for 1600-1608 recorded the convent's income at about 1600 Marks at that time; half of its fourteenth-century income (Bohmbach, 455). ; The convent was known for its education of daughters of the Hamburg patriciate. In 1445 the mayor and city council created a special book to enter all the grants of annuities to the convent, and in the second half of the fifteenth century the convent received considerable sums. ; The church in Bliedersdorf was incorporated into the convent's holdings sometime prior to 1570. In 1573 the parish complained to the provost of Neukloster, who cared for the church's goods, that he was neglecting to care for the building and the regular performance of services on Sundays and Feastdays (Bohmbach, 451).","The convent purchased a farm and mill in Badersleben fromÂ HuysburgÂ in 1479 to prevent its relocation and founded the convent of Marienbeke there.","The doucment of Heinrich II of 1004 referring to the time of the community' first foundation by Frederun and Imma provides only the names of villages where the convent had property: in the diocese of Minden it held property in Kemnade, Heyen, BÃ¶rry, TÃ¼ndern and Ohr; in the diocese of Paderborn it held property in Forst on the Weser river; and in the diocese of Hildesheim in \"Rothe in Wikanavelde,\" an undetermined location (RÃ¶mer, 311). The convent also held possessions in the northern diocese of Verden and Bremen. At the main farm of the convent in Wichmannsburg the convent possessed 29 hides of land which it loaned out, 12 hides \"de indominicata terra\" and three houses as well as 20 villages (RÃ¶mer, 311). Almost all of the property once held by the earlier community had been given out as fiefs or become inheritable property by the time the convent was reestablished as a Benedictine priory; the convent thus relied on gifts and purchase to establish its income once again. From 1194 onwards the community possessed only Kemnade completely and retained considerable properties in Heyen and Rene (RÃ¶mer, 317). In the thirteenth century the convent strived to re-acquire property that had been loaned or alienated. Since 1206\u002f1216 the convent's holdings tended to come from the holdings of nobles in primarily three areas: the nobles from Kemnade, from Bishoperode, and from Osterrode, which the convent purchased from the time of Provost Konrad von Homburg. The convent purchased or acquired the land-holdings of the nobles, primarily the Homburgs, within the region of Kemnade. By 1305\u002f9 no more noble holdings existed within Kemnade (RÃ¶mer, 317). In 1219 Abbot Hugo of Corvey conveyed these holdings to the convent; the holdings had been held by the lords of Homburg as fiefs and had once belonged to Corvey itself (RÃ¶mer, 302). In 1298 the convent leased the large farm in Heyen from its Homburg lord, in return for the payment of a third of the fruits of the property (RÃ¶mer, 317). In the thirteenth and fourteenth centuries the convent sold and exchanged its alienated properties. The convent did retain its rents in the saltworks of LÃ¼neburg (1306) as well as the rents from Salzhemmendorf (1339) and from Hammeln(1365). In 1333 the convent purchased a property in Scharnebeck from the convent Scharnebeck. Likewise in 1333Â MedingenÂ purchased control over income from Geesthacht and S. Dionys from Kemnade (RÃ¶mer, 312). In the fourteenth century the convent's property shrank to the areas surrounding the Weser River. In the course of the sixteenth century, the convent came to control almost completely the district of Kemnade, as the local nobility repeatedly conveyed their land in this area to the convent (RÃ¶mer, 312). To the right of the Weser in the district of Wickensen, the possessions of the convent were the most extensive. In the village of Heyen, the convent must have possessed over half of the fields (RÃ¶mer, 313). The convent had further possessions in the villages of Daspe (1243: one hide; 1309: 2 hides); Kreipke (before 1400: 1\u002f2 a hide); Linse (1226: possessions\u002festates); Uppendorf bei Dohnsen (1410: 2 hides exchanged with some in Halle). In 1309 the convent acquired a farm with two hides in Grave, and in DÃ¶lme the convent acquired one hide from Corvey (RÃ¶mer, 313). The convent also acquired properties from the sovereignty of the dukedom of Calenburg and the community received tithes from the city of Bodenwerder. In Pegestorf, south of Bodenwerder, documents record the receipt of a hide in 1283, 1284, and 1295 (RÃ¶mer, 313). The convent also held land in Esperde, BÃ¶rry, Latferde (4-41\u002f2 hides from a gift of Luckhardis von Homburg), in Grohnde and in Snesle (4 hides and a farm). ; In the fifteenth century the convent's rights became more restricted.","On February 16, 1399,Â S. MariaÂ asked for union with the nuns of S. Magno, Amelia, because of war and poverty. The pope gave jurisdiction over S. Maria to S. Magno as both were under the jurisdiction of S. Paolo of Rome. On July 30, 1426, there was a complaint that the structures had collapsed. Bishop Filippo Venturelle proposed that the pope transfer the nuns to Amelia, reserving for them the income of the community in Canale. Martin V issued a bull to this effect. In 1428, however, not every nun was at S. Magno. Some transferred toÂ S. Stefano.","The convent possessed 10 acres of vinyard in Randersacker. In 1226 Archbishop Siegfried gave the nuns 12 acres of pasture in the Mark and 2 acres of vinyards in Bischberg. ; The convent's wealth grew from numerous gifts of property from the founding family and the surrounding nobility.","The foundation began with a rich endowment, but encountered financial difficulties during the Succession War of 1504.","The convent held property in the village of Pulnriuth (Pollenried). ; Economic difficulties between 1347-1370 led the community to alienate some of its property and publically beg for alms (Krausen, 80).","In the eighteenth century the convent had the responsibility of providing an elementary education for girls.","The convent was founded upon property in Wolperg, which included a mill. The founders also bestowed the village of Eichelsbach, with its rich income, upon the convent as well as three and a half farms in Schippach (Link, 591). In 1236 the archbishop Siegfried of Mainz granted the convent the parish of Erlenbach with all its income and the rights of possession. Within a few years the convent received almost all the tithes from KloÃŸenhausen and Mechenhard and held lower jurisdictional rights in the villages of Hedebach and GroÃŸheubach (Link, 591).","In 1192, the monastery posessed Gnevreto, Monte Acuto Bergamasco, Capeili Lanata, Bremide, Valle Frasinetto Guariente, Ceila Verzenetti,a mill on the Caron, and rights to fish in Tesino ; Quite Wealthy","The house wasa endowed with revenues and privileges that called for her subjection to the pope. Patronage was reserved for the nuns of five ecclesiastical benefices: S. Mishele in monte, S. Michele di Mortana, S. Martino, S. Damiano in Zerbo, and S. Michele in Romano.","Petrissa von RÃ¶llbach contributed in 1285 a mill in RÃ¶llbach and two acres of vinyard in Heidebach (GroÃŸheubach) to the community. Her sister Mechthild granted three acres of vinyard to the community. Petrissa retained the rents from these properties and all her other donation for the duration of her life.","The convent's property and wealth suffered due to military campaigns in the region in the late fifteenth and early sixteenth centuries. The chronicle from this house recounts how the sisters hid property from the soldiers by placing it under the benches in the refectory and standing before them in order to cover the hidden items with their cloaks.","The economic basis of the community was land holdings and rents. It was supported by the neighboring nobles and bourgeoise of the cities of LÃ¼neburg, LÃ¼beck, Verden, and Neustadt am RÃ¼benberge (Riggert). ; The financial situation of the convent appears sufficient until the end of the second half of the fifteenth century.","The basis for the foundation of the community came from the noblewoman, Liutgart and from the archbishops of Hamburg and Bremen, who granted the community properties that had been bestowed on their bishoprics by Charlemagene and Louis the Pious. Unfortunately, no early documents reveal the extent of the community's property. The first mention of the economic history of the convent stems from thirteenth-century documents. The principal holding of the community was a farm in Bassum with about 200 fields. A building inventory from 1583 described this property as an outlying estate with horsestalls and pig styes as well as a bake house and brew house (Asch, 51). The convent also had a water mill nearby. The convent also held other hides which were worked by serfs. In 1321 the serfs were burdened so greatly that they were unable to help with the restoration of the cloister and the abbess had to sell their additional properties in BettingbÃ¼hren. The properties were divided into main farms with dependent fields worked by serfs and outlying properties. Most of the properties appear to have been located within the parish of Bassum. One outlying complex lay in Apelstedt and included forest rights (Asch, 52). In 1211 Count Moritz of Oldenburg sold his farm in Nienstedt to the convent with hides and houses in various neighboring villages as part of the entrance of his daughter into the convent. In 1403 the convent alienated its property in GadesbÃ¼nden to the dukes of Klencke for life; the need for help from Duke Henry of Braunschweig and LÃ¼neburg in 1503 ensured resulted in the convent's permanent loss of this holding (Asch, 52). In 1295 Count Hildebold of Oldenburg mortgaged to the convent several farms in Ochtum, Lowe, and Gr. Henstedt. The convent agreed to perform masses and vigils for his soul in return. This may also have served as remuneration for his daughter, who dwelt in the convent (Asch, 52). The community held the rights of patronage over the parish in Bassum, but this appears to have been the only one. After the Reformation, Bassum held lower jurisdictional rights in certain areas, although it is unclear whether its jurisdictional rights existed in the medieval period as well (Asch, 55). Quite early on, perhaps in the thirteenth century, the abbess's property was separated from the conventual property, although it is unclear when the abbess began to occupy her own house (Asch, 56-7). ; The convent appears to have been quite well endowed. From the thirteenth century, documents reflect numerous and generous gifts of landed property, rights of advocacy, tithes, tolls, hides, and houses from the neighboring high and low nobility, particularly the counts of Oldenburg. The convent relied on its agricultural holdings, worked by serfs, as well as tithes. From 1270 on documents refer to financial problems, gifts, and grants of indulgences, which likely stem from the costs of the construction of a new church in the thirteenth century. ; The primary activity of the women in Bassum was their liturgical duties, but they also undertook the education of daughters of the surrounding nobility. As in many other female houses, the women of Bassum engaged in handiwork, but none of the embroidered clothes remain. According to Asch, the women spun, wove, and dyed their own clothes. The convent also had an infirmary, which Asch believes was open to more than just the women of the community (Asch, 56). ; In 1376 Abbess Gisela asked for clarification over the rights of her subjects, which she placed in three social categories: serfs, additional subjects, and those belonging to the convent (Dienstleuten (denstlude), Sonderleuten (sunderlude), and Gotteshausleuten (godeshuseslude)). The judgement returned was that the additional subjectes (Sonderleuten) were less free than those belonging to the convent (Gotteshausleuten). After their death, they must give half of their goods to their overlord (the convent) versus the \"Gotteshausleuten,\" who were required only to turn over their best piece of clothing or best cow. Serfs (Dienstleuten) were responsible for performing certain services to the convent. (Asch, 54).","Two ministers of the church in Bremen, the brothers Gerward and Wendeler bestowed a property in Redingstede, and one later in Utbremen by Bremen, on the convent for the salvation of their souls. The convent exchanged this property for tithes in Bergedorf (Hofmeister, 62). It is unclear from which family these two brothers stemmed and whether they were involved in the initial foundation of the community (Hofmeister, 62). ; There is little information concerning the economic status of Bergedorf. Hofmeister believes the convent was poor.","Had land & pasture","numerous assets","Herford was an imperial convent and doubtless grew rich from the gifts of Louis the Pious and his successors (Lobbedey, 335). The convent received many rich gifts, for which the intercession of the convent (on behalf of the patrons) was taken for granted (Heineken, 75).","received many donations and made many purchases, including olive groves, fields, and rights over certain rivers. In 1220, the monastery had a house in Guazzolo, an island in the Po, the Castel S. Pietro with all its attendant rights, and the \"camp\" [country?] of Olivero, among its may other posessions. ; very rich","The house owns land in Morghengo and Sizzano in addition to their Cavalmadio holdings ; Very rich","With the foundation of the convent in 1219, the nobles of Diepholz granted the convent their possessions and rights in and around the village of Minden. The convent then purchased (rights?) in the villages of Honstede, Dalem, Krempel, and rights to tithes in Wenekenbutle (Schulze, 437). By 1280 the provost of the convent had at his disposal taxes from the villages of HolÃŸel, Esingstedt and Sorthum. With the convent's transfer to Altenwalde in 1282 came new acquisitions in the villages of Northum and Walle. The convent grew in land possessions and tithes from Gudendorf, Oxstedt, Berensch, Arensch, Holte and Spangen (Schulze, 437). When the convent was transferred to Wolde, the chapels of the Holy Cross and S. Willehad were placed at the disposal of the convent. These chapels served as pilgrimage sites. The convent also received a third of the income from the parish church. The convent owned a mill in Neuenwalde. The convent acquired goods and tithes from the holdings of the knights of Bederkesa and their vassals and also purchased other lands. In 1389 the convent acquired the rights to construct a brickworks from the knights of Elm (Schulze, 432). ; Following disputes between the nobles and peasantry in this area over rights to fields and woods, the convent grew more impoverished. The charter of transfer stated that the nuns suffered from poverty in 1282. The convent's transfer to Altenwalde and connection to the pilgrimage church of the Holy Cross undoubtedly was intended to place the convent in a better financial position (Schulze, 437). The convent's transfer to Neuenwalde circa 1334 appears to have been economically profitable, and the fourteenth century probably was the most profitable in the convent's history. At this time the convent's possessions and rights reached southwards towards Sievern, Wehden, Spaden and Lehe. The convent acquired goods and tithes from the holdings of the knights of Bederkesa and their vassals. However, in 1428, when Archbishop Nikolaus of Bremen issued another privilege for the convent, the nuns were again described as poor. According to Schulze, it appears as if during the fifteenth century, the convent was systematically \"robbed\" of its possessions and dependents (Schulze, 432). In 1499\u002f1500 all the convent buildings were destroyed and burned. ; In the late fourteenth and fifteenth centuries, the convent may have provided loans for the peasantry in return for regular rents, but records of definite possessions are lacking from this period (Schulze, 438).","Had lands, vinyards and properties, not only in Acqui, but also in surrounding areas. ; Quite rich","Had lands, houses & servants ; Very wealthy","In 1646, the monastery acquired the property \"tre re.\" ; Not very wealthy in the beginning, but acquired more territory later.","The community formerly held property in the city of Nierstein.","Records of a number of property sales in the late 13th c. ; S. Maria bought the rights to S. Stefano di Sezze in 1469. Because of problems in Tagliolo with theft, S. Stefano became the main monastery, and the order moved to Sezze (seeÂ S. Maria di Banno), at which time the Tagliolo house was taken over by monks from Genova. In 1473, the name of the combined house is changed to S. Stefano di Sezze (Sezado). In 1486, S. Maria united with S. Brigida of Genova, and the nuns return to Sezze ten years later. Finally, in 1511, S. Maria was transferred to S. Elena di Genova.","In order to provide a better existence for the nuns of the community and to relieve them from \"pressing need,\" Pope Clement VI incorporatd the parish church at Malsch on November 21, 1345. The ius patronatus of the parish church belonged to the abbey, with all income and appurtenances. (McDonnell, 93).","Records show that the monastery had many lands vinyards and houses ; Wealthy ; de Gesu, in the 18th c.","Very wealthy, received a lot of donations","1445: S. Maria Maddelena (SeeÂ S. Maria Maddalena); 1441: S. Martino (#S. Martino); 1304: S. Tommaso (#S. Tommaso)","In 1217\u002f1224 the Duke of Tecklenburger gave the convent three farms, followed by four more farms in 1230 and three tithes. In 1298 the convent acquired a larger possession for the price of 325 Marks. At the beginning of the fourteenth century the convent tried to sell their more distant properties. The convent's possessions near Bremen were sold toÂ Heiligenrode. Other properties were exchanged with the lords of Pente. A third of the convent's taxed property lay around the area of Essen. The convent also held land in Epe and BÃ¼hren (Schuler, 409). ; The convent's economic activities included the possession of mills and the production of wool cloth (Schuler, 409). In 1522 improvements were made to the mill on the Hase river.","The foundation was richly endowed.","This was once a wealthy and sizeable convent.","The convent went into decline during the sixteenth century.","The community held lands. ; The attraction of many women from the high nobility with rich dowries made the convent quite wealthy.","The convent chronicle describes the house as poor, unendowed, and small.","Very wealthy. At one point [date not included], the monastery had total revenues of 41,786 Lire, but only 21,000 Lire in expenses. ; San Andrea (see #S. Andrea)","Endowed by its founders with property in Caramagna and several courts, churches and other monasteries (see \"dependent communities,\" above), the latter of which brought their own lands, mills and fisheries into the coffers of S. Maria. ; Very Wealthy ; S. Michele della Chiusa, in 1207, per Innocent III","Had lands and vinyards in the vicinity of Torino. By the 12th century, the monastery was owed a \"census\" from a number of people, and sometimes tithes as well.","very wealthy: 20,000 (lire?) income in 1797, with expenses of only 4,567 (not including maintenance of nuns) ; S. Antonio (seeÂ S. Antonio) in 1725.","Original community in Tiani became property of the Canons of S. EulÃ lia del Camp (Barcelona) when the canonesses moved (needs verification). ; S. Magdalena i S. Margarita de Castellbisbal,Â S. Joan de l'ErmÂ (1438).","Priory of Benvello (seeÂ Benvello) in the Liurgian mountains was incorporated in 1188 by order of Boniface, bishop of Alba","Land, vinyards, fosheries, forests and meadows at Rifreddo, Revello, Giombasca. Boucht S. Ilario from Caramagna in 1224. The house's lands were apparently well-managed, and produced a good deal of revenue.","The initial endowment for the convent came from the patrimony of the deceased Godfrey, Adelheid's brother. References in the vita indicate that the remaining wealth of her parents also came to Adelheid after their deaths. Adelheid used some of the lands for the convent, but she also used others to make charitable donations to the poor (see charitable work). Some of the property of the sisters who entered the community went to the abey, although as canonesses they could also retain this wealth and use lay personnel to administer it for them. ; Vilich's lands and the appeal of the cult of Adelheid brought in enough wealth for the small community to carry out the wishes of the founders throughout several centuries of the convent's existence. The rebuilding of the twelfth and thirteenth centuries (Vilich IV) put the convent's finances in a precarious state. The convent was 'rescued' by the Archbishop of Cologne in return for his control of its affairs henceforth. ; The abbey ran a school for girls. Bertha records that Abbess Adelheid was much concerned with education and visisted the convent school frequently to teach and examine the young scholars. She was also interested in the liturgical life of the convent. ; Canons were initially attached to the abbey and officiated at Mass.","In 1186 the nunnery records gifts of lands from Archbishop Phillip of Heinsberg.","Donations to this community were encouraged by the letters of indulgence issued by a group of archbishops and bishops and by Archbishop Siegfried of Westerburg.","The Cologne chroniclers record an uprising in 1492 , presumably because of forced labo","The convent held approximately 300 meters of fields in the parish of Rommerskirchen. The community held possessions in Stommeln (a farm and church with tithes) as well as farms in Genen, Ollesheim, Junkersdorf, Langel, Sintheren, Palmersdorf, Heddersdorf, and Rhense.","The chapter possessed several immunities, and in the thirteenth century it held no less than 6 free farms. Since the community's foundation, it appears to have held possessions near the city of Bonn. Other possessions of the chapter lay around the areas of Godesberg, Kirspenich, Hangelar near Kalkar, Winterswick near Rheinberg, and Sotzheim. The chapter had the right to obtain wood in the location of Kottenforst, in return for which it was obliged to give each of the two foresters a candle of a pound of wax at Candlemas. The chapter's possession were not small, yet its financial situation seems to have never been terribly good (see above). ; According to a reference from Archbishop Friedrich II from 1158, the community \"flowered abundantly in possessions\" (amplissimis quondam floreret possessionibus), but suffered from the unfavorable situation of his day. According to the archbishop, the community's farms in Effern and Fischenich were fallen into ruin and the workers there were no longer able to pay the small fee of 10 denarii. Abbess Adelheid therefore reduced the payment to 2 denarii. The abbess also provided 1 mark from her own income for the establishment of their buildings. Likewise, a reference from 1360 indicated that the community's financial condition was still not very favorable. In this year the nuns from Stoppenberg complained that income owed to them by the chapter of S. Maria im Kapitol had not been paid for 3 years. ; In the thirteenth century, the community was active in leasing out houses within the city of Cologne. A document from 1227 arranged the lease of a house near the dormitory for 3 shillings and 6 denarii; another from 1233 leased a house for 2 shillings; and a third documented the lease of a house near the fishmarket for 3 marks yearly in 1248.","Stein calls this community one of the best endowed convents of Cologne.","The testament of Adela lists the following possessions as gifts to the convent: the villa Palatiolum with its inhabitants, the villa Scriptinas in the region of the Maas, the villas Botbergis and Beslanc in the Gillgau, (both of which were located at a distance from the convent) and miscellaneous possessions in the villas Anchiriacum (Enkirch), Ursiacum (Uerzig) and Caimitas (Kaimt\u002fSpei) on the Mosel River, in the villa Regnemosehi in Bitgau, in the villa Bedelingis in Bitgau and in the villa Machariaco in Bitgau (Heyen, 29). The villas Botbergis and Beslanc in the Gillgau, were presumably part of an inheritance which Adela recieved from her father (Heyen, 40). Apart from the goods in Scriptinas, Anchiriaco, Ursiaco and Caimitas, all the possession had been acquired by the convent previously. Circa 988\u002f993 Bishop Egbert added three vinyards and 19 manses to the possessions at Anchiriaco (Enkirch). After the dissolution of the convent, this property was at least partially loaned out until 1071, when Archbishop Udo restored it to the community (Heyen, 41). At Uerzig the community held a farm and vinyards, as well as tithes from the vinyards. The villa called \"Palatiolum\" is assumed to refer to possessions in the area of Pfalzel. According to Heyen, the term villa could have referred to a village or to a settlement or an economic area which encompassed possessions in several settlements. Heyen believes that the convent did not hold many rights within the area of Pfalzel itself (37). The nuns held vinyards in the areas of Uerzig, Enkirch, and Kaimt-Spei, possibly also in Machern-Wehlen. From the villa Elesa at Enkirch the convent owned a farm, which it rented out in 1291 in return for 10 portions of corn, 5 pounds, 10 chickens, and 1 portion of oatmeal (at this time it was a male community) (Heyen, 48). They also had possessions in Badelingen on the Sauer River and in an area known as Regnemoseht, which has not yet been clearly identified. They held more distant possessions on the Maas and in Gillgau. They also recieved possessions in the region of Walsdorf-Rockeskyll-Stadtfeld, perhaps from a gift given by Irmina, the mother of Adela, at the foundation of the convent sometime towards the end of the seventh century (Heyen, 55). The convent acquired possessions in Nonnweiler, Hinzert, Kesten-Minheim on the Mosel, Ittel, and Britten, perhaps in the mid-ninth century. Land-holdings in Britten, Nonnweiler, and Hinzert can, according to Heyen, did belong to the female community. He believes that the property in these areas was donated to the community by Bishop Hetti (814-847) when two sisters of his, namby the Abess Warentrud and Hulindis, lived at Pfalzel (Heyen, 51). Circa 910 the noble Gottfried gave the convent twelve manses in Dockendorf. At this time, his grandaughter Ratsindis was abbess at the convent. Perhaps in the tenth century, the convent acquired its possessions in Alf and S. Aldegund and a farm in Cond by Cochem. The convent also acquired rights in Ittel. In 988 Abbess Ruothild bestowed on the convent possessions in Ingendorf by Bitburg, which included overlordship over nine families, a total of 35 people (Heyen, 47). During her abbecy, the Archbishop Egbert gave Pfalzel the villa Ehlenz, possessions in Seffern and vinyards in Enkirch. The convent's rights to raw materials and goods in the area of Pfalzel are only known from documents in the fifteenth and sixteenth century (Heyen, 30). Heyen believes the convent held few rights in Pfalzel itself. ; According to Heyen, the material provisions made for the convent were not overwhelmingly large, but were quite sufficient for a small female cloister.","A document of Archbishop Egilbert from 1084\u002f85 records that Archbishop Eberhard along with the Countess Adelheid established a precarium which removed two villas, Corricha and Machera, from the convent of Ã–ren with the promise of a better exchange (Heyen, 45). The convent had possessions in Badenborn (west Ittel) and Orenhofen (east Ittel). According to the convent's tradition, these two properties came from Dagobert and Irmina respectively (Heyen, 58).","A hospital run by the nuns at Nonneseter Abbey was first documented in 1411. It seems probable that this was the forerunner of St. Jørgen's Hospital (Sankt Jørgens Hospital) which was later associated with the research and treatment of leprosy by Daniel Cornelius Danielssen.[","The community was granted a papal confirmation in 1147 in a bull, Desiderium quod, which lists le Tart's site, five granges, more than fifteen other properties and its Cistercian tithe privileges (Berman, 828).","The priory was founded on land granted by Milo, count of Bar. The bishop of Langres confirmed tithes from two villages to Jully in 1126-1136. Other charters of circa 1130 confirm rents, tithes, and other properties given to the nuns at Jully (Berman, 826). Another charter records a conveyance of tithes given to the community of nuns by Humbelina, sister of Bernard of Clairvaux, when she entered Jully in 1133. In 1128 Aanolz, widow of Walter of la Roche, gave Jully a rent of 10 livres when she entered the community. Andrew of Baldimento granted the nuns a rent of 40 solidi over a villa, paid annually at the feast of Saint Remy (Berman, 827).","May have temporarily accepted some Briggitines fromÂ SyonÂ in 1539. Needs verification.","Chasse royale, foret","Extremely wealthy throughout Middle Ages","145 ; Previously a secular hospital ; Gallia christiana, vol. 3, p. 449 and instr.90-91 ; Augustinian","It is not known what properties the house possessed before 985, as the community's archive was destroyed in al-Mansur's raid. To remedy this situation, a judgement regarding the community's rightful properties was rendered in 991. It appears that this new judgement redounded to the community's benefit, leaving them with considerably greater holdings than they had previously had. According to McMillin, in addition to land-holdings, the convent's endowment included mills, ovens, urban buildings, and at least one market (McMillin, 202). In 1201 Ermessenda joined the community as a nuns, bringing with her a country house with land inherited from her father and 460 sous (McMillin, 207). In 1100 Arbert Bernat and his wife, Ermendgarda, donated four vineyards and their daughter, Ermessenda, to the convent. Bernat Guadalguadi and his wife Adalaide donated a farm and their daughter Sicardi in 1
