107 (McMillin, 208). The richest donation on behalf of a woman entering Sant Pere occurred in 1262 when Bernat MatarÃ³ and his wife Maria gave their daughter Elicsenda with her paternal and maternal inheritances, 6 vineyards, a piece of land, and 200 morabatins (McMillin, 209). In 1227 Guillem Rosanes donated 3 tracts of land to the community. Pere and Gullema Vilafrancha donated a mansum and one day's income per week from a mill on behalf of their daughter, Arsenda. Ferrera and Pere de Vilafranca gave the monastery 8 pieces of land along with annual rents of money and grain in 1216. In 1247 Ferrer de Vilafranca donated to the convent an annual gift of 10 quarts of grain from a mill, when a third Vilafrancha daughter entered the convent (McMillin, 210).","Extremely wealthy.","Benefactors established at least 5 chapels in the 13th century. Assets included many urban properties, land, houses, and rents, as well as suburban and rural lands. ; One of the wealthiest of all Cistercian nunneries in Europe, with individual private incomes in addition to communal property. Founded outside the 12th-century city walls, Saint-Antoine was by the late Middle Ages a major property owner in a thriving commercial district.","Includes possessions in the plains of Alt EmpordÃ , comprising 27 manses, 40 houses, an olive-oil press and a grain mill.","Siblings Bernat & Geralda, of the castle of Portella, erected the chapel in 1231. ; Prosperous. ; Incorporated nuns fromÂ S. Maria de BoveraÂ in 1237, at the order of Pope Gregory IX.","After buying several juristictions from King Pere III in 1380, the community's territories included the districts of Vallbona, Llorenc, Rocallaura, Vilamanyar, Montesquiu, Eixaders, Preixana, La Quadra de Masdeu, Valerna, Els Obells de Na Gaia, and Rocafort. ; Extremely wealthy","Prosperous.","Rapidly became prosperous, attracting large numbers of daughters of the Catalan nobility. Patrimony included the villages of AlfarrÃ s and AndanÃ­. Nuns also ran a school for daughters of the nobility.","In the 760's, the fourth abbess Segeburh was granted remission of a toll due on the Minster's ships.","The community's assets included a church in Norwich and land holdings in the vicinity of Norwich that were very marshy, forcing the original nuns to leave. Throughout the 14th century the administration of Crabhouse assets was good. In 1438 the grain ran short. At the time of suppression, the priory's bell and lead was valued at Â£40 4s. and the priory's goods were worth Â£15 5s. 8d.","The hospital owned a chapter house and had land holdings. The assets were valued to be worth about 65 pounds per year from the early part of the 15th to the 16th centuries. Sisters had stipends that were often late and rents were overdue.","Its assets included land holding and a chapter house acquired between 1261-1361. It also exercised jurisdictional authority. In 1381 peasants from Wroxham seized documents. The assets of the community were valued as worth more than 69 pounds per year in 1291; more than 64 pounds per year in 1535. Valombrosian: 145 pounds in 1535. ; The prioress of Carrow was exempt from municipal jurisdiction as she held exclusive rights over her lands inside and outside Norwich. Her jurisdiction allowed her to probate wills and maintain a gallows. Carrow also had the right to hold a four day fair on the vigil, day, and two days following the Nativity of the Virgin (Religious Women in Medieval East Anglia: History and Archaeology c. 1100-1540., 27-8).","The commuity had rural land holdings, three chapter houses in 1291 and 3 and a half in 1316. In 1291 the community had 44 pounds a year. In 1347 they were in poverty and paying no taxes to Edward III. By 1535 they were taking in more than 42 pounds per year. In 1537 it was valued at 123 pounds and had 79 pounds of debt. ; Blackborough also had a fair.","The community held all Bury property in Norwich, both Norfolk & Suffolk, and a chapter house in Norfolk. The community assets were evaluated to be more than 72 pounds in 1291. In 1535 the comunity had about 50 pounds per year, less outlays. There was a decline in revenues after 1349 following a flood. Oliva sets the value of the convent's income at 40 pounds at the time of dissolution (Religious Women in Medieval East Anglia: History and Archaeology c. 1100-1540., 93).","Assets included land holdings, the manor of the founder, several chapter houses (6 by 1416) and burial rights after 1251. It had a water and a fulling mill. In 1291 Marlham Abbey was considered poor and made exempt from paying tithes. In 1535 it had about 42 pounds a year. In 1535 it was valued at about 38 pounds with some small debts.","The community assets included land holdings, a chapter house, shops in London before 1216, a weekly market, and a yearly fair. It also held jurisdiction over tenants in royal court. In 1291 the community assets were valued at more than 207 pounds. It was especially rich in land holding prior to the flood in 1392. By 1535 the assets were estimated to be about 138 pounds per year.","Hospital","The community has land holdings and a chapter house with seven chantries during the period from the 13th to the 15th centuries. Its endowments increased steadily during the 14th century. In 1291 the community's assets were valued at more than 107 pounds per year. The chapter house is worth forty pounds. By 1535 the community's assets are set at more than 182 pounds plus thirty five pounds from Ufford chantry. ; Campsey's aristocratic patronage made it the wealthiest house in the diocese, and the one which drew the greatest number of women from the upper ranks of society (Religious Women in Medieval East Anglia: History and Archaeology c. 1100-1540., 59). ; An inventory taken at the time of dissolution lists a bakehouse and brewhouse (Religious Women in Medieval East Anglia: History and Archaeology c. 1100-1540., 33). Although the convent had fishponds, these did not provide enough fish for the internal uses of the convent. A thirteenth-century cellaress's account indicates that the nuns routinely purchased large quantities of fish (Religious Women in Medieval East Anglia: History and Archaeology c. 1100-1540., 34).","Flixton was founded with the properties of Flixton manor and the advowson of the parish church (Religious Women in Medieval East Anglia: History and Archaeology c. 1100-1540., 24). In 1292 Flixton's assets were a manor and church at Flixton plus another church. The convent also owned a water mill. Circa 1350 the community also owned 2 chapter houses. By 1411 they had been privileged to acquire 10 pounds worth of property. In 1291 gross income was about 44 pounds. About 1292 the community assets were valued at more than 43 pounds per year. They declined after 1348 to nearly half their previous value at about 23 pounds. When the community was terminated in 1535 the value of their inventory was placed at 20 pounds. Knowles and Hadcock claim that at 1535 the net income was over 23 pounds (228).","In 1291 the value of the hospital was Â£10.","In addition to the founder's dowery, the comunity had benefices, land holdings rents, and a chapter house. They also held other small plots of land, and a mill. In 1535 their assests were valued at 61 pounds and in 1536 at 60 pounds.","Emma of Redlingfield gave her foundation the manor of Redlingfield and the local parish church (Gilchrist\u002fOliva, 24). The community's assets were mostly in land holdings at Redlingfield. Since the time of its foundation it also held a chapter house. It acquired additional land in 1381 and again in 1383. In 1535 one of its assets is an organ. The land holdings, rents, and tithes yielded more than 14 shillings per year in 1343. By 1535 the community collected about 81 pounds per year and all assets were valued to be about 180 pounds. ; Inventories taken at the Dissolution list a bakehouse and brewhouse (Religious Women in Medieval East Anglia: History and Archaeology c. 1100-1540., 33).","The property that these four religious women rented from St. Augustine's was valued at four pounds. They paid St Augustine's 2s and 1 packload of flour as rent (Domesday Book: a survey of the counties of England, vol. 1, fo 12rb).","Robert, abbot of St. Augustine gave certain tithes to Agnes, prioress of S. Sexburga in 1186 and 1188: the Church of Middleton in Bobing parish that produced 10 shillings worth of rent and the tithes of Westlonde which produced 14 shillings worth of income. There was a condition placed on the tithes of the MIddleton church. The \"housekeepers\" of the land belonging to the church were obligated to go to the chruch without any men on feast days (Dugdale's Monasticon Volume 2, 49-51).","Mostly landed wealth from Touraine ; Despite early modern complaints about poverty and dependency on the cathedral, this was a large and wealthy nunnery, richly endowed from the start.","Incorporated the female members ofÂ S. MarÃ­a de PiascaÂ when that community ceased to be a double monastery and became exclusively male (c. 1075-1079).","The nuns, who lived within 50 yards of Swaffham Lode wharf, were apparently involved in the ship-borne commerce that passed through Swaffham on the way to ports like London and Amsterdam. The accounts of the 15th century prioress Margaret Ratliff show commodities bought from such ships.","According toÂ Domesday Book: a survey of the counties of England, Chatteris held property at Foxton, Burwell, Barrington, Shepreth, Orwell and Over in Cambridgeshire ; Chatteris was one of the poorer communities of religious women in England.","See Hodilred Charter, for grants by Hodilred, possibly kinsman, to Ethelberga of Beddanhaam and \"terram quae appellatur Ricingahaam Budinhamm Deccanhaam Angenlabeshaam et campo in silua quae dicitur uidmundes felt.\" Charter lists specific boundaries, q.v. Barking held more than 100 hides of land in Essex, along with estates in Bedfordshire, Buckinghamshire, Middlesex, and Surrey (Veiled Women, 33). ; Barking was the third richest monastery in England in 1066 (The Wealth, Patronage, and Connections of Women's Houses in Late Anglo-Saxon England,161-164).","The original endowment granted 10 acres and the site for a mill. Subsequesnt grants by the founding family and others meant that the nunnery came to hold land in 11 different counties (Women Religious: The Founding of English Nunneries After the Norman Conquest, 190).","The community incorporated the hospital at Castle Hadingham. Further research is necessary to verify this incorporation.","According to a history of the abbey written by John Flete in the 15th century, Abbot Herbert granted the site of the new community as well as some lands and rents. Later abbots confirmed his grants and continued to supply allowences of food to the women (Women Religious: The Founding of English Nunneries After the Norman Conquest, 63).","The grant of Maredudd bestowed on the abbey the whole vill of Llanllugan and Talhalun as well as other lands(Williams, 1975, 157). The nunnery held lands in Hudan Fawr, 8 holdings in Cownwy, and Cwm Baw, Fron-haulog and Hafod-selwr (Castell Caereinion) as well as 2 acres near Court Calmore, Montgomery. The account of the crown receiver, David ap Llewelyn ap John, for the first year after the dissolution of the house lists the tenents, rents and assets of the community. The community held tenants by lease and at will of [the vill of] Ehudan plus a water mill and fulling mill at Ehudan. It received rents of tenants at will and by deed in the vill of Llanllugan, in the lordship of Kodewe, which included tithes of wool, sheep, lambs and corn. The community also received rents from the tenants in the vill of Conway. It leased lands in Montgomery and received rent of diverse tithes from the rectory of Llanllugan. The rectory of Llanfair brought the community rent of tithes of corn and other profits. The nunnery also drew from the parish of Llanfair 140 bushels of oatmeal, valued at 7 pounds, according to the return in the Valor Ecclesiasticus. The income of the community was judged at 24 pounds, 4 shillings and 4 pence at dissolution. The community also had a grange at Ehudan near Castell Caereinion. In 1546 the property was \"particularised\" for a grant to Sir Arthur Darcy of the site of the abbey with 2 acres of meadow land, 1 clause of arable, the rectory of Llanllygan with its tithes, and 2 tenements with appurtenances for 4 pounds, 3 shillings and no pence. ; It was very small and poor; the community was only modestly endowed.","It held numerous manors in Sixhgills, Ludford, Legsby, etc. and a market. In 1254 the income from spiritualities amounted to as much as 66 pounds; temporalities to as much as 100 pounds; by 1300 as much as an additional 75 pounds. ; The community was quite rich.","The community owned land at Stixwould, Honington, Barkston, and Bassingthorpe. In 1291 the assets were valued at 117 pounds, and in 1534 revenue was 114 pounds. Lucy granted all her land in Stixwould, Thorp and Honington to the nuns (Women Religious: The Founding of English Nunneries After the Norman Conquest, 169).","In 1291 the community assets were valued at 69 pounds.","In 1353-4Â WothorpeÂ was united to Stamford.","According to the Gesta Abbatum, the abbot Geoffrey endowed the community at Markyate with buildings, and when fire destroyed them, this settlement was sufficiently generous to provide for the community for a second time (Women Religious: The Founding of English Nunneries After the Norman Conquest, 57).","The comunity's assets were about 10 pounds annually. ; Gokewell was so poor members had to rely on relatives for clothing.","In 1291 the community was excused temporarily from taxes.","Assets included mills, crofts, etcetera inside Tathwell, Legbouren, and Hallington. The comunity was valued at less than 200 annually. In 1291 it was thought to be worth only about 20 pounds.","Richard de Lestre granted the nuns land and allowed them to have 3 oxen, 10 cows, and 200 sheep in his pasture.","The community owned 120 acres in Torksey. Fosse was very poor.","The comunity's assets were valued at 49 pounds, 5 shillings, and 2 pence at dissolution (1535).","The community assets included land at Cotton, Swallow, Keelby and Great Limber. They also owned mills and a pasture. In 1291 it was valued between 35-60 pounds.","The original endowment of the nunnery came from lands in Hardingstone which had been granted to S. Andrews (Women Religious: The Founding of English Nunneries After the Norman Conquest, 90).","It held granges in Alvingham, Corkerington, Grainthorpe, Keddington, etcetera. In 1254 the income recieved from spiritualities amounted to more than 56 pounds, and the income from temporalities amounted to more than 53 pounds. In 1291 the income from temporalities amounted to more than 81 pounds.","There is a considerable decline in income after 1348 because of depopulation in the parishes. In 1254 the income from spiritualities approximated 100 pounds and the income from temporalities amounted to 96 pounds. In 1291 the income from temporalities amounted to 111 pounds. ; In 1189 Bullington incorporatedÂ Tunstall Double Monastery.","They were considered poor in 1254. It held spiritualities amounting to about 20 pounds and temporalities amounting to 30 pounds. In 1291 the income from temporalities was under 34 pounds. It held lands in Bilingey and Walcot (Dugdale). ; One of the poorest Gilbertine houses.","The community owned mills, granges, and pasture for sheep that produced 15 sacks of wool annually. In 1254 it had income from spiritualities amounting to 40 pounds and from temporalities amounting to 101 pounds. In 1291 its income from temporalities amounted to 119 pounds. ; It took the site originally granted to Cistercian men by episcopy of Lincoln.","It owned 7 or 8 granges. In 1254 the income from spiritualities approximated 46 pounds, and the income from temporalities was around [under?] 100 pounds. ; In 1189 it incorporated the hermitage of Spaldingholm inside Yorkshire.","The assets of the nuns were indistinguishable from those of the canons, but Sempringham owned very rich pasture lands and did the little necessary cultivation itself. They also owned numerous villas. In 1254 the income from spiritualities amounted to 170 pounds and the income from temporalities amounted to more than 196 pounds, and then considerable difference by 1348 and thereafter. ; While the community had more than adequate means, it was not wealthy when one considers the number of its inhabitants. ; While the administration of the house was in the hands of 4 male proctors, the treasury was administered by the nuns, who kept it within their buildings. The treasury was presided over by three mature nuns, each who carried their own separate key.","In the 14th century, it held the church at Easebourn with dependencies and land holding on the Isle of Thorney, Dorset. It received a few donations, a chapter house worth 27 pounds, temporalities worth 41 pounds in 1291. In 1350 the community was poor and accumulated great debt in 1451.","The community had land holdings, manors in Sussex given by the founder, and a chapter house.","The community owned property in town and in the vicinity of the antique Franciscan male monastery, Clarisse, site des Castle, after 1285.","Under abbess Leofeva, the nun's church at reading held eight hides of land valued at 9 pounds (Domesday Book: a survey of the counties of England, I, fo 58ra).","The community's assets were mainly in land holdings. They had 6 carucates of land in Monkton and half a carucate in Kirk Hammerton.","Owned property at Basedale and Nunthorpe. In 1291 assets were valued at only 5 pounds, the poorest house in Taxatio of 1291. In 1535, annual income was 20 pounds, 1 shilling, 4 pence, according to Suppression Commission (PRO, SP 5\u002f2\u002f15-23). ; There were lay brothers recorded in 1197-1239.","Land holdings, a park, a mill, etc. in Kirkby Moorside. Keldholme also owned pastures in Ravenswykeet. The comunities assets were too low to be included in the 1291 Taxation roll.","The community was quite rich.","In 1267 members of the house exceeded its means, so the community was without assets.","All assets totalled 13 pounds, 5 shillings and 4 pence at dissolution (1535).","In 1267 the community had exceeded its means and no longer accepted new members.","In 1397 the community has 50 acres of land.","The community owned the site and land inside Thorp Arch. In York more than 23 pounds in pension from church of Ryther.","Messuage and 24 acres of land; Pickering in Lancaster[?] In 1291 assets were valued at 22 pounds.","Owned various lands within the vicinity.","It had assets in the township of Watton and land at Howald, Santon, Hilderthorpe, and Langtonet. The total assets of Watton in 1535 were 453 pounds gross; the actual value was 360 pounds.","The hospital's main assets were its extensive land holdings in Oxford. In the 14th century poverty allowed the hopital to be exempt from the payment of subsidies.","The community owned rural land in Oxford, Berkshire, and Cambridge. The community was generally poor, and in 1244 they petitioned parliament for rights to fish and haul wood. In 1524 their income was valued at over 33 pounds. \u002fadversary chapter house \u002f","At the time of foundation, John de S. John, a local lord, witnessed the charter of the bishop granting ecclesiastical immunities to the foundation and made a small grant of a meadow and a mill in Wolvercote (Women Religious: The Founding of English Nunneries After the Norman Conquest, 168). The community had land holdings both in and out of the province, in Northampton and also in Buckinghamshire, Somershire, Gloucestershire. It also owned urban property in Oxford as well as salt works, a mill, and chapter house. Assests were valued at 200 pounds in the years 1291 & 1445. The community was wealthy but was also in debt due to overspending. Assets were valued at 289 pounds in 1526 and 319 pounds in 1535. ; The abbey was one of the wealthiest of the post-Conquest foundations.","Under the abbess Eadgifu, Nunnaminster may have received two mills in exchange for surrendering an urban watercourse to New Minster. In 1066, Nunnaminster's total land holdings amounted to 73 hides and one and a half virgates of land valued at 79 pounds 15 s. By 1086, this land had been much reduced. ; The community educated girls.","At the Conquest Romsey owned land in Hampshire and Wiltshire that ammounted to 104 hides and was valued at 97 pounds. It was the fourth richest nunnery in England and its income exceeded many of the older established male houses. Its largest estates were in Romsey itself (14 hides, Hants.), Edington (30 hides, Wilts.) and Ashton (40 hides, Wilts.)(Foot, 153).","The Domesday book records Wherwell as holding 57 hides of land in Hampshire, 31 dwellings in Winchester, a fishery, and land in Southhampton. ; Wherwell was the second poorest nunnery recorded in the Domesday book.","Bishop Roger de Clinton granted the site and land at Farewell to assart to the hermits at the church of S. Mary and subsequently transferred the endowment, at the brother's request, to the community of women there. His charter to the nuns stated that he granted the church of S. Mary, with a mill, wood, pannage, and 6 villeins who had formerly been his tenants (Women Religious: The Founding of English Nunneries After the Norman Conquest, 196).","The early endowment of Nuneaton by Robert, Earl of Leicester, included the manor of Eton, and land paying 25 pounds of rent in Kintbury. His daughter Isabel and her son also made sizeable grants of two carucates of land and pasture for 300 sheep (S. Thompson, 165). Lands, chapter house, much locs, fair and market rights for Nuneaton and 3 shops in London 1375. Coalmine (needs verification). Fire and debt in 1250, poor in 1234 and 1292. Purchased in 1344. In 1291, 88 more pounds (2 pounds).","The community had land holdings, mills, a chapter house, and also owned doves and cottages. They exercised market, fair, and court rights in Polesworth. In 1536 the community was valued at more than 230 pounds. It was in good repair, owned equipment, bells, woods, and paid debts when due.","The community had lands and also indulgences from the Archbishop in 1195; the Bishop of Worcester in 1253, and the Bishop Norwich in 1260. It was valued at more than 3 pounds a year in 1291, more than 27 pounds in 1535, and more than 25 pounds in 1536. In 1536 the community was more than 41 pounds in debt.","Ecgfrida apparently lived on estates that she later gave to the church of Durham.","Thought to be a small, poor community between 1216-20.","Lands, quarry, fishery, 2000 sheep (with grazing rights as of 1476), fulling mill, wealthy to termination date. Henry III granted the community 40 acres of forest (Thompson, 171). ; Considered wealthy until its supression (valued at 101 pounds in 1291). Assets totaled 194 pounds at the time of its supression.","According to the Domesday book, Shaftesbury owned 40 hides at Don head, 20 hides at (Sixpenny) Handley, 10 at Tarrant (Hinton, 18 at Iwerne Minster and 15 at Fontmell (Magna) (Domesday Book: a survey of the counties of England, vol. 1, fo 78 vb; see alsoÂ Veiled Women, vol. 2, 166, n 4). This list apparently only represented a portion of the abbey's property at the time of Conquest. For a more detailed list of Shaftesbury's holdings seeÂ The Wealth, Patronage, and Connections of Women's Houses in Late Anglo-Saxon England, 163, andÂ The Abbey of Shaftsbury, 73. ; At the Conquest, Shaftesbury was the richest nunnery in England with lands totaling 353 hides in Dorset and Wiltshire. The gross value of the community's assets was, at the time of the Conquest, was 285 pounds. Hospital  It also showed the convent as owing a quota of 7 knights, earlier 10, to the king. In 1535 the community's net income was over 1166 pounds. ; Benedictine ; This was the largest nunnery in England. In 1218 the number of nuns was limited to 100, and in 1326 it was ordained that no more nuns should be received until the number had been reduced to 120. There were 55 nuns in 1441, 51 in 1560, 50 in 1504, and 57 in 1539.","There was extensive land holding before and after 1086 (SeeÂ Veiled Women, vol. 2, 222-230, for a summary of early gifts of land). The community had a chapter house, owned mills and houses, operated a fair, exercised jurisdiction and owned pasture rights with sheep. It was a quite wealthy community with approximately 246 pounds per year in income in 1086. More than 340 pounds per year in 1291. ; Wilton's wealth surpassed Shaftesbury according to the Domesday book.","It owned a chapter house Lennel, Hirsel, and a chapel in Bassendean.","Community assets included a manor, a chapel in the cemetery of S. Mary Radcliffe, and part of the rectory at Backwell. Values are in a decline in 1383.","The community had land and other urban property in Wells and West Bath given by Richard d'Acton. John Blanket donated urban and suburban property in Bristol. In 1535 the community assets were valued at 29 pounds.","About 1253, the nuns complained in a letter to Queen Eleanor that they were reduced to mendicancy. Soon after the nuns were placed under the guardianship of the prior of Denhall hospital. In the 14th century the dire financial situation of the nuns caused a great deal of tension between the townspeople and the nuns, who, along with their tenants, were often exempt from fines and fees that townspeople were expected to pay. In addition, the townspeople were often forced to subsidize nuns' living. This was somewhat settled in 1391-92 when the prioress paid a bond so that her tenants would show up to court and pay fines like the townspeople. However, this situation was short-lived.","The only record of the community's possessions come from the period of the Dissolution. The estate at that date donsisted of: land in Usk and adjoining parishes; land in Badgworth, Uphatherley and Downhatherley (Glos); the recotories of Usk, Cilgoegan [Llanfihangel Pontymoel], Llanbadoc, Llandenni, Llangyfiw, and Trostre (Monmouthshire). The community also received tithes in Raglan, Estavarney (Monmouthshire) and had an interest in the rectory of Badgworth (Glos). When the nunnery dissolved, the lead on the roofs was valued at 52 pounds 4 pence; a not very considerable sum (Usk Nunnery, 45). ; 69 pounds, 9 shillings, 81\u002f2 pence gross, 55 pounds, 4 shillings, 51\u002f2 pence net in Valor Ecclesiasticus. ; The chantry chapels in the priory church at Usk belonged to the local community, which shared the church, but the nuns had chapels dedicated to St. Mary Magdalene and St. Radegund of Poitiers within the priory precinct. Endowments and offerings at these chapels were valued at 4 shillings, 7 pence in Valor Ecclesiasticus but may have included other tithes which were accounted for under the general tithes of Usk. There is also some evidence for pilgrimages to the statue of Mary Magdalene at Usk.","Apparently there was an adjacent house of clerks or monks, and a school","church of Dun; villages of Elcho, Kinnaird, Binning, Standartis in Lotham","The community assets included land holdings, pensions, gift from benefactors and order of S. John of Jerusalem, and a chapter house. In the 13th century the community received royal gifts of wood for fuel and building. The community assets were valued at 223 pounds in 1535 when the yearly income included a small donation from the hospital at Carbrook. ; Duston Church was part of the endowment of Buckland in 1170 by William of Erleigh.Â The Victoria history of the county of SomersetÂ 6:264-65 available online atÂ [Victoria County History] ; HogshawÂ ;Â Gosford;Â Clanfield;Â SwingfieldÂ Shingay;Â Standon","The house was estimated to have sixty sheep, 1200 acres an Â£7 10s 0d from temporalities but no spiritualities.","villa of Killogainechan with possessions","1591: 3 carucates of land near water of Lorgbella, val. 5 shillings Irish \u002f 6 quarters, ca. 180 acres","At termination: church and belfry, dormitory, hall, 3 chambers, kitchen, etc., with precincts of 2 acres; possessions included about 880 acres, 14 rectories, 7 chapels; total value 34 pounds \u002f other property mentioned in inquisition of 1594: castle, about 120 acres at Loch Mask.Â Monasticon hibernicum, or, A history of the abbeys, priories, and other religious houses in Ireland : interspersed with memoirs of their several founders and benefactors, and of their abbots and other superiors, to the time of their final suppression, 799. Granted in 1562 to Richard, Earl of Clanricarde;Â Monasticon hibernicum, or, A history of the abbeys, priories, and other religious houses in Ireland : interspersed with memoirs of their several founders and benefactors, and of their abbots and other superiors, to the time of their final suppression, 270; alsoÂ History of the archdiocese of TuamÂ i. 214.","valued 40s. 10 Mar 1542 at dissolution; sites and temporalities granted to Sir Marmaduke Whitchurch and J. Wakeman, tithes granted to Marmaduke (Medieval Religious Houses, Ireland: With an Appendix to Early Sites,321)","endowed at foundation with manors of Dunsink and Ballugodman \u002f 1540 church, cloister, other superfluous buildings sold; other buildings necessary to farmer; demesne 225 acres with mill, messuage; possessions circa 2,412 acres, 2 manors, many farms, messuages, cottages etc., 2 other water-mills, interest in 3 churches, val. over 108 pounds 17 shillings gross, 104 pounds 17 shillings net.","The inquisitions of the 16th and 17th centuries list estates belonging to Kildare: ; For much of its early history, Kildare was one of the wealthiest communities in Ireland. SeeÂ Vita sanctae BrigidaeÂ and below.","8 cartrons land 1595","valued at 2m. in taxation of 1302-6 \u002f vested in crown 1584","Early Nubian Christian","Armenian Orthodox","Georgian Orthodox",
