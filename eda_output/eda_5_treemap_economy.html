zM3NAQDMzMzMzE0xAZmZmZmYmS0CamZmZmZlFQDMzMzMzM0dAMzMzMzMzQ0AN0iAN0kBEQJAPejarfkVAzczMzMycRECamZmZmdlDQAd1UAd1kENAzczMzMwMRUDVQR3UQT1DQFFRUVFRcURAUAd1UAe1REDNzMzMzAxAQDMzMzMzs0FAMzMzMzMzRUAzMzMzMxNOQIiIiIiICEVAZmZmZmbmQ0AzMzMzM9NDQLy7u7u7u0JAmpmZmZkZQ0BmZmZmZuZIQAX4C+6ax0RA","shape":"333, 1"},"domain":{"x":[0.0,1.0],"y":[0.0,1.0]},"hovertemplate":"labels=%{label}\u003cbr\u003ecount=%{value}\u003cbr\u003eparent=%{parent}\u003cbr\u003eid=%{id}\u003cbr\u003ecomposite=%{color}\u003cextra\u003e\u003c\u002fextra\u003e","ids":["All Economies\u002fEarly Nubian Christian\u002fFor their own needs, they used a flour mill and an oil press. Their menu consisted of meat (pork, mutton, goat, antelope, etc.), sorghum (in particular sorghum bread: kisra eaten from Meroitic times to the present day) and purslane. They practiced weaving, leather work and wrote documents[3]. They had two iron-casting workshops (furnaces have been found on site).[4][3] They possessed knowledge of medicine as evidenced by the remains of medicinal plants found at the site (Portulaca oleracea, Euphorbia aegyptiaca and Cleome gynandra). Three languages were spoken within the monastery: Coptic for the liturgy, ancient Nubian for everyday language, and Greek, many epigraphic inscriptions or on artifacts testify to this diversity. The average age of death was between 35 and 50 years old, the monks were buried nearby. A cemetery with 800 graves has been excavated to the south of the monastery.","All Economies\u002fArmenian Orthodox\u002fIn the 14th and 15th centuries, the monastery hosted one of the most important Armenian medieval universities, the University of Tatev, which contributed to the advancement of science, religion and philosophy, reproduction of books and development of miniature painting. Scholars of the Tatev University contributed to the preservation of Armenian culture and creed during one of its most turbulent periods in its history. The restoration of the monastery, re-establishing its educational legacy and reviving monastic life at Tatev is one of the main goals of Tatev Revival Program, a part of which is the Wings of Tatev aerial tramway,[2] a cableway from Tatev to the village of Halidzor, which was opened in October 2010.[3][4] It was included in the Guinness World Records as world's \"longest non-stop double track cable car.\"[5]","All Economies\u002fArmenian Orthodox\u002fWhile the main chapel was built in 1215, the monastery complex was founded in the 4th century by Gregory the Illuminator at the site of a sacred spring inside a cave. The monastery had thus been originally named Ayrivank (Այրիվանք), meaning \"the Monastery of the Cave\". The name commonly used for the monastery today, Geghard, or more fully Geghardavank (Գեղարդավանք), meaning \"the Monastery of the Spear\", originates from the spear which had wounded Jesus at the Crucifixion, allegedly brought to Armenia by Apostle Jude, called here Thaddeus, and stored amongst many other relics. Now it is displayed in the Echmiadzin treasury.","All Economies\u002fGeorgian Orthodox\u002fLife on the Pillar: A monk living on Katskhi Pillar in medieval times would have experienced profound solitude. Access was via a dangerous rope ladder, isolating him from all but the most determined visitors or support personnel. Life would have been focused on constant prayer, fasting, contemplation, and likely manual labor involved in daily survival on the limited space. It was a form of stylitism, though the \"pillar\" is a broad rock formation, not a narrow column.\n\nSupporting Community at the Base: While the most famous aspect is the life on the pillar, there would have been a supporting community (perhaps just a few monks or lay helpers) at the base during the medieval period. They would have been responsible for hoisting supplies (food, water, building materials), communicating with the hermit, and potentially maintaining a church or chapel at ground level for broader worship.","All Economies\u002fEthiopian Orthodox\u002fNotable possessions\nCurrently the monastery houses a number of ancient relics, which include a manuscript copy of the Book of the Gospels written around 1280; Egre-muk (or wooden-cuffs), a huge pot which ancient monks used to cook, and other 13th century objects.\n\nAnother prized relict is an icon of the Christ child sitting on his mother's knees, known as \"The One Who Listens\", which the monks believe is miraculous. Created in the 15th century, the icon was cleaned and repaired by a British charity, The Ethiopian Heritage Fund in 2010, and subsequently was housed in a special museum as the monastery.[4]","All Economies\u002fLebanese Maronite Order\u002fThe monastery is one of the richest of the Maronite Order, owning large properties in the valley, which has allowed it to contribute financially to the maintenance of its less fortunate monasteries.","All Economies\u002fCoptic Orthodox\u002fIn addition to prayer and worship, daily life in the monastery focused on the production of food and clothing. Monks worked in agricultural production, in food preparation, and as doctors. Female monks were responsible for making clothing. In addition to supporting the monks, the monastery also supported the surrounding villages and those seeking hospitality and charity (17-20).","All Economies\u002fCistercian\u002fBy the end of the 13th c., the community's patrimony inclued rulership of TragÃ³, Salaverd, Canelles and CÃ©rvoles, with its sanctuary. ; S. Maria de les FranquesesÂ in 1452.","All Economies\u002fBenedictine\u002fIncluded the village of Piasca, the church of s. Eulalia, and numerous properties near Piasca, as well as the more distant community of S. Julian and its properties (after 1045). Also controlled numerous churches, includeing Santiago y Santa MarÃ­a de Perrozo, San JuliÃ¡n de Plano, and San Pelayo and San Miguel de Luriezo. ; S. Julian, in 1045","All Economies\u002fBenedictine\u002fHeld lands in nearby valleys, as well as the church of S. Joan dâ€šIsil.","All Economies\u002fCoptic Orthodox\u002fIt probably served as an inn or hostel for pilgrims, tourists, merchants and their animals.[3]","All Economies\u002fGreek Orthodox\u002fIn 1110, the convent received revenues produced from landed estates and other properties which they owned. These estates required lay property administrators. The convent possessed property which surrounded the convent, including the house of Sophianos with its land, the house of Euphemia near Sophianos, the house of Bardales that is of Kourasmene, the house of Kapassou, the house of Angelina the priestâ€™s wife, the house of Angelinaâ€™s daughter, the house of Souroumina, the house of Garatzias, the house of Syropoulos with the vineyard, the house of Pelekanos, the house of Boutzas, the house of Theodora Kathare, the house of Gerakares, the house of Roudroa, the house of Thomais, the house of Tzoukis, the house of Chamopournea, the house of Katakalos and another house near this one. The convent also owned a house next to the warehouse, the house once belonging to Sophianos, the house of Tzegoudes, the house of Sophianos, the house of Latouros, the houses of Apedou, the house of Mauraganos, the house of Maurianos, the house of the priest Zagaras, the house of Thomais, the house of Michael Charastias, the house of Triantaphylos, the house of Mauros, the house of Charatzias, two vineyards, and a small group of other houses and buildings. ; Patriarch Nicholas III Grammatikos donated a patriarchal convent, Ta Kellaraias, to the Kecharitomene Convent. Ta Kellaraias was intended to serve as Kecharitomeneâ€™s mortuary chapel.","All Economies\u002fGreek Orthodox\u002fThe empress endowed her foundation with properties from Constantinople and Smyrna. The steward was responsible for the management of the conventâ€™s property. He appointed property administrators for conventâ€™s estates, managed agricultural lands, and maintained buildings.","All Economies\u002fGreek Orthodox\u002fTheodora donated half of her ancestral estate, called Pyrgos, to the convent. She and one of her sons also donated the village of Ainos and the village of Morokoumoulou. She also bequeathed a number of vineyards to the monastery. These included vineyards near St. Nicholas Mesomphalos, near the land of Kosmidion, in the village of Kanikleion, and in the village of Pegai (Bebaia Elpis: Typikon of Theodora Synadene for the Convent of the Mother of God Bebaia Elpis in Constantinople, ch. 121-123). ; The convent's chief financial officer was the steward, an office designated for a nun (Bebaia Elpis: Typikon of Theodora Synadene for the Convent of the Mother of God Bebaia Elpis in Constantinople, ch. 54-55). The storeroom supervisor also kept accounts for household goods such as clothing and bedding (Bebaia Elpis: Typikon of Theodora Synadene for the Convent of the Mother of God Bebaia Elpis in Constantinople, ch. 69-70).","All Economies\u002fRomanian Orthodox\u002fNecropole","All Economies\u002fFranciscan\u002fS. Maria de PenardellÂ in 1436 or slightly thereafter.","All Economies\u002fCistercian\u002fA document issued on 29 January 1322 by the king Charles I of Hungary states that ten villages were in the possession of the Cistercian monastery of Cârța: Cârța (Kerch), Criț (Cruz), Meșendorf (Messendorf), Cloașterf (villa Nicholai), Apoș (villa Abbatis), Cisnădioara (monte sancti Michaelis), Feldioara (Feldwar), Colun (Colonia), Glâmboaca (Honrabah) and Cârța Românească (Kercz Olachorum) which correspond to the area between present day cities of Sibiu and Brașov and the Târnava Mare River valley.\n\nIn the second half of the 13th century, in its vicinity, on the right bank of the Olt river, the village of Cârța (German: Kerz) was founded and also on the Hârtibaciu River valley, close to Agnita, it founded the village of Apoș (German: Abtsdorf, or \"the Monk's Village\"). Both villages were populated with German colonists (Transylvanian Saxons) and later in the 13th and 14th centuries on the Sighișoara seat, it founded the villages of Criț (German: Deutsch-Kreuz; Hungarian: Szászkeresztúr), Meșendorf (German: Meschendorf; Hungarian: Mese) and Cloașterf (German: Klosterdorf; Hungarian: Miklóstelke), and also the villages Colun (German: Kolun; Hungarian: Kellen), Glâmboaca (German: Hühnerbach; Hungarian: Glimboka) and Feldioara (German: Marienburg; Hungarian Földvár) situated on the right bank of the Olt River between Sibiu and Brașov.","All Economies\u002fBenedictine\u002fAt the end of the 13th century, the community possessed a substantial number of buildings, churches, farms and other properties located in more than 40 localities throughout the diocese of Gerona, including many the same valley as the monastery itself, in Vilablareix and Vilademuls. For a more detailed listing, seeÂ Col.lecciÃ³ diplomÃ tica de Sant Daniel de Girona (924-1300), pages 29-47. ; Wealthy. ; Incorporated the priories of S. Maria del Mar de Calonge,Â S. Margarida de Vilanera, possiblyÂ S. Cugat del Far, and finallyÂ S. Maria de ValldemariaÂ (1550).","All Economies\u002fGreek Orthodox\u002fThe emperors gave also the Great Lavra many other lands of property including the island of Saint Eustratius and the Monastery of Saint Andreas in Thessaloniki. This led to the growth of the monks from 80 to 120.","All Economies\u002fGreek Orthodox\u002fThe Karakallou Monastery (Greek: Μονή Καρακάλλου) is an Eastern Orthodox monastery at the monastic state of Mount Athos in Greece. It stands on the south-eastern side of the peninsula and ranks eleventh in the hierarchy of the Athonite monasteries. The monastery has 50 working monks, and its library holds 330 manuscripts, and about 3,000 printed books. It was founded in the 11th century. In the 13th century, as a result of the activity of pirates and Latins, Karakallou was totally deserted.\n\nBy the end of the 15th century according to the Ruthenian pilgrim Isaiah, the monastery was Albanian.[1] The monastery was rebuilt in the 16th century by Moldavian voievod Peter IV Rareș.","All Economies\u002fCistercian\u002fProperty in the Barcelonan locations of Espluga and Santa Coloma de Queralt, and in the â€žsegarrenquesâ€° of Passanant and Tallada.","All Economies\u002fGreek Orthodox\u002fThe original founder endowed the convent with properties, but these were lost during the Latin occupation (Anargyroi: Typikon of Theodora Palaiologina for the Convent of Sts. Kosmas and Damian in Constantinople, ch. 2). In a tradition of place here from old Asclepius healed people with the healing waters of the source and the foundations of the holy Saints Anargyroi continue to treat people … not only from physical illness. The beginning of the history of the monastery dates back to the 11th century. A.D. But from the 16th century. clear and accurate evidence and details of its history.","All Economies\u002fBenedictine\u002fAbbess Emma's dowry went to the community as soon as she had attained her majority. This substantial territory was bordered by the valley Santajuaneca, Estamariu, the valley of Ripoll, Mogrony, Conflent, Cabanes and Alt Emporda. Later, Emma's initiatives and influence helped to extend the community's territory as far as Congost, the Valles, and the valley of Cardener. Successive abbesses further enlarged the community's territory. ; Extremely wealthy. ; The community was very active in the effort to resettle Old Catalonia. All of the abbesses, beginning Abbess Emma, dedicated themselves to establishing new churches in their territories, and bringing in new settlers to populate them.","All Economies\u002fGreek Orthodox\u002fThe inventory for the convent is alluded to in the typikon but no longer survives. The superior did possess a number of books which she was prohibited from loaning out (Neilos Damilas: Testament and Typikon of Neilos Damilas for the Convent of the Mother of God Pantanassa at Baionaia on Crete, ch. 19-20). ; Neilos Damilas forbid that nuns do any work outside the monastery, although he does allude to the possibility that nuns could produce goods to be sold to outsiders, monks, and laymen. Nuns also exchanged goods with the male monastery (see above) (Introduction,Â Neilos Damilas: Testament and Typikon of Neilos Damilas for the Convent of the Mother of God Pantanassa at Baionaia on Crete, p. 1463).","All Economies\u002fGreek Orthodox\u002fThe monastery acquired a metochion at Kapraina, the modern village of Koprena or Avra near Kalabaka.","All Economies\u002fAlbanian Orthodox\u002fthe school became one of the places where the Albanian Language was taught. The monastery has a Byzantine-orthodox architecture but with many romanesque features, which lies in a surface of 2.500 meters square. It is composed of the Saint Mary Church, the chapel of the Saint Trinity, a mill, and a barn.[5] The Church of Saint Mary in the Monastery of Ardenica has important frescos from Kostandin Zografi and Athanas Zografi. These painters from Korçë worked on the church in 1744. The frescos include an Old Testament and a New Testament, Dogmatica, Lithurgy, Life of Saints, etc.[5]","All Economies\u002fBenedictine\u002fIn 1097 the community recieved numerous gifts from Goffredo, conte di Conversano, among which were the castle of Tuturano and the churches of SS. Cosma e Damiano and S. Eustasio.","All Economies\u002fCistercian\u002fOriginally well endowed, abbey suffered during Thirty Years War when nuns fled to Poland; fled again in 1663 because of Turkish invasion.","All Economies\u002fClarisse\u002fIn 1244\u002f45, S. Giacomo, together withÂ S. Lorenzo di Collazone, paid one pound of wax.","All Economies\u002fAugustinian\u002fThe convent obtained various good throughout its existence, including vineyards and other properties (Schimmer 387). ; After the death of their Abbess Barbara in 1557, the sisters of S. Clara were incorporated into the S. Jakob convent (67).","All Economies\u002fAugustinian\u002fDuring its existance, Himmelpforte purchased and was presented with several vineyards. ; The sisters were involved in various handiworks, such as weaving, laundering, sewing and knitting. Some of the oldest Viennese financial records and documents mention other ministrations and services that the Himmelpforte sisters personally provided to neighboring households (Zak 187).","All Economies\u002fCistercian\u002f[Letter to the monastery of St. Marienthal]","All Economies\u002fCistercian\u002fUnited with the monastery S. Antonio di Dronero in 1188 (seeÂ S. Antonio)","All Economies\u002fCistercian\u002fSubstantial properties in Morozzo, and around the monastery.","All Economies\u002fCistercian\u002fThe convent owned land, mills, villages, and had patronage rights in various churches. During the fourteenth century the convent's land holdings streached towards the west in the direction of FÃ¼rstenberg. When Hans von Arnim purchased all the convent's holdings in 1539, he purchased all the villages, fiefs, rents, tithes, outbuildings, fisheries, ponds, mills, water, woods, fields, and hunting rights as well as income from legal fees that the community had in its possession. ; The convent was quite wealthy in the thirteenth century due to donations. In 1281 the convent purchased land for 200 Talents. After 1350 the convent suffered economically and was forced to sell portions of its land. At the beginning of the fifteenth century, the convent recovered a bit economically, but it no longer acquired large amounts of land.","All Economies\u002fBenedictine\u002fOwned church, vinyards, garden. Received land from emperors and bishops in 12th and 13th c. Had enough money to by 19 pcs. of land and a castle \"di Ceresio\" in Valle Castella. The also posessed land, houses and a church in Montelparo. Syndics administered the property and defended the nuns of acting according to the __Capitula et Constituziones de Castro Ceresia.__ At the end of the 13th c., they discovered thefts that they attributed to the 9 conversi and 3 familiares who adminsitered their property and they appealed to the pope. Two years later, on January 8, 1297, Boniface VIII wrote to the abbot of A. Pietro Interito and asked him to announce in church that, unless the stolen goods were returned, he would excommunicatae the delinquents. There seem to be no further references to this affair. In 1194, the monastery acquired mills from the Bishp Alberico in exchange for a gold challice and a case of silver. Nicholas IV sent the nuns two seperate bulls ordering that rectors should not permit the citizens to use the mills belonging to the monastery. By 1300, however, there was general agreement that the mills belonged to the city but that servants and other members of the monastery had every right to have their grain ground there. ; Very Wealthy.","All Economies\u002fBenedictine\u002fSome time before 1448, the nus also gained the monastery of Contrada Torresane","All Economies\u002fCistercian\u002fIncorporated the cell of S. Croce de Clenti (diocese of Fermo) in 1260, by provision of Alexander IV.","All Economies\u002fBenedictine\u002fA portion of the Petersfrauen property was guarded by the brothers at the abbey. This part mainly consisted of the dowries given by young women for their admission. Dowries could be any combination of money and land plots (Gueter). The convent also possessed a respectable Klosterschatz, or â€œconvent treasure,â€ comprised sacramental objects containing precious metals and stones, as well as statues and jewelery. ; The Petersfrauen led a humble existence in comparison to their neighbors at Nonnberg. This life was enriched under the rule of Abbot Otto II., the great benefactor of the womenâ€™s convent (â€der grosse Wohltaeter des Nonnenklostersâ€ â€“ Dopsch (Die Petersfrauen)), who pledged generous financial support to the nuns. ; While knitting and needlework were also important activities, the Petersfrauen were especially known for their writing and illustration of Psalters and other liturgical manuscripts. The sisters also ran a school for young women, according to 15th century documentation (Schellhorn,Â Die Petersfrauen, 147).","All Economies\u002fBenedictine\u002fNonnberg received generous material gifts from the 8th century duke of Bavaria and the 11th century Emperor Heinrich II. For further accounts of the conventâ€™s endowments, consult the Esterl chronicle, cited in the bibliography. ; The last two remaining members of the Petersfrauen of St. Peterâ€™s Abbey were absorbed into Nonnberg on August 12, 1583.","All Economies\u002fBenedictine\u002f1459:Â S. Filipo; 1513:Â S. Maria Maddalena, which had also absorbedÂ S. OrsolinaÂ some time in the 13th c.","All Economies\u002fClarisse\u002fIncorporated S. Chiara (seeÂ S. Chiara) in 1485, per the order of Pope Innocent VIII. According toÂ RÃ©pertoire topo-bibliographique des abbayes et prieurÃ©s, both of these houses were combined to form a new monastery in the same town, founded by Baptiste Malatesta c. 1440.","All Economies\u002fBenedictine\u002fHad lands around Assisi, perhaps came from the sister and niece of the Abbess Mattia di Andruccio (1404).","All Economies\u002fBenedictine\u002fIn 1356, the chapter discussed selling two properties (Salce and Scuccula) to pay for reparations. ; Wealthy in late 13th and early 14th c., then begins to decline. ; In 1408, it was united with S. Andrea de vineis. Transferred to the city to \"Poggio\" or \"Poio.\"","All Economies\u002fBenedictine\u002fSome time between 1408 and 1411, it incorporated into S. Stefano di Vallacera and S. Tommaso de Bocetis. When the monastery took the name S. Nicolo, the church continued to be called \"Madonne delle Rosa until the late 18th c.","All Economies\u002fBenedictine\u002fUnited with the monastery of S. Bartolomeo e S. Paolo in 1406.","All Economies\u002fBenedictine\u002fBulls of 1441 and 1445 (Eugenius IV) united S. Maria Maddelena d'Alba to Certosa. On March 11, 1556, Pius V's bull united S. Maria delle Gratie with Certosa. [Note: these seem to be the same monasteries that were united with #S. Maria di Belmonte, S. Maria di Belmonte. The foundation dates for Belmonte and Certosa are given as different, but otherwise the records do not contradict each other. It is therefore possible that the two houses are one and the same. --mk)","All Economies\u002fClarisse\u002fIn 1406, sister Caterina di Lucia Alfani bought a house in Porta Cintra for 12 fiorini.","All Economies\u002fClarisse\u002fOwned land, vineyards, houses, olive trees and forests at Valliano, S. Maria de Oliveteto [sic?], Bolserano, Monteleone, Galterio, :upazone, Marignano, Casale and Villa di Campo. Also Chiesa di S. Maria di Presso, and Chiesa di Castiglione di Valle. ; Wealthy.","All Economies\u002fAugustinian\u002fHalberstadt (Dominican nuns)Â andÂ S. Maria della CroceÂ in 1314.","All Economies\u002fFranciscan\u002fIn 1232, Pope Gregory IX gave the community ofÂ S. SylvesterÂ jointly to S. Maria Vallegloria and toÂ S. MariaÂ (Spoleto).","All Economies\u002fBenedictine\u002fS. AgneseÂ in 1478, andÂ S. AnnaÂ in 1485.","All Economies\u002fBenedictine\u002fIn 1264, Paul and Thomas Offreducci, bound to S. Francis and S. Clare with family ties, sell lands, houses and gardens in the Porta Moiani, in the parish of S. Maria Maggiore. In 1316, Latinus Balerio, syndic and procurator, sells all the land the community owned in the vicinity of the commune, with the exception of the monastery gardens. In 1333\u002f34 it paid 7.5 decime, and in 1354 the property was valued at 6,171 lire. ; S. Paolo delle AbbadesseÂ in 1453 (See \"Litigations,\" below)","All Economies\u002fBenedictine\u002fIt owed 18 salme of grain and 30 cadi of wine and oil (to bishop? needs verification).","All Economies\u002fFranciscan\u002fOwed 25 salme of grain, 100 codi of wine and oil (to the bishop? needs verification)","All Economies\u002fClarisse\u002fThe monastery prospered in the early years, but as the Protestant Reformation gained influence, the daily search for food and alms for the poor began to dry up. Many Danes felt that the mendicant orders, nicknamed the 'beggar monks and nuns' were an additional burden over and above the regular tithes and fees paid to sustain the church. In 1527 a priest formerly assigned to the monastery wrote to King Christian II, describing a chest which the abbess of the monastery had given him to distribute to the Poor Clares in Odense, who were suffering dire poverty. The abbess had asked him to convey the money in secret because she was afraid if the amount became known the Order would be held up to scorn and ridicule. He encouraged Christian II to return to Denmark to take in hand the care of the Poor Clares who had been his mother's 'particular and elect' daughters.","All Economies\u002fBenedictine\u002fThe 1354 register of religious groups in the commune of Assisi estimated the property of the monastery at 53.290 librae per year.","All Economies\u002fCistercian\u002fThe convent held possessions in 17 villages (Blesendorf, Boddin, BÃ¶lzke, Breitenfeld, Damelack, Halenbeck, Kemnitz, Kolrep, Old and New KrÃ¼ssow, Langnow, Rapshagen, Sadenbeck, Sarnow, SchÃ¶nebeck, Techow, Wilmersdor, and Klein-Woltersdorf). Provosts were responsible for the economic mangagement of the convent. Among the farm buildings were a corn house (used for storage of grain), a bakery with a bread cellar, a brewery with malt house, a brick oven, and a water mill. Among those dependent on the convent numbered millers, cooks, malters, fishers, cattleherds, blacksmiths, laborers, maids, and scribes. They also employed an apothecary and had their own brick oven for manufacturing bricks. ; The community supported approximately 180 people, including nuns, servants, the poor and ill.","All Economies\u002fBenedictine\u002fS. Andrea de BiberaticaÂ (needs verification)","All Economies\u002fBenedictine\u002fThe community tried to build up a base of properties within the city of Rome and in the surrounding countryside (the Roman Campagna). The community's assets grew steadly during the course of the 15th c. ; Very affluent, esp. during the 15th and 16th centuries.","All Economies\u002fCistercian\u002fThrough donations and the rich dowries of the inhabitants the convent's property was greatly expanded. By the time of its dissolution the convent held 65 farms with 183 dependents. In 1299 the convent acquired secular jurisdiction over its dependents, and in 1317 it obtained spiritual jurisdiction as well (Krausen, 90).","All Economies\u002fDominican\u002fReal property including farm estates cultivated by tenant farmers in the enviorns of Rome, as well as buildings, and parts of various kinds of structures within Rome, including part of the Colosseum. ; S. Maria TempoliÂ (1221),Â S. Bibiana all'Orso PileatoÂ (1221),Â S. Cesario \"Corsarum\"Â (1433), Santa Aura,Â S. Cosma e S. Damiano in Mica AureaÂ (possibly in the fifteeth century). Santa Aura was Dominican and San Cosimato Benedictine at the time of incorporation. The other three Roman communities are generally considered or assumed to have been Benedictine.","All Economies\u002fBenedictine\u002fIn 1477, the abbess ofÂ S. Maria in GiuliaÂ united the communities of S. Filippo, S. Sepolcro, and S. Maria Maddalena with S. Maria del Ponte. The latter tried to reestablish itself as a separate community in 1452, but a bull of Pope Sixtus (1473) restored the union.","All Economies\u002fBenedictine\u002fHad 2 mills. ; Fairly wealthy. ; Property was administered by a provost.","All Economies\u002fClarisse\u002fUnited withÂ S. Maria di CamianoÂ in 1413, and both communities were immediately incorporated byÂ S. Angelo della ValleÂ (see below).","All Economies\u002fFranciscan\u002fIn 1413, S. Giovanni temporarily took in nuns ofÂ Maggiore di Monte MascaranoÂ who were unsatisfied with the community ofÂ S. Angelo della ValleÂ into which their community had been incorporated. The nuns of Montesanto eventually rejoined S. Angelo (by then renamed S. Francesco della Valle) in 1433.","All Economies\u002fBenedictine\u002fVery poor. ; 1316: received alms from the Brothers of Penitence","All Economies\u002fBenedictine\u002fReceived alms distributed by the Brothers of Penitence in 1316.","All Economies\u002fBenedictine\u002fIn 1399 they were given the goods of Monte Tezio, together with workers and animals.","All Economies\u002fCistercian\u002fIn 1292, the priors of the comune of Perugia gave the community the castle of S. Egidio di Colle with its temporal and spiritual jurisdiction. ; Very wealthy.","All Economies\u002fFranciscan\u002fAcquired the church of S. Angelo outside Montemelino in 1500. ; Very poor. Received alms in 1316, 1458, 1484, 1485, 1499 (the last of these was to repair damage to the walls). ; June 10th, 1253, nuns fromÂ S. Angelo de ArenariaÂ bought the properties from the Franciscans brothers (who moved on to the S. Francesco al Prato), and founded the community of S. Francesco. In 1302, they were united withÂ S. Maria di Valverde,Â S. GalganoÂ in 1412, andÂ S. AgneseÂ andÂ S. Giovanni di ColumbellaÂ in 1422.","All Economies\u002fFranciscan\u002fThe sisters requested alms and grain in 1455, 1458, 1459 and 1461.","All Economies\u002fAugustinian\u002fUntil 1302 they bought houses in the city to form a monastery. In 1310, Suor Agata, abbess, bought three houses from Rainaldo del fu Cambio. Abbess d. Anna and 15 nuns (date?) sent to Bishop Tifernate Ugolino the syndic fra Giovanni Dettalevi, asking him to allow the nuns to build an oratory. The bishop goave his permission, in exchange for one libra (pound?) of wax annually. In 1342, Bishop Ugolino II gave them the right to build a cemetery.","All Economies\u002fBenedictine\u002fIn 1477, Domina Giacobba di Giovanni Peri, Abbess ofÂ S. Maria in Giulia, orderedÂ S. Maria del PonteÂ (which had only 2 nuns) and S. Lorenzo di Borgo S. Sepolcro to be united with S. Sperandio. S. Maria del Ponte broke the union in 1452 and Sixtus IV renewed it in 1473. In 1574, the nuns of S. Maria transferred toÂ S. Margherita. A final union with S. Maria delle Grazie di Rsarello (Clares) was accomplished only on June 28, 1930, and was opposed by D. Caterina di Perugia.","All Economies\u002fClarisse\u002fIn 1291, the community had a \"piscinale\" outside the Porta S. Maria, in the parish of S. Maria Maggiore. ; S. Agnese","All Economies\u002fClarisse\u002f23 March, 1460: incorporatedÂ S. Maria de PupulaÂ andÂ S. Maria della Fonte fuori della Porta S. Maria.","All Economies\u002fClarisse\u002fUnited with the monastery of Paradiso in 1658, and known thereafter as S. Cecilia in Paradiso.","All Economies\u002fAugustinian\u002fThe library catalogue ofÂ S. KatharinenklosterÂ , listing book donations to Altenhohenau, shows that the nuns here participated in the late firteenth-century book traffic.","All Economies\u002fBenedictine\u002fIn 1170 King Valdemar den Store gave the farm and church of Slangerup to a community of Benedictine nuns, to establish an abbey.[4] It was dedicated to Our Lady and Saint Nicholas at the suggestion of Absalon, Bishop of Roskilde. Valdemar moved his unmarried daughters to the abbey where they could be watched over and educated. The church became one wing of the cloister, in which the nuns were separated from the world. They had their own private entry to the choir of the church which was gated off from the rest of the congregation, who usually attended the church only on holy days. [5]\n\nIn 1187 a letter was written to Bishop Absalon, complaining that not all the nuns were \"virtuous\". This complaint led to the replacement of the Benedictine nuns with the new and strict Cistercian Order, which was seen as a reform. The original nuns either left or conformed to the new observance. Throughout the 13th-14th centuries, the abbey received many rental properties and gifts of money from noble families for services rendered by the nuns for recently departed family members or for burial inside the Church. They also received donations and allowances from families who sent unmarried women to live a quasi-religious life in the abbey until they married or took the vows of chastity, poverty, and obedience. By 1344, Princess Agnes Birgersdotter, the daughter of King Birger Magnusson and Queen Märta of Denmark, and her retinue were sent to live at Slangerup by King Erik VII. To ensure the abbey's continued existence it was given the town of Slangerup and several other large properties.","All Economies\u002fCistercian\u002fThe foundation was primarily supported through income from villages of the parish of Eschlkam on the Bohemian border. ; The ministerial family of GrieÃŸenbeck belonged to the dependents of the convent.","All Economies\u002fClarisse\u002f1258: S. Maria de Gavillone (SeeÂ S. Maria de Gavillione e S. Juliana) & S. Julianna Toscanella (#S. Juliana Toscanella)","All Economies\u002fAugustinian\u002fAmong the goods in the conventâ€™s possession were a mill and several vineyards (414). ; In 1529, S. Lorenz absorbed the sisters of S. Magdalene vor Schottentor under the official approval of Archduke Ferdinand I. Founded in 1239 by Duke Friedrich II., the convent of S. Magdalene was threatened in the 16th century by the approach of Turkish hostile forces. In addition to their population, these fellow Augustinian canonesses brought their goods and income (Schimmer 413).","All Economies\u002fAugustinian\u002fS. Clemente (Cambridge) in 1555","All Economies\u002fClarisse\u002fCombined the communities of S. Maria di Cortona (S. Maria di Cortona) & S. Juliana Toscanella (S. Juliana Toscanella) to become new community in 1258.","All Economies\u002fBenedictine\u002fFounded in 1142 by Bishop Hartmann of Bressanone, the Augustinian Abbey of Novacella near Bressanone remains to this day the largest complex of religious and civil buildings in Tyrol. The monastery served primarily as a place of shelter for pilgrims coming from the north, not least due to its fortunate location along the Brenner route and the Val Pusteria road. At the same time, one of the major cultural centers also developed here, with a college and a rich library.","All Economies\u002fCistercian\u002fThere is little information about the property and economic development of this convent.","All Economies\u002fBenedictine\u002fThe community had considerable holdings, especially in Helfta and Eisleben, including the churches of Augsdorf, Siebigerode, Katharinenhospital in Eisleben (1229). Helfta also took over the church in Schaafsee from Magdeburg in 1268. It acquired churches in Bennstedt and Wormsleben in 1298 and 1307 respectively. In 1400 it had the churches in Helfta, Neinstedt and S. Cyriaci in Reisdorf. ; The house was very wealthy.","All Economies\u002fKnights Hospitallers\u002fDuring the 1420s, King Eric of Pomerania created Kronborg Castle, the castle immortalized in Shakespeare's play, Hamlet. It was built like a strong fortress for guarding Øresund and ensuring payment of sound dues which were enforced by the immediate firing of all cannons on any ship that refused to pay. It was very effective and collected two thirds of crown revenues. By the late Renaissance, tastes had changed and Kronborg's high walls and bastions made it impossible to have a grand renaissance garden. An old monastery north of the yard was therefore chosen as the new location and named Lundhave after the royal estate.","All Economies\u002fAugustinian\u002fIn 1506 this community united with S. Maria Maddalena di Valdipietra and the name changed to S. Caterina da Siena. Nuns from the Repentite house appealed to Pope Julius II to be allowed to return to their house and changed their name to S. Agostino.","All Economies\u002fBenedictine\u002fThe original location was partially destroyed, so the nuns moved to another location with nuns said to be from S. Agnese","All Economies\u002fBenedictine\u002fGained the congregation & church of S.Ambrogio from the bishop of Siena (1063). Gained the church and the well of S.Prospero in 1093","All Economies\u002fJesuati\u002fHospital of Santa Maria della Scala (involvement): While not exclusively theirs, the early Jesuati, including Giovanni Colombini himself, were active in serving the sick at this great Sienese hospital.","All Economies\u002fBenedictine\u002fThe house had several castles, villas ,courts, ,vinyards, agricultural land, and woods (See \"contributor's notes,\" below)","All Economies\u002fBenedictine\u002fVery wealthy, large patrimony, vast properties. Dominated by the family of Count Guidi, from before 1100 to the late 13th century.","All Economies\u002fCamaldolese\u002fThe house had extensive holdings, including the church of S. Ilario in Puglia, which had been donated by the bishop of Arezzo in 1149 (See \"Early Documents,\" below).","All Economies\u002fAugustinian\u002fSacked by Luccan troops in 1325; Occupied by imperial troops in 1529","All Economies\u002fBenedictine\u002fchurch dedicated in 1439","All Economies\u002fDominican\u002fThe house received a share of the properties of S. Jacopop di Ripoli (SeeÂ S. Jacopo di Ripoli) when members of that house founded S. Domenico.","All Economies\u002fKnights Hospitallers\u002fThe facility also served as hospital for the king's army until 1308, when King Haakon V established a hospital for this purpose at St Mary's Church, Oslo.","All Economies\u002fCistercian\u002fThe conversion of Ottheinrich of Neuburg to Protestantism brought with it the alienation of many of the convent's rights and goods. ; The convent received numerous rich gifts and acquired wealth through the generous dowries of its inhabitants. ; The convent held numerous patronage rights in other parishes.","All Economies\u002fSecular Canonesses\u002fIn 1218 during the conflict between Otto of Brunswick and Frederick II, Frederick destroyed the defenses of Quedlinburg. He later compensated the abbess with money for the remedy of his soul. Abbess Gertrude divided the income of the advocate and his functions into fragments which she then loaned, mortgaged, or sold to subadvocates. By the late thirteenth century, Quedlinburg had several advocates (McNamara, 269).","All Economies\u002fCistercian\u002fThe convent was never very wealthy. The convent was frequently forced to sell its property, and in 1371 the number of nuns was restricted to fifty. The economic decline of the convent continued into the fifteeenth century.","All Economies\u002fAugustinian\u002fAfter Easter 1243, Ulrich II of KÃ¶nigstein decided to bequeath his entire estate at Swinach to the beguines, while granting them the revenues from the property during his lifetime. His wife, Adelheid, and his daughter, Elizabeth, agreed to this arrangement, and the document was witnessed by Walter of Klingenburg, his son-in-law (Hindsley, xviii). In exchange the nuns prayed in perpetuum for the soul of the founder, his ancestors, and his descendants. Ulrich also expected the nuns to accept unmarriageable daughters and to establish a working scriptorium (Hindsley, xviii). Over the years the convent received gifts of land and dowries from the nuns who entered. The first account book of the monastery, dating from 1312, mentions 175 properties in 54 locations. By 1350 the nuns had added 70 more farms and estates. By the end of the thirteenth century, the monastery possessed almost the entire valley of Hammerbach (Hindsley, xx). The convent also benefitted from bequeaths of land made by the nuns of the convent (for example Adelheid Langmann, see above in social composition). ; According to the community's sister-book, the initial community performed the agricultural labor themselves. They cut the corn, washed, baked, and performed all the daily chores. The beguines also cared for the sick and poor in the surrounding area (Hindsley, xviii).","All Economies\u002fCistercian\u002fCountess Kunigunde provided the initial foundation with her acquired property in Grindlach, which included jurisdictional rights, an orchard, farm, and other possessions, in total worth approximately 5000 pounds (Krausen, 58). ; In the fourteenth century the convent struggled with economic difficulties caused by too great a number of inhabitants and building expenses. ; The parish of Gunzenhausen was incorporated into the convent by Pope Clemens VI in 1347.","All Economies\u002fBenedictine\u002fIn 1058Â HolzzelleÂ was transferred to the bishopric of Halberstadt by Heinrich IV and combined with DrÃ¼beck, although this union may have been quickly dissolved.","All Economies\u002fBenedictine\u002fThe community held the S. Mary-chapel and church in Domnitz.","All Economies\u002fCistercian\u002fVolkmar von Kemnathen granted the convent rights and property (?) in the parish of Dietkrich, in which the convent resided. ; Until the period of secularization, OberschÃ¶nenfeld held extensive property and was the cultural standard-bearer for the whole area of OberschÃ¶nenfeld and its settlements (Wienand, 338).","All Economies\u002fDominican\u002fAccording to Cuneo, the nuns managed landholdings and properites and gained income from the manufacture of textiles. A document dated June 6, 1273 records the sale of a half of a farm in Eringen by the Prioress Gertrud with the support of the nuns of the community to Berthold Rucher in Kaufering, who in turn handed over his ownership of the Altar of S. Katharina (HÃ¶rmann, 301). On July 26, 1273 Ulrich, duke of Helfenstein, granted the sisters freedom from feudal duties (Lehnsfreiheit) for certain goods in Rumelsried, which had belonged to his vassal Heinrich (HÃ¶rmann, 301). On February 20, 1274 Bishop Hartmann gave the sisters fields. On February 28, 1277 the nuns received a third of the property in Buch from \"Schwigger and Heinrich von Mindelberch\" (HÃ¶rmann, 302). On October 7, 1278 Heinrich SchrÃ¶tele, judge of the episcopal court, sold the convent one farm and other properties in Thierdorf. On June 5, 1279 the sisters purchased a farm from Ulrich and Arnold von WÃ¶llenburg in the village of Bergen with the approval of Bishop Hartmann and the vicar of the cathedral. On August 6, 1279 Bishop Hartmann approved the sale of a farm belonging to his chuch in Bobingen by his vassals Heinrich and Grimold von Sevelt against a deposit of property in Ehingen (HÃ¶rmann, 302). On September 20, 1279 Bishop Hartmann permitted the convent to purchase from the sisters of the convent of HÃ¶rbruck the tithes from four fields. On March 12, 1280 S. Katharine's purchased from Heinrich and Friedrich von Freudertshofen property in Bobingen with permission from Bishop Hartmann. On December 29, 1282 King Rudolph von Habsburg freed a farm in Gablingen and one in Bobingen, which belonged to the convent, from their feudal duties (HÃ¶rmann, 302). On February 28, 1283 the convent purchased fields in Augsburg from the cathedral chapter. On August 18, 1283 Marquard von Kemnat handed over his property rights in a half of a farm in Bergen for one in Horgau, which Sebastian, a patrician from Augsburg gave to his daughter and he convent (HÃ¶rmann, 303). On December 6, 1283 the convnet purchased a farm in Inningen from Joh. Schongauer and on January 30, 1285 the convent received freedom from feudal dues for a farm in Inningen for a yearly payment to the cathedral chapter (HÃ¶rmann, 303). On may 13, 1286 Heinrich Schongauer gave the \"Mayrhof\" and a timberyard(?)in Holzhausen to the convent on condition that his daughter, a nun in the convnet, would be given 10 Shillings yearly from these holdings after his death (HÃ¶rmann, 303). In 1289 Heinrich von Mindelberch granted the convnent as compensation a farm in Mindelau and on June 18, 1290 he sold them a farm in Nassen. On January 29, 1291 Heinrich von Wolfberg relinquished his claims to the Mayerhof in Rumeltsried and a property in Kleinechsried. On Febraury 28, 1293 the Prioress Christina and the convent purchased a (lift?) in Eringen from Heinrich von Zeigershofen. On August 21, 1293 Wernhard von Hurenbach gave his daughter Sophie, a nun, property in Niederrammingen for her lifelong use and decreed that after her death the sisters Margaretha and Mechthildis should have the property for their use and after their death, it would fall to the convent itself (HÃ¶rmann, 303). In 1296 Margarethe, the prioress, and the sister purchased from Marquard, provost of Westerkitzigkofen, a farm in Dillishausen, which he had given to Michael, Hermann and Engelschalk von Rohrbach. In 1297, the prioress Tuta or Guta sold a yearly tithe of 13 Shillings to the chaplain of S. Katharina, Heinrich. In 1298 the convent purchased a farm from Sophie von Schwangau in Suntheim and a farm in Thierdorf from the brothers Menhofer. On March 12, 1298 Count Albrecht von Merstetten granted the convent farm properties in Thierdorf, which belonged by feudal tenure to the cathedral chapter, and the cathedral chapter freed this property from its feudal duties in exchange for a half of the yearly tithe (HÃ¶rmann, 304). On October 15, 1300 Ulrich von WÃ¶llenburg allowed his overseer to sell fields and farmland to the convent. On October 16, 1300 the convent purchased a farm in Lammerdingen from Sifrid von Wabern. On May 29, 1301 Bishop Walfard permitted the Count Conrad to exchange some fields along the path to GÃ¶gginger with the convent (HÃ¶rmann, 304). Haedwig and the convent purchased from Heinrich Ruch three properties in Erringen on March 17, 1303. In the same year the convent purchased a farm in Nassenbeuren from Conrad von Scheppach. On February 22, 1304 the convent purchased farm property in Rommelsried. on April 1, the Bishop Degenhart and others granted the farms in Erringen freedom from their feudal duties (HÃ¶rmann, 305). On October 21, 1301 Berthold Hurlocher sold a farm in Bobingen, in vassalage to the cathedral chapter, to the convent; the sale was confrimed on January 18, 1305 by the provost of the cathedral chapter, Egeno, and the deacon, Rudolf von Hurnheim. On February 18, 1306 the convent purchased a property in Thierdorf from Conrad Zollner. On February 4, 1309, the Count Conrad, with persmission of his overlord, the cathedral deacon, sold the convent two farm properties in Thierdorf and a field before the door of GÃ¶ggingen (HÃ¶rmann, 305). On June 25, 1311 the convent purchased farm properties in Holzhausen from Heinrich Schongauer. On February 14, 1312 Hermann and Gottfried von Wellenburg granted a farm in GÃ¶ggingen to the convent. On July 16, 1317 the convent purchased a farm in Zusamm-Altheim from Heinrich Portner for 65 Marks and 30 Shillings and another farm for 70 Marks, less 33 pennies (HÃ¶rmann, 306). In December 1318 the convent purchsed two farms in Grosskitzighofen from the convent Steingaden. On May 31, 1319 the sisters purchased a farm in Suntheim from the convent in Munich for 23 Marks. On November 24 of the same year Johannes Langenmantel granted the convent some farm property and an (income?) in Inningen, on account of his sister Anna, a nun in the convent (HÃ¶rmann, 306). In 1322 the convent purchaed a property in Haimeneck and another from Heinrich, provost of Erringen. On May 26, 1322? Johann von Rosenstein and the convent of Erringen sold a house in the Catharinen-street to the convent. On January 8, 1323 Heinrich of Zusammecker, a religious of St. Georg (with the permission of his provost) sold to his sisters Margaretha and Anna, who lived in the convent, a house, farm and storeroom; the convent also promissed that it would grant 6 Marks yearly for the Elsbeth (HÃ¶rmann, 307). On March 1, 1323 Heinrich Wizinger sold a farm in GÃ¶gginen to Agnes, countess von Burgau, a nun of the community. On March 30, he sold a a farm in Hiltefingen to the convent. On May 4, 1323 the sisters purchased a farm in Inningen from Heinrich Herbort. The convent also purchased properties in Gammenried von Conrad Masser von Dirlewang in the same year. On March 21, 1325 the prioress and the convennt forged a confraternity with two sisters, Adelheid and \"Hille\" from the convent of Heligen Grab to perform vigils and Masses and therefore would grant 10 Shillings from the income in Inningen and 3 Shilling from properties in Muehlhausen for wine (HÃ¶rmann, 307). In 1326 the convent received a farm from Wernher Hug in Obermeitingen. On March 24, 1333 the convent purchased from Wernher Drexl a farm and forest areas? in Hiltenfingen for approximately 90 Marks. On April 30, 1333 the convent purchased property in Unter-Meitingen from Conrad Rehlinger, and a farm in Hiltenfingen and another in GÃ¶ggingen from Heinrich Wissinger. On July 3, 1333 Conrad Porner gave the convent a garden before the door of Holy Cross, from which Adelheind, a nun, would receive a yearly tithe (HÃ¶rmann, 308). On November 21, 1333 the convent purchased tithes from a field near Augsburg. On October 2, 1337 the convent purchased a farm in Zusamaltheim for 70 Marks from Heinrich Portner. On July 13, 1338Â MedingenÂ sold a farm in Steinheim to the convent for approximately 130 Marks and 19 Shillings. On December 13, 1341 the convent purchased four properties in Lamerdingen from a certain Elisabeth for approximately 20 Marks and 10 Shillings. On March 12, 1344 the convent again purchased a small property in Michelmat fromÂ Medingen. On May 7, 1344 the convent purchased a property in Ziemetshausen from Heinrich Herbot, and on July 21, 1344 the convent made an agreement with Agnes von Laugingen for the use of a farm in Untermeitingen for the sister Agnes (HÃ¶rmann, 309). On August 31, 1344 the convent purchased some fields between Augsburg and GÃ¶ggingen from Heinrich Portner for approximately 274 Marks. On November 19 of the same year the convent received nine more fields from Heinrich Portner. On January 26, 1345 the convent purchased a property in Modelshausen and four farms in Laugna from Conrad von Lauterbach for 28 Marks and 10 pennies. On November 23, 1346 the convent purchased three farms in Lugna from Luipold Negelin and on December 15 of the same year the convent sold a farm in Gablingen to the nuns Adelheid Gerutin and Adelheid Portner (HÃ¶rmann, 309). On July 22, 1351 Prioress Agens and the convent purchased a tithe in GÃ¶ggingen from Gertraud Otterin. Circa 1353 margravine Agnes bequeathed to the convent after her death: two farms in GÃ¶ggingen and Schwabeck in return for a Vigil and Mass to be held for her memorial yearly, she also provided for the wine and fish for the convent (on this occassion?); she provided further money for the celebration of memorials for her parents and relatives and for the king and queen of Hungary; she provided an annual allotment of 10 Shillings on Easter; she bestowed from a farm in Schwabeck for the provision of an eternal light for her grave rye, and other goods. She further appointed two nuns named Adelheid to serve as caretakers of her memorial, who should be replaced after their deaths by two more appointed by the prioress and convent. The use of a farm in Hiltenfingen fell to the two nun-caretakers and fell to the convent after their deaths. The nun-caretakers also recieved her cell in the dormitory and her chamber in the infirmary, which she had built at her own expense, as their dwellings and for their own use. She left her \"livingroom\" to the prioress. The chamber belonging to the caretakers should also be shared with any relative of Agnes' within the third degree who decided to enter the convent (HÃ¶rmann, 310-311). On July 14, 1355 the convent purchased two properties in Ober and Untermeitingen from Ulrich Kartinchen and on November 18 the convent purchased a farm in Hurlach from Gisela Welserin. On March 29, 1356, the convent purchased four farms in Orlfingen from Walter Rott. On June 12, 1357 the convnet received several properties from Berthold Riederer in Altenbaindt and afterwards purchased from him a farm in Eisenbrechtshofen. In 1359 the convent continued to acquire lands: a farm in Thierdorf and four farms in Weissingen from Hartmann Onsorg. On July 3, 1363 Prioress Adelheid decreed four new memorial-days in exchange for the acquisition of farm property in Nordendorf. The four memorials were for: Guta von Lauingen and her relative Elisabeth, Hans Argau and his wife, Katharina Rieder and her sister Anna of Lauingen, and one for her sister Anna and her parents (HÃ¶rmann, 312). On May 10, 1365 the convent purchased a fram from Karl Gollenhofer in Erringen and another in Bobingen from Adelheid Bursnerin in November. On December 17, 1369 the convent purchased farm property in KnÃ¶rringen from Conrad von KnÃ¶r; on November 29, 1271 it purchased a property in Kleinkitzgkofen from Conrad von Wabern and on December 4 of the same year, it received a garden in Untermeitingen from Conrad Neumayr. On February 6, 1376 the convent recieved a farm in Grosskitzighofen and a garden in Schwabmenchingen. Under Pioress Elisabeth von Argon the convent purchased a farm in GÃ¶ggingen on May 30, 1377. On April 19, 1379, it purchased farm property in Orlfing and a mill in Pfaffenhausen and another property in SchÃ¶nenach (HÃ¶rmann, 313). On August 19, 1382 the convent purchased two farms in Schwabmuenchen from Anna Renzin. The convent also purchased property in WÃ¶rishofen, a mill in Gamenried and another property in Schonspach in 1382. Under prioress Anna Dach, Wilhelm left the convent a pasture and garden in Wertach. On November 29, 1400 the convent received a garden in the parish of S. Stephans from Jos Heldenberger (HÃ¶rmann, 314). In 1402 the convent purchased property and two farms in Obermeitingen from Hans Algerzhofer. On July 15, 1406 the convent purchased a property in Ustersbach from Peter VÃ¶gelin, and in 1410 Anna Werishoerin established an eternal light and added a farm in Werishofen as well. In 1411 the convnet purchased a farm from Lorenz Rieder. On October 16, 1415 the convnet purchased a farm in Weissingen from Wernher Rosshaupter von Luagingen. On October 27, 1416 the convent obtained freedom from feudal duties for a farm in WÃ¶rishofen from Duke Ulrich von Teck and purchased from Heinrich Schellenbold a farm (HÃ¶rmann, 315). On November 21, 1437 the convent purchased a farm property in Schwabmuenchen from Hartmann Ehinger of Ulm through its provost Stephan Hagenor. Under Prioress Afra the convnet purchased a farm in Schwabmuenchen from Ulrich Kinzelmann for approximately 1900 fl. Circa 1440 the Augsburg patrician Hans VÃ¶gelin bestowed a farm property and the advocacy of a fiefin Pliensprach for the two nuns Lucia and Afra Langenmantel, who were his sisters (HÃ¶rmann, 317). On August 28, 1454 the convent purchased a farm in Ropeltshausen from Georg von Ellerbach for 520 fl. and on February 5, 1457 it purchased a farm in Heudaorf from Wilhelm Schenk (HÃ¶rmann, 318). On October 9, 1461 the convent purchased a property from the abbot and convent of the Holy Cross in DonaruwÃ¶rth. On December 20, 1466 the convent purchased a farm property in Dillishausen from the abbot and convent of Irsee fro 275 Marks (HÃ¶rmann, 318). On January 20, 1486 the convent purchased a farm in Dillishausen from Erhard Eberhard. Prioress Elisabeth died on June 12, 1490 and bequeathed to the convent a perpetual tithe and other goods (HÃ¶rmann, 319). Under prioress Walter the convent purchased on October 4, 1490 pasture before the \"red gate\" from Jakob Rehlingen. Under prioress Welser and her predecessor Anna Walter (late fifteenth century), the convent purchased large tracts of land in and around Augsburg (Cuneo, 23). The convent was continually enriched through the bequests of its nuns, who were allowed to own their own property and goods. For example in 1495 the death of the nun Anna Riedler left the convent with a yearly tithe of 4 fl. in Ulm and a pasture in Lechhausen. On December 4, 1502 a memorial was established for Ulrich Walter, a citizen of Augsburg, his wife Barbara, Anna Walter (the prioresss) and Maria Walter, a nun at S. Katharina, with a choral Mass and vigil. In return, Walter gave the covent a green silk robe and two choir robes and a painting (HÃ¶rmann, 319). ; By the late fifteenth century, S. Katharine's was one of the wealthiest of the city's seven convents. S. Katherine's wealth and status was protected by various papal and royal privileges that had accrued to the convent since the thirteenth century. Despite Dominican rules, the nuns at S. Katherine's were allowed possession and control of personal items, properties, inheritances, gifts, and other sources of income (Cuneo, 23). In the late fourteenth century, despite the vast acquisitions of the convent, the income was not sufficient to cover the expenses of the nuns. ; In 1293 the convent forged an agreement with the community of GÃ¶ggingen for the rebuilding and repair of the Wertach-bridge and the yearly fee from it (HÃ¶rmann, 303).","All Economies\u002fCistercian\u002fThe foundation of the convent was followed by donations from the founding family and surrounding nobles. In the fifteenth century the abbesses faced several disputes over the convent's properties. ; The convent became a pilgrimage spot for the Holy Trinity, making the convent wealthy. ; The parish of Pretzfeld was incorporated under the convent.","All Economies\u002fCistercian\u002fThe parishes of Gerhardshofen and Unterlaimbach as well as FrÃ¼hmesser in Dachsbach were bound to provide feudal duties to the convent. ; The convent's wealth was doubtless increased by the dowries of women entering the community (Krausen, 33). In July 1379 Cardinal Pileus, the abbot of Ebrach granted permission for the absolution of nuns admitted through simony in several convents, among them Birkenfeld (Krausen, 33).","All Economies\u002fBenedictine\u002fThe convent acquired landholdings through gifts and purchases. By the fifteenth and sixteenth centuries the convent's aquisition of land halted. The convent primarily held property in and around the city of Braunschweig. In 1245\u002f49 the convent held 22 hides, a farm, and a parish in the west half of the city. In 1256 the ministry official Bertram \"the elder\" von Veltheim gave the convent four hides in Gevensleben free from advocacy on the occassion of the profession of his two daughters (RÃ¶mer-Johannsen, 70). In the fourteenth century the convent acquired three mills, and a portion in the Lueneburger saltworks, as well as a fish-farm(?) (RÃ¶mer-Johannsen, 71). In 1370 Duke Magnus II declared that in the future no knight or princely advocate could take food or feed from the convent or its farms (RÃ¶mer-Johannsen, 71). The convent also held possessions in the areas of Lamme and in Lehndorf (in the city of Braunschweig) on the Heerstrasse toward Hannover; it had important possessions in Wedtlenstedt (in 1270-1284: 19 hides, 8 farms) and Zweidorf (RÃ¶mer-Johannsen, 82). In Welkeleghe the convent had two hides in 1271 which were sold in 1319. In 1329 it had rights over the forest in Dutzem; in 1355 it had four hides in this location (RÃ¶mer-Johannsen, 82-3). The convent also had possessions in Bortfeld ( in 1312 five and a half hides and farms), in Voelkenrode, and Wendeburg. In 1269 the convent held three hides in Denstorf. In Lamme in 1315 the convent held two farms, four hides and their dependents, and in 1322 it received rents from three hides. In 1343 the convent records six hides in Vallstedt; in Sonnenberg from 1379-1756 it held five hides and a farm. In the area of the city of Salzgitter, the convent held two hides in 1254 in Lobmachtersen, and in 1309 income from two hides. In 1283 it held a hide in Watenstedt, and from 1448-1753 the convent received tithes from two farms in Heerte. In the area of WolfenbÃ¼ttel the convent also held property. In Weferlingen it held four hides in 1268, two farms and seven hides in 1331. In Evessen the convent held from 1395-1423 a portion of the income of the knightly farms (nine hides) for the Mary-Magdalene altar (RÃ¶mer-Johannsen, 83). In Watzum south of Schoeppenstedt it held three hides in 1262 and four and a half hides, two farms, and fields in 1312. In Bisdorf on the Flur Barnstorf the convent held a hide in 1285 and two hides and two 'areas' in 1314. In Achim the convent had two hides in 1297 which it sold in 1355 to the convent of Neuwerk in Goslar. From 1359-1361 the convent had ten hides in Klein Biewende, and from 1365-1373 it had a farm with one and a half hides in Berklingen. In Wetzleben the convent held three hides from 1387-1389. In Gevensleben am Heeseberg the convent possessed twenty and a half hides from 1256-1343. In 1282 it acquired seven and a half hides here. In 1358 it recieved taxes from a farm with a half a hide. In Volkmardorf between Neubrueck and Didderse the convent held two hides bestowed by Duke Albrecht. In Rethem an the Aller west of Celle the convent held five hides, a farm, and a forest complex in 1301 (RÃ¶mer-Johannsen, 84). In the fifteenth century the convent suffered under the alienation of some of its property. In 1432 certain possessions were ordered to be returned to the canons of S. Cyriacus by Pope Eugen IV (RÃ¶mer-Johannsen, 72). Nevertheless, the convent was able to retain much of its landed possessions up to the present day (RÃ¶mer-Johannsen, 81). The convent had mills in Weferlingen in 1270 and 1331, in SchÃ¶ppenstedt in 1309, a windmill in Braunschweig in 1310, and a water mill in Wahle from 1335-1584 (RÃ¶mer-Johannsen, 84-5). The convent also received fees from the mills in Braunschweig, Eitzum, Lobmachtersen, and Erkerode. The convent possessed half of the fishing area in the Oker from the 'door of Peter' in Braunschweig to the \"Pfahldorf\" Oelper. In 1365 the convent acquired a portion in the LÃ¼neburg saltworks from the Benedictine monastery of S. Michaelis in LÃ¼neburg.","All Economies\u002fBenedictine\u002fIn 1344 Kitzingen received patronage rights over the parish church of Darstadt. ; At the request of the Counts of Henneberg and Castell, the abbess was permitted to enjoy the income of the convent's parishes for two years, since the convent had suffered economically from wars (in the mid-thirteenth century). The parish of Kitzingen was incorporated into the convent at this time (Klosterbuch der Diocese Wurzburg., 562). In 1284 Pope Martin IV ordered the provost of Bamberg to secure the convent's alienated property for the convent again. It is likely this property was alienated under the protectorate of Friedrich of Hohenlohe. Hospital .  Bishop Heinrich allowed the nuns to eat meat as well as change their habits from white to black. During this period the convent had grown lax and Bishop Otto of Bamberg reestablished order within the community (Klosterbuch der Diocese Wurzburg., 561).","All Economies\u002fBenedictine\u002fThe founder donated a great deal of money, as well as houses and servants. The first 3 abbesses both leased and acquired much property.","All Economies\u002fBenedictine\u002fchurch within Lucca, plus property around and behind it","All Economies\u002fBenedictine\u002fproperty was returned to Abbess Cecilia of S. Maria di Pontetetto (SeeÂ S. Maria di Pontetetto) [c. 1187?]","All Economies\u002fCistercian\u002fHad very few assets. May have requested alms c. 1308.","All Economies\u002fCistercian\u002fThe convent's possessions consisted of 771 acres of fields, 567 acres of meadow, and 1051 acres of forest (Link, 607). The convent also held rich possessions in the surrounding villages. ; The convent experienced financial difficulties during the sixteenth century, particularly due to the peasant's war.","All Economies\u002fCistercian\u002fIn addition to the rich lands that the convent held in Zimmern, it also held patronage rights in several parish churches in the surrounding area.","All Economies\u002fCistercian\u002fThe Housebook, begun in 1522, referred to the community as being in financial difficulties around that time. One of the purposes of the Housebook was to record and analyze the causes of the convent's economic difficulties and prevent future abbesses from making similar mistakes.","All Economies\u002fCistercian\u002fAt the time of its dissolution, the convent possessed 429 acres of wooded areas, 6 vats(?) of wine, 10 vats of the convent's own brew(?), and 223 acres of open fields. The convent possessed a farm (Sandhof) with 425 acres of fields, and another (Rothhof) with 650 acres of fields free from tithe. The convent also possessed the (now)-deserted settlements of RingshÃ¤user with 364 acres of fields and of Weisensee near Stadtlauringen. The convent further possessed fiefs in 33 locations, including Ostheim, KÃ¶nigshofen, GroÃŸbardof, and Saal (Link, 575-576). ; In the fifteenth century, economic difficulties led to the alienation of goods from the convent. For this reason, in 1444 Bishop Gottfried von Limpurg established an administrator for the nuns, who oversaw the convent's income and expenses for ten years (Krausen, 60). Due to the efforts of Abbess Katharina Zollnerin, the convent's economic position improved.","All Economies\u002fDominican\u002fOutside of the city, the convent held no rights and few possessions, only a few small farms and fields. Any acquisitions of the convent within the city involved the city council and overlords. ; The convent was never particularly well-off financially.","All Economies\u002fBenedictine\u002fThe foundation for the community was the \"Oratorium,\" which had an altar dedicated to Mary in conjunction with a chapel and garden. The chapel received income from two houses and a hospital in Goslar (RÃ¶mer-Johannsen, 262). The convent also possessed the house and farm of Provost Volkmar, four hides in Jerstedt (north-west of Goslar) and approximately eight hides of woodland in Ohlhof and half of the forest of Scherde. In 1186 a second altar was endowed with thirty stalls in the market of Goslar, which were rented out for 7 Marks yearly, in addition to eight hides (a hide =120 acres) in Ohlendorf and five and a half hides in Watenstedt (RÃ¶mer-Johannsen, 262). The letter of protection from Emperor Friedrich II on August 28, 1188 also mentions houses in a portion of Goslar known as RÃ¶merdorf, a house in the market, seven hides in StÃ¶ckhim (near WolfenbÃ¼ttel), four hides in Meimerdingerode (near Ohlendorf), in addition to property in Goslar with income from field and forest. The document also mentions a half of a mine in the silverworks in Rammelsberg (RÃ¶mer-Johannsen, 263). A document of Pope Innocent III from October 20, 1199 confirming the holdings of the convent mentions three portions of the forest in Axenberg with the neighboring smelting works, half of the forest in Camberg, and three mines in Rammelsberg. It also mentions three shares in the cobblers' shops and a house above the workshops. In addition, the convent owned seven hides in Alvesheim. In the thirteenth century, the convent expanded its land-holding, particularly through important acquisitions from 1208 to 1214 from the Benedictine monestary of S. Godehard in Hildesheim, in Alvese, Langelsheim and Bodenstein (RÃ¶mer-Johannsen, 253). In 1293 the convent was forced to hand over two of its mills to the city. The convent held property around Goslar (i.e. in Ohlhof, Jerstedt and Alvesheim) since its foundation in 1186\u002f1199, but its holdings between Liebenburg and Vienenburg developed more slowly. During the twelfth century, the convent slowly acquired acres in these areas. By 1355 the convent held 12 hides in Ohlhof, seven hides in Jerstedt, five and a half in Langelsheim, 16 hides in Alvesheim, and seven hides in Weddingen. It also acquired holdings in DÃ¶rnten (approximately 20 hides) and in Immenrode (20 hides by 1390) (RÃ¶mer-Johannsen, 264). The convent's holdings in Innerstetal were continually developed in the thirteenth century, above all through the transfer of the rights of the dukes of Wohldenberg over their vassals (RÃ¶mer-Johannsen, 265). In Klein Sehlde the convent held 2 hides in 1256\u002f58 and three in 1290; it had three hides in SÃ¶rde in 1259; in Baddeckenstedt it had three hides, three hides in Gronstede bei Steinlah and five hides in GroÃŸ Heer in 1302 (RÃ¶mer-Johannsen, 265). By 1355 the convent held 14 hides in GroÃŸ Sehlde, 14 hides in Klein Sehlde, 5 in SÃ¶rde, 9 in Baddekenstedt, and 4 hides each in Klein Elbe and GroÃŸ Heere. The convent also had substantial hodlings in the dukedom of Brunschweig; eight hides in Ohlendorf, seven in FlachstÃ¶ckheim, five and a half in Watenstedt and four in Meimerdingerode (RÃ¶mer-Johannsen, 265). In the fourteenth century the convent acquired more holdings in this area: 6 hides in GroÃŸ Mahner by 1302, 10 hides in GroÃŸ FlÃ¶theby 1309, and four hides in Lobmachtersen by 1317. To the east, the convent held six hides in Gielde, seven in Werlaburgdorf. The convent also held two hides in Achim in 1355 and nine hides in Ziesel in 1266. In the fourteenth century, the convnet preserved and expanded its holdings through purchase and exchange; it seldom sold property. In 1355 the convent held in total 235 hides of land (roughly 28,200 acres). In the fifteenth century the convent's economic growth halted and in the sixteenth century it experienced economic reverses (RÃ¶mer-Johannsen, 263). During these centuries, the convent's land acquisition halted completely. In the sixteenth century particularly the convent suffered from making forced loans to the duke of Braunschweig-WolfenbÃ¼ttel. ; Provost Johannes (1217-1251) and Bishop Konrad II of Hildesheim (1221-1246) developed the convent's economy the most. By the end of the twelfth century, the convent was so rich that it was able to build the Romanesque church still visible today. The fourteenth century was the richest period in the convent's history. (See also Contributors' Notes) ; In 1245 Bishop Konrad II of Hildesheim decreed that those who helped the convent build a water-system (plumbing) would share in the 'good works' of the convent. In 1274 and 1275 the city of Goslar was granted the right to tax the church's property. In 1304 the convent made a contribution for the support of the Holy Land. In 1366 it contributed 10 Marks silver to the diocese of Hildesheim. At this time the convent was still well-off, due to the numerous bequests for Masses and memorials from the local bourgeousie.","All Economies\u002fAugustinian\u002fAt the time of foundation the community probably possessed tithes, cottage tithes, and farms in the protectorship of Bienenbuettel (Urkundenbuch). The economic basis of the priory was founded on the dowries of the nuns entering the community (Riggert). The community also had numerous landholdings and holdings in the LÃ¼neburg saltworks. Among all the convents in the principality of LÃ¼neburg, Ebstorf had the largest number of saltholdings. The community held land and tithes in Bardenhagen, Bornsen, Ebstorf, Golste, Luchtmissen, Oetzfelde, Oldendorf, Tatendorf, Walmstorf, Wittenwater, Addenstorf, Bahnsen, Cote, Eddelstorf, Graulingen, and property in Abbendorf and Grieben (Urkundenbuch). The convent's possessions in these areas probably came from the founder or his son, Heinrich (Jaitner, 176). Circa 1225 the convent came into disputes with Corvey and Kemnade over six houses in Bahnsen and three in Graulingen. At the time of foundation, the convent also acquired tithes and farm land. In 1262 the convent sold a village near Eddelstorf toÂ Medingen. In 1318 the convent received the posision of Estorp bei Vinstedt, which was probably the ancestral seat of the family from Estorff (Jaitner, 175). The convent's possessions were divided between the provost and the community's holdings, as in all Benedictine convents (Urkundenbuch). In 1368 the convent received a half of the village of Hanstedt from Huner von Oedeme (Jaitner, 169). On May 25, 1372 the nephews of Huner freed the provost from the accusation-the confirmation of Duke Magnus followed on July 2- and transferred all their possessions in Hanstedt and its surroundings to the convent for 950 Marks (Jaitner, 169). Circa 1568 the provost held the largest portion of the tithes and landholdings and approximately half of the salt possessions (Urkundenbuch). In 1293 the convent acquired the tithe from Lehmke, Bohlsen and Hansen from the families from the Berge and Schulenburg. In 1300 the convent made its single biggest investment in the acquisition of the \"villam totalem Melzingen\" from the family of Meltzing for 100 Marks silver, which was composed of 15 farms and the family seat in 1568 (Urkundenbuch). There followed in 1318, two farms in Estorp; in 1324 the purchase of Barnsen for 300 Marks; 1325 three farms in Hohenbuenstorf and circa 1337 several farms in Westerweyhe and Altenebstorf (Jaitner, 177). In 1318 the convent received farms in Wessenstedt and Kirchweyhe; in 1320\u002f21 the tithes of Bargfeld and Breloh and in 1322\u002f23 several farms in Lehmke. In 1320 the convent purchased the whole villa in Linden (approximately 10 farms in 1568)for 210 Marks. In 1321 it acquired possessions in Stadorf for 335 Marks and the mill in Wittenwater for 25 Marks. The tithes from Tatendorf and Teendord were acquired for 100 Marks from Herman Klueving in 1244; from Etzen for 130 Marks from the family of Dyse in 1319; and the tithes from Bargfeld for 180 Marks from the family from the heide in 1321 (Jaitner, 178). Between 1368-1372 the convent acquired property in Oedemeschen and around Hanstedt for 1850 Marks silver. On February 14, 1368 Huner von Oedeme sold to Duke Wilhelm six farms, a half a castle, and a half a mill as well as the jurisdiction and patronage rights in the parish church in Hanstedt as well as further farms in Teendorf, Bode, Brauel, Allenbostel, Eitzen, Holthusen and Betzendorf. The duke in turn gave these to the convent in June of 1368 (Jaitner, 178). This included forest holdings and all the rights in these areas (Urkundenbuch). The community was exempt from regulations on cutting wood in Suessing in Hanstedt, Melzinger and Barnser. After 1360 the convent acquired by purchase and donation holdings in the cities of LÃ¼neburg and Uelzen, primarily consisting of rents from houses (Urkunden). From 1430-1451 the convent acquired property in MÃ¼den. In 1568 the convent held landed possessions in 66 places (40 of which belonged to the provost) (Jaitner, 177). The convent also owned mills in several locations, inluding Ebstorf, Lehmke, Eimke, Wittenwater, Stortenbuettel, Hanstedt, Barum and Hoesseringen, and Molzen (Jaitner, 179). The convent also had charge of a winery near Wessenstedt, a number of pastures, a fishery and brick-works and tile-works production, which was sold to Celle (Jaitner, 179). The convent also had extensive forest holdings, the most important of which was in SÃ¼sing. ; The community was quite wealthy. The wealth of the community is illustrated by the report that following the reform of 1469, the new abbess confiscated such quantities of gold and silver jewelry that after fashioning a portion into reliquaries so much remained that it had to be stored in a coffer (Hamburger, 119). The financial foundation of the convent rested on landed possessions, tithes and patronage-rights as well as urban possessions in the salt-works, of houses, and of rents in LÃ¼neburg and Uelzen (Jaitner, 175). The period of growth in the possessions of the convent existed from 1300-1350. In the thirteenth and fourteenth centuries the convent tried to secure and increase its economic basis. From 1293-1345 the convent was in the position to invest approximately 2440 Marks for tithes and 3060 Marks for possessions, and in 1367-1394 again approximately 180 Marks for tithes and 2850 for possessions (Jaitner, 176). After 1350 the convent experienced economic decline. ; The nuns in the principality of LÃ¼neburg were famous for their wool and silk embroidery and their textile production. It is unclear whether they received income from these productions. The convent also engaged in making loans to local families (Jaitner, 180). The convent also benefitted financially from the pilgrimages to the Ebstorf martyrs, which began during the fourteenth century (Jaitner, 187).","All Economies\u002fBenedictine\u002fIn 1172 Hildeswidis conveyed her personal property in Nordburstold to the convent. The convent also acquired 13 hides (hide = 120 acres) and interests in the salt works in LÃ¼neburg from the bourgeousie of Bardowikc, the cathedral chapter in Hamburg and noble gifts. Most of the convent's acquisitions of land came from the nobility, while its interests in the salt works stemmed from grants of urban residents (Reinhardt, 386). However, gifts accounted for less of the convent's holdings than purchases. It also acquired the land surrounding the chapel to S. Jacob, probably as a gift from the convent of S. Michaelis (Reinhardt, 378). In the first half of the thirteenth century the convent received property in both Dalldorf and Kalstorf as well as a little income from the salt works. No provost did more to improve the financial position of the convent than Johannes Weigergang. Between 1382 and 1405 he acquired 42 farms, five fields, wood- and fishing-rights, and income from the salt works (Reinhardt, 380). In return he sold only 10 of the convent's farms and a few small tithes and rents in the salt works. He ensured further financial stability for the community by influencing the election of his successor, his nephew Heinrich von Bodenstedt, elected by the nuns in 1412 (Reinhardt, 381). In 1369\u002f70 the convent's salt holdings encompassed 12 salt pans, 51 sections (Chor), 2 Plaustra and 2 rents. The convent was the second largest holder of salt possessions after the (male) convent of S. Michaelis in LÃ¼neburg (Reinhardt, 386). In addition to its salt holdings, the convent also owned land within the city of LÃ¼neburg. The convent acquired its first house within the city in 1271. By 1531 the convent owned six buildings within the city. Since 1391 the convent also possessed a mill in the city. The land-holdings of the convent were primarily concentrated between Ilmenau and Neetze. ; In the twelfth and early thirteenth century the convent's income was rather modest. The community's land holdings increased through personal bequests. As well as rebuilding of the convent in 1372, provost Weigergang secured the financial position of the community and acquired further privileges for the convent. By 1440 under the able leadership of provosts Johannnes Weigergang, Heinrich von Bodenstedt, and Cord van Tzerstede, the convent had achieved a level of prosperity and stability, which it would never reach again (Reinhardt, 381). ; The convent engaged in baking and brewing, which may date back to its medieval period, although definite confirmation is lacking. Reinhardt also surmises that the convent had a weaving-workshop within the cloister, although it is uncertain whether the nuns produced their tapestries for economic reasons (Reinhardt, 396). ; Circa 1389 the church in Betzendorf was incorporated into LÃ¼ne; from 1272-1536 the church in Rade was also incorporated into the convent. The chapel of S. Gangulfi was incorporated in the community from 1480-1531. The church in Adendorf was partially under the patronage of the convent from the thirteenth century. The church in Handorf was under the convent's patronage since 1282, as was the church in Thomasburg from 1361-1609. The church in Reinstrof was under the convent's patronage from 1361-1609 (Reinhardt, 392). In 1370 the provost, prioress, and convent of LÃ¼ne acquired the right of patronage over the vicary of S. Barbara in LÃ¼neburg, and since 1412 the prioress held the right to nominate the priests for the vicarage of S. Elisabeth in the S. John Church in LÃ¼neburg.","All Economies\u002fBenedictine\u002fMargrave Gero I endowed the community with the city of Geronisroth, the villages of Badeborn, Greater and lesser Alsleben, Osteregeln, Westeregeln, and Groningen at its foundation. After his death, Gernrode andÂ FroseÂ inherited all his possessions and holdings. Ci
