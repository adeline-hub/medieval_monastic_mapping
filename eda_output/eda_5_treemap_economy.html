Ecclesiasticus. The income of the community was judged at 24 pounds, 4 shillings and 4 pence at dissolution. The community also had a grange at Ehudan near Castell Caereinion. In 1546 the property was \"particularised\" for a grant to Sir Arthur Darcy of the site of the abbey with 2 acres of meadow land, 1 clause of arable, the rectory of Llanllygan with its tithes, and 2 tenements with appurtenances for 4 pounds, 3 shillings and no pence. ; It was very small and poor; the community was only modestly endowed.","All Economies\u002fGilbertine\u002fIt held numerous manors in Sixhgills, Ludford, Legsby, etc. and a market. In 1254 the income from spiritualities amounted to as much as 66 pounds; temporalities to as much as 100 pounds; by 1300 as much as an additional 75 pounds. ; The community was quite rich.","All Economies\u002fCistercian\u002fThe community owned land at Stixwould, Honington, Barkston, and Bassingthorpe. In 1291 the assets were valued at 117 pounds, and in 1534 revenue was 114 pounds. Lucy granted all her land in Stixwould, Thorp and Honington to the nuns (Women Religious: The Founding of English Nunneries After the Norman Conquest, 169).","All Economies\u002fBenedictine\u002fIn 1291 the community assets were valued at 69 pounds.","All Economies\u002fBenedictine\u002fIn 1353-4Â WothorpeÂ was united to Stamford.","All Economies\u002fBenedictine\u002fAccording to the Gesta Abbatum, the abbot Geoffrey endowed the community at Markyate with buildings, and when fire destroyed them, this settlement was sufficiently generous to provide for the community for a second time (Women Religious: The Founding of English Nunneries After the Norman Conquest, 57).","All Economies\u002fCistercian\u002fThe comunity's assets were about 10 pounds annually. ; Gokewell was so poor members had to rely on relatives for clothing.","All Economies\u002fCistercian\u002fIn 1291 the community was excused temporarily from taxes.","All Economies\u002fCistercian\u002fAssets included mills, crofts, etcetera inside Tathwell, Legbouren, and Hallington. The comunity was valued at less than 200 annually. In 1291 it was thought to be worth only about 20 pounds.","All Economies\u002fCistercian\u002fRichard de Lestre granted the nuns land and allowed them to have 3 oxen, 10 cows, and 200 sheep in his pasture.","All Economies\u002fCistercian\u002fThe community owned 120 acres in Torksey. Fosse was very poor.","All Economies\u002fCistercian\u002fThe comunity's assets were valued at 49 pounds, 5 shillings, and 2 pence at dissolution (1535).","All Economies\u002fCistercian\u002fThe community assets included land at Cotton, Swallow, Keelby and Great Limber. They also owned mills and a pasture. In 1291 it was valued between 35-60 pounds.","All Economies\u002fCluniac\u002fThe original endowment of the nunnery came from lands in Hardingstone which had been granted to S. Andrews (Women Religious: The Founding of English Nunneries After the Norman Conquest, 90).","All Economies\u002fGilbertine\u002fIt held granges in Alvingham, Corkerington, Grainthorpe, Keddington, etcetera. In 1254 the income recieved from spiritualities amounted to more than 56 pounds, and the income from temporalities amounted to more than 53 pounds. In 1291 the income from temporalities amounted to more than 81 pounds.","All Economies\u002fGilbertine\u002fThere is a considerable decline in income after 1348 because of depopulation in the parishes. In 1254 the income from spiritualities approximated 100 pounds and the income from temporalities amounted to 96 pounds. In 1291 the income from temporalities amounted to 111 pounds. ; In 1189 Bullington incorporatedÂ Tunstall Double Monastery.","All Economies\u002fGilbertine\u002fThey were considered poor in 1254. It held spiritualities amounting to about 20 pounds and temporalities amounting to 30 pounds. In 1291 the income from temporalities was under 34 pounds. It held lands in Bilingey and Walcot (Dugdale). ; One of the poorest Gilbertine houses.","All Economies\u002fGilbertine\u002fThe community owned mills, granges, and pasture for sheep that produced 15 sacks of wool annually. In 1254 it had income from spiritualities amounting to 40 pounds and from temporalities amounting to 101 pounds. In 1291 its income from temporalities amounted to 119 pounds. ; It took the site originally granted to Cistercian men by episcopy of Lincoln.","All Economies\u002fGilbertine\u002fIt owned 7 or 8 granges. In 1254 the income from spiritualities approximated 46 pounds, and the income from temporalities was around [under?] 100 pounds. ; In 1189 it incorporated the hermitage of Spaldingholm inside Yorkshire.","All Economies\u002fGilbertine\u002fThe assets of the nuns were indistinguishable from those of the canons, but Sempringham owned very rich pasture lands and did the little necessary cultivation itself. They also owned numerous villas. In 1254 the income from spiritualities amounted to 170 pounds and the income from temporalities amounted to more than 196 pounds, and then considerable difference by 1348 and thereafter. ; While the community had more than adequate means, it was not wealthy when one considers the number of its inhabitants. ; While the administration of the house was in the hands of 4 male proctors, the treasury was administered by the nuns, who kept it within their buildings. The treasury was presided over by three mature nuns, each who carried their own separate key.","All Economies\u002fAugustinian\u002fIn the 14th century, it held the church at Easebourn with dependencies and land holding on the Isle of Thorney, Dorset. It received a few donations, a chapter house worth 27 pounds, temporalities worth 41 pounds in 1291. In 1350 the community was poor and accumulated great debt in 1451.","All Economies\u002fBenedictine\u002fThe community had land holdings, manors in Sussex given by the founder, and a chapter house.","All Economies\u002fBenedictine\u002fThe community owned property in town and in the vicinity of the antique Franciscan male monastery, Clarisse, site des Castle, after 1285.","All Economies\u002fBenedictine\u002fUnder abbess Leofeva, the nun's church at reading held eight hides of land valued at 9 pounds (Domesday Book: a survey of the counties of England, I, fo 58ra).","All Economies\u002fBenedictine\u002fThe community's assets were mainly in land holdings. They had 6 carucates of land in Monkton and half a carucate in Kirk Hammerton.","All Economies\u002fCistercian\u002fOwned property at Basedale and Nunthorpe. In 1291 assets were valued at only 5 pounds, the poorest house in Taxatio of 1291. In 1535, annual income was 20 pounds, 1 shilling, 4 pence, according to Suppression Commission (PRO, SP 5\u002f2\u002f15-23). ; There were lay brothers recorded in 1197-1239.","All Economies\u002fCistercian\u002fLand holdings, a park, a mill, etc. in Kirkby Moorside. Keldholme also owned pastures in Ravenswykeet. The comunities assets were too low to be included in the 1291 Taxation roll.","All Economies\u002fCistercian\u002fThe community was quite rich.","All Economies\u002fCistercian\u002fIn 1267 members of the house exceeded its means, so the community was without assets.","All Economies\u002fCistercian\u002fAll assets totalled 13 pounds, 5 shillings and 4 pence at dissolution (1535).","All Economies\u002fCistercian\u002fIn 1267 the community had exceeded its means and no longer accepted new members.","All Economies\u002fCistercian\u002fIn 1397 the community has 50 acres of land.","All Economies\u002fCistercian\u002fThe community owned the site and land inside Thorp Arch. In York more than 23 pounds in pension from church of Ryther.","All Economies\u002fCistercian\u002fMessuage and 24 acres of land; Pickering in Lancaster[?] In 1291 assets were valued at 22 pounds.","All Economies\u002fCistercian\u002fOwned various lands within the vicinity.","All Economies\u002fGilbertine\u002fIt had assets in the township of Watton and land at Howald, Santon, Hilderthorpe, and Langtonet. The total assets of Watton in 1535 were 453 pounds gross; the actual value was 360 pounds.","All Economies\u002fAugustinian\u002fThe hospital's main assets were its extensive land holdings in Oxford. In the 14th century poverty allowed the hopital to be exempt from the payment of subsidies.","All Economies\u002fBenedictine\u002fThe community owned rural land in Oxford, Berkshire, and Cambridge. The community was generally poor, and in 1244 they petitioned parliament for rights to fish and haul wood. In 1524 their income was valued at over 33 pounds. \u002fadversary chapter house \u002f","All Economies\u002fBenedictine\u002fAt the time of foundation, John de S. John, a local lord, witnessed the charter of the bishop granting ecclesiastical immunities to the foundation and made a small grant of a meadow and a mill in Wolvercote (Women Religious: The Founding of English Nunneries After the Norman Conquest, 168). The community had land holdings both in and out of the province, in Northampton and also in Buckinghamshire, Somershire, Gloucestershire. It also owned urban property in Oxford as well as salt works, a mill, and chapter house. Assests were valued at 200 pounds in the years 1291 & 1445. The community was wealthy but was also in debt due to overspending. Assets were valued at 289 pounds in 1526 and 319 pounds in 1535. ; The abbey was one of the wealthiest of the post-Conquest foundations.","All Economies\u002fBenedictine\u002fUnder the abbess Eadgifu, Nunnaminster may have received two mills in exchange for surrendering an urban watercourse to New Minster. In 1066, Nunnaminster's total land holdings amounted to 73 hides and one and a half virgates of land valued at 79 pounds 15 s. By 1086, this land had been much reduced. ; The community educated girls.","All Economies\u002fBenedictine\u002fAt the Conquest Romsey owned land in Hampshire and Wiltshire that ammounted to 104 hides and was valued at 97 pounds. It was the fourth richest nunnery in England and its income exceeded many of the older established male houses. Its largest estates were in Romsey itself (14 hides, Hants.), Edington (30 hides, Wilts.) and Ashton (40 hides, Wilts.)(Foot, 153).","All Economies\u002fBenedictine\u002fThe Domesday book records Wherwell as holding 57 hides of land in Hampshire, 31 dwellings in Winchester, a fishery, and land in Southhampton. ; Wherwell was the second poorest nunnery recorded in the Domesday book.","All Economies\u002fBenedictine\u002fBishop Roger de Clinton granted the site and land at Farewell to assart to the hermits at the church of S. Mary and subsequently transferred the endowment, at the brother's request, to the community of women there. His charter to the nuns stated that he granted the church of S. Mary, with a mill, wood, pannage, and 6 villeins who had formerly been his tenants (Women Religious: The Founding of English Nunneries After the Norman Conquest, 196).","All Economies\u002fBenedictine\u002fThe early endowment of Nuneaton by Robert, Earl of Leicester, included the manor of Eton, and land paying 25 pounds of rent in Kintbury. His daughter Isabel and her son also made sizeable grants of two carucates of land and pasture for 300 sheep (S. Thompson, 165). Lands, chapter house, much locs, fair and market rights for Nuneaton and 3 shops in London 1375. Coalmine (needs verification). Fire and debt in 1250, poor in 1234 and 1292. Purchased in 1344. In 1291, 88 more pounds (2 pounds).","All Economies\u002fBenedictine\u002fThe community had land holdings, mills, a chapter house, and also owned doves and cottages. They exercised market, fair, and court rights in Polesworth. In 1536 the community was valued at more than 230 pounds. It was in good repair, owned equipment, bells, woods, and paid debts when due.","All Economies\u002fCistercian\u002fThe community had lands and also indulgences from the Archbishop in 1195; the Bishop of Worcester in 1253, and the Bishop Norwich in 1260. It was valued at more than 3 pounds a year in 1291, more than 27 pounds in 1535, and more than 25 pounds in 1536. In 1536 the community was more than 41 pounds in debt.","All Economies\u002fBenedictine\u002fEcgfrida apparently lived on estates that she later gave to the church of Durham.","All Economies\u002fPremonstratensian\u002fThought to be a small, poor community between 1216-20.","All Economies\u002fAugustinian\u002fLands, quarry, fishery, 2000 sheep (with grazing rights as of 1476), fulling mill, wealthy to termination date. Henry III granted the community 40 acres of forest (Thompson, 171). ; Considered wealthy until its supression (valued at 101 pounds in 1291). Assets totaled 194 pounds at the time of its supression.","All Economies\u002fBenedictine\u002fAccording to the Domesday book, Shaftesbury owned 40 hides at Don head, 20 hides at (Sixpenny) Handley, 10 at Tarrant (Hinton, 18 at Iwerne Minster and 15 at Fontmell (Magna) (Domesday Book: a survey of the counties of England, vol. 1, fo 78 vb; see alsoÂ Veiled Women, vol. 2, 166, n 4). This list apparently only represented a portion of the abbey's property at the time of Conquest. For a more detailed list of Shaftesbury's holdings seeÂ The Wealth, Patronage, and Connections of Women's Houses in Late Anglo-Saxon England, 163, andÂ The Abbey of Shaftsbury, 73. ; At the Conquest, Shaftesbury was the richest nunnery in England with lands totaling 353 hides in Dorset and Wiltshire. The gross value of the community's assets was, at the time of the Conquest, was 285 pounds. Hospital  It also showed the convent as owing a quota of 7 knights, earlier 10, to the king. In 1535 the community's net income was over 1166 pounds. ; Benedictine ; This was the largest nunnery in England. In 1218 the number of nuns was limited to 100, and in 1326 it was ordained that no more nuns should be received until the number had been reduced to 120. There were 55 nuns in 1441, 51 in 1560, 50 in 1504, and 57 in 1539.","All Economies\u002fBenedictine\u002fThere was extensive land holding before and after 1086 (SeeÂ Veiled Women, vol. 2, 222-230, for a summary of early gifts of land). The community had a chapter house, owned mills and houses, operated a fair, exercised jurisdiction and owned pasture rights with sheep. It was a quite wealthy community with approximately 246 pounds per year in income in 1086. More than 340 pounds per year in 1291. ; Wilton's wealth surpassed Shaftesbury according to the Domesday book.","All Economies\u002fBenedictine\u002fIt owned a chapter house Lennel, Hirsel, and a chapel in Bassendean.","All Economies\u002fAugustinian\u002fCommunity assets included a manor, a chapel in the cemetery of S. Mary Radcliffe, and part of the rectory at Backwell. Values are in a decline in 1383.","All Economies\u002fBenedictine\u002fThe community had land and other urban property in Wells and West Bath given by Richard d'Acton. John Blanket donated urban and suburban property in Bristol. In 1535 the community assets were valued at 29 pounds.","All Economies\u002fBenedictine\u002fAbout 1253, the nuns complained in a letter to Queen Eleanor that they were reduced to mendicancy. Soon after the nuns were placed under the guardianship of the prior of Denhall hospital. In the 14th century the dire financial situation of the nuns caused a great deal of tension between the townspeople and the nuns, who, along with their tenants, were often exempt from fines and fees that townspeople were expected to pay. In addition, the townspeople were often forced to subsidize nuns' living. This was somewhat settled in 1391-92 when the prioress paid a bond so that her tenants would show up to court and pay fines like the townspeople. However, this situation was short-lived.","All Economies\u002fBenedictine\u002fThe only record of the community's possessions come from the period of the Dissolution. The estate at that date donsisted of: land in Usk and adjoining parishes; land in Badgworth, Uphatherley and Downhatherley (Glos); the recotories of Usk, Cilgoegan [Llanfihangel Pontymoel], Llanbadoc, Llandenni, Llangyfiw, and Trostre (Monmouthshire). The community also received tithes in Raglan, Estavarney (Monmouthshire) and had an interest in the rectory of Badgworth (Glos). When the nunnery dissolved, the lead on the roofs was valued at 52 pounds 4 pence; a not very considerable sum (Usk Nunnery, 45). ; 69 pounds, 9 shillings, 81\u002f2 pence gross, 55 pounds, 4 shillings, 51\u002f2 pence net in Valor Ecclesiasticus. ; The chantry chapels in the priory church at Usk belonged to the local community, which shared the church, but the nuns had chapels dedicated to St. Mary Magdalene and St. Radegund of Poitiers within the priory precinct. Endowments and offerings at these chapels were valued at 4 shillings, 7 pence in Valor Ecclesiasticus but may have included other tithes which were accounted for under the general tithes of Usk. There is also some evidence for pilgrimages to the statue of Mary Magdalene at Usk.","All Economies\u002fBenedictine\u002fApparently there was an adjacent house of clerks or monks, and a school","All Economies\u002fCistercian\u002fchurch of Dun; villages of Elcho, Kinnaird, Binning, Standartis in Lotham","All Economies\u002fAugustinian\u002fThe community assets included land holdings, pensions, gift from benefactors and order of S. John of Jerusalem, and a chapter house. In the 13th century the community received royal gifts of wood for fuel and building. The community assets were valued at 223 pounds in 1535 when the yearly income included a small donation from the hospital at Carbrook. ; Duston Church was part of the endowment of Buckland in 1170 by William of Erleigh.Â The Victoria history of the county of SomersetÂ 6:264-65 available online atÂ [Victoria County History] ; HogshawÂ ;Â Gosford;Â Clanfield;Â SwingfieldÂ Shingay;Â Standon","All Economies\u002fBenedictine\u002fThe house was estimated to have sixty sheep, 1200 acres an Â£7 10s 0d from temporalities but no spiritualities.","All Economies\u002fAugustinian\u002fvilla of Killogainechan with possessions","All Economies\u002fAugustinian\u002f1591: 3 carucates of land near water of Lorgbella, val. 5 shillings Irish \u002f 6 quarters, ca. 180 acres","All Economies\u002fBenedictine\u002fAt termination: church and belfry, dormitory, hall, 3 chambers, kitchen, etc., with precincts of 2 acres; possessions included about 880 acres, 14 rectories, 7 chapels; total value 34 pounds \u002f other property mentioned in inquisition of 1594: castle, about 120 acres at Loch Mask.Â Monasticon hibernicum, or, A history of the abbeys, priories, and other religious houses in Ireland : interspersed with memoirs of their several founders and benefactors, and of their abbots and other superiors, to the time of their final suppression, 799. Granted in 1562 to Richard, Earl of Clanricarde;Â Monasticon hibernicum, or, A history of the abbeys, priories, and other religious houses in Ireland : interspersed with memoirs of their several founders and benefactors, and of their abbots and other superiors, to the time of their final suppression, 270; alsoÂ History of the archdiocese of TuamÂ i. 214.","All Economies\u002fAugustinian\u002fvalued 40s. 10 Mar 1542 at dissolution; sites and temporalities granted to Sir Marmaduke Whitchurch and J. Wakeman, tithes granted to Marmaduke (Medieval Religious Houses, Ireland: With an Appendix to Early Sites,321)","All Economies\u002fAugustinian\u002fendowed at foundation with manors of Dunsink and Ballugodman \u002f 1540 church, cloister, other superfluous buildings sold; other buildings necessary to farmer; demesne 225 acres with mill, messuage; possessions circa 2,412 acres, 2 manors, many farms, messuages, cottages etc., 2 other water-mills, interest in 3 churches, val. over 108 pounds 17 shillings gross, 104 pounds 17 shillings net.","All Economies\u002fCistercian\u002fThe inquisitions of the 16th and 17th centuries list estates belonging to Kildare: ; For much of its early history, Kildare was one of the wealthiest communities in Ireland. SeeÂ Vita sanctae BrigidaeÂ and below.","All Economies\u002fEarly Irish Monastic\u002f8 cartrons land 1595","All Economies\u002fAugustinian\u002fvalued at 2m. in taxation of 1302-6 \u002f vested in crown 1584","All Economies\u002fEarly Nubian Christian","All Economies\u002fArmenian Orthodox","All Economies\u002fGeorgian Orthodox","All Economies\u002fEthiopian Orthodox","All Economies\u002fLebanese Maronite Order","All Economies\u002fCoptic Orthodox","All Economies\u002fCistercian","All Economies\u002fBenedictine","All Economies\u002fGreek Orthodox","All Economies\u002fRomanian Orthodox","All Economies\u002fFranciscan","All Economies\u002fAlbanian Orthodox","All Economies\u002fClarisse","All Economies\u002fAugustinian","All Economies\u002fDominican","All Economies\u002fKnights Hospitallers","All Economies\u002fJesuati","All Economies\u002fCamaldolese","All Economies\u002fSecular Canonesses","All Economies\u002fBeguine","All Economies\u002fHumiliati","All Economies\u002fPremonstratensian","All Economies\u002fGilbertine","All Economies\u002fCluniac","All Economies\u002fEarly Irish Monastic","All Economies"],"labels":["For their own needs, they used a flour mill and an oil press. Their menu consisted of meat (pork, mutton, goat, antelope, etc.), sorghum (in particular sorghum bread: kisra eaten from Meroitic times to the present day) and purslane. They practiced weaving, leather work and wrote documents[3]. They had two iron-casting workshops (furnaces have been found on site).[4][3] They possessed knowledge of medicine as evidenced by the remains of medicinal plants found at the site (Portulaca oleracea, Euphorbia aegyptiaca and Cleome gynandra). Three languages were spoken within the monastery: Coptic for the liturgy, ancient Nubian for everyday language, and Greek, many epigraphic inscriptions or on artifacts testify to this diversity. The average age of death was between 35 and 50 years old, the monks were buried nearby. A cemetery with 800 graves has been excavated to the south of the monastery.","In the 14th and 15th centuries, the monastery hosted one of the most important Armenian medieval universities, the University of Tatev, which contributed to the advancement of science, religion and philosophy, reproduction of books and development of miniature painting. Scholars of the Tatev University contributed to the preservation of Armenian culture and creed during one of its most turbulent periods in its history. The restoration of the monastery, re-establishing its educational legacy and reviving monastic life at Tatev is one of the main goals of Tatev Revival Program, a part of which is the Wings of Tatev aerial tramway,[2] a cableway from Tatev to the village of Halidzor, which was opened in October 2010.[3][4] It was included in the Guinness World Records as world's \"longest non-stop double track cable car.\"[5]","While the main chapel was built in 1215, the monastery complex was founded in the 4th century by Gregory the Illuminator at the site of a sacred spring inside a cave. The monastery had thus been originally named Ayrivank (Այրիվանք), meaning \"the Monastery of the Cave\". The name commonly used for the monastery today, Geghard, or more fully Geghardavank (Գեղարդավանք), meaning \"the Monastery of the Spear\", originates from the spear which had wounded Jesus at the Crucifixion, allegedly brought to Armenia by Apostle Jude, called here Thaddeus, and stored amongst many other relics. Now it is displayed in the Echmiadzin treasury.","Life on the Pillar: A monk living on Katskhi Pillar in medieval times would have experienced profound solitude. Access was via a dangerous rope ladder, isolating him from all but the most determined visitors or support personnel. Life would have been focused on constant prayer, fasting, contemplation, and likely manual labor involved in daily survival on the limited space. It was a form of stylitism, though the \"pillar\" is a broad rock formation, not a narrow column.\n\nSupporting Community at the Base: While the most famous aspect is the life on the pillar, there would have been a supporting community (perhaps just a few monks or lay helpers) at the base during the medieval period. They would have been responsible for hoisting supplies (food, water, building materials), communicating with the hermit, and potentially maintaining a church or chapel at ground level for broader worship.","Notable possessions\nCurrently the monastery houses a number of ancient relics, which include a manuscript copy of the Book of the Gospels written around 1280; Egre-muk (or wooden-cuffs), a huge pot which ancient monks used to cook, and other 13th century objects.\n\nAnother prized relict is an icon of the Christ child sitting on his mother's knees, known as \"The One Who Listens\", which the monks believe is miraculous. Created in the 15th century, the icon was cleaned and repaired by a British charity, The Ethiopian Heritage Fund in 2010, and subsequently was housed in a special museum as the monastery.[4]","The monastery is one of the richest of the Maronite Order, owning large properties in the valley, which has allowed it to contribute financially to the maintenance of its less fortunate monasteries.","In addition to prayer and worship, daily life in the monastery focused on the production of food and clothing. Monks worked in agricultural production, in food preparation, and as doctors. Female monks were responsible for making clothing. In addition to supporting the monks, the monastery also supported the surrounding villages and those seeking hospitality and charity (17-20).","By the end of the 13th c., the community's patrimony inclued rulership of TragÃ³, Salaverd, Canelles and CÃ©rvoles, with its sanctuary. ; S. Maria de les FranquesesÂ in 1452.","Included the village of Piasca, the church of s. Eulalia, and numerous properties near Piasca, as well as the more distant community of S. Julian and its properties (after 1045). Also controlled numerous churches, includeing Santiago y Santa MarÃ­a de Perrozo, San JuliÃ¡n de Plano, and San Pelayo and San Miguel de Luriezo. ; S. Julian, in 1045","Held lands in nearby valleys, as well as the church of S. Joan dâ€šIsil.","It probably served as an inn or hostel for pilgrims, tourists, merchants and their animals.[3]","In 1110, the convent received revenues produced from landed estates and other properties which they owned. These estates required lay property administrators. The convent possessed property which surrounded the convent, including the house of Sophianos with its land, the house of Euphemia near Sophianos, the house of Bardales that is of Kourasmene, the house of Kapassou, the house of Angelina the priestâ€™s wife, the house of Angelinaâ€™s daughter, the house of Souroumina, the house of Garatzias, the house of Syropoulos with the vineyard, the house of Pelekanos, the house of Boutzas, the house of Theodora Kathare, the house of Gerakares, the house of Roudroa, the house of Thomais, the house of Tzoukis, the house of Chamopournea, the house of Katakalos and another house near this one. The convent also owned a house next to the warehouse, the house once belonging to Sophianos, the house of Tzegoudes, the house of Sophianos, the house of Latouros, the houses of Apedou, the house of Mauraganos, the house of Maurianos, the house of the priest Zagaras, the house of Thomais, the house of Michael Charastias, the house of Triantaphylos, the house of Mauros, the house of Charatzias, two vineyards, and a small group of other houses and buildings. ; Patriarch Nicholas III Grammatikos donated a patriarchal convent, Ta Kellaraias, to the Kecharitomene Convent. Ta Kellaraias was intended to serve as Kecharitomeneâ€™s mortuary chapel.","The empress endowed her foundation with properties from Constantinople and Smyrna. The steward was responsible for the management of the conventâ€™s property. He appointed property administrators for conventâ€™s estates, managed agricultural lands, and maintained buildings.","Theodora donated half of her ancestral estate, called Pyrgos, to the convent. She and one of her sons also donated the village of Ainos and the village of Morokoumoulou. She also bequeathed a number of vineyards to the monastery. These included vineyards near St. Nicholas Mesomphalos, near the land of Kosmidion, in the village of Kanikleion, and in the village of Pegai (Bebaia Elpis: Typikon of Theodora Synadene for the Convent of the Mother of God Bebaia Elpis in Constantinople, ch. 121-123). ; The convent's chief financial officer was the steward, an office designated for a nun (Bebaia Elpis: Typikon of Theodora Synadene for the Convent of the Mother of God Bebaia Elpis in Constantinople, ch. 54-55). The storeroom supervisor also kept accounts for household goods such as clothing and bedding (Bebaia Elpis: Typikon of Theodora Synadene for the Convent of the Mother of God Bebaia Elpis in Constantinople, ch. 69-70).","Necropole","S. Maria de PenardellÂ in 1436 or slightly thereafter.","A document issued on 29 January 1322 by the king Charles I of Hungary states that ten villages were in the possession of the Cistercian monastery of Cârța: Cârța (Kerch), Criț (Cruz), Meșendorf (Messendorf), Cloașterf (villa Nicholai), Apoș (villa Abbatis), Cisnădioara (monte sancti Michaelis), Feldioara (Feldwar), Colun (Colonia), Glâmboaca (Honrabah) and Cârța Românească (Kercz Olachorum) which correspond to the area between present day cities of Sibiu and Brașov and the Târnava Mare River valley.\n\nIn the second half of the 13th century, in its vicinity, on the right bank of the Olt river, the village of Cârța (German: Kerz) was founded and also on the Hârtibaciu River valley, close to Agnita, it founded the village of Apoș (German: Abtsdorf, or \"the Monk's Village\"). Both villages were populated with German colonists (Transylvanian Saxons) and later in the 13th and 14th centuries on the Sighișoara seat, it founded the villages of Criț (German: Deutsch-Kreuz; Hungarian: Szászkeresztúr), Meșendorf (German: Meschendorf; Hungarian: Mese) and Cloașterf (German: Klosterdorf; Hungarian: Miklóstelke), and also the villages Colun (German: Kolun; Hungarian: Kellen), Glâmboaca (German: Hühnerbach; Hungarian: Glimboka) and Feldioara (German: Marienburg; Hungarian Földvár) situated on the right bank of the Olt River between Sibiu and Brașov.","At the end of the 13th century, the community possessed a substantial number of buildings, churches, farms and other properties located in more than 40 localities throughout the diocese of Gerona, including many the same valley as the monastery itself, in Vilablareix and Vilademuls. For a more detailed listing, seeÂ Col.lecciÃ³ diplomÃ tica de Sant Daniel de Girona (924-1300), pages 29-47. ; Wealthy. ; Incorporated the priories of S. Maria del Mar de Calonge,Â S. Margarida de Vilanera, possiblyÂ S. Cugat del Far, and finallyÂ S. Maria de ValldemariaÂ (1550).","The emperors gave also the Great Lavra many other lands of property including the island of Saint Eustratius and the Monastery of Saint Andreas in Thessaloniki. This led to the growth of the monks from 80 to 120.","The Karakallou Monastery (Greek: Μονή Καρακάλλου) is an Eastern Orthodox monastery at the monastic state of Mount Athos in Greece. It stands on the south-eastern side of the peninsula and ranks eleventh in the hierarchy of the Athonite monasteries. The monastery has 50 working monks, and its library holds 330 manuscripts, and about 3,000 printed books. It was founded in the 11th century. In the 13th century, as a result of the activity of pirates and Latins, Karakallou was totally deserted.\n\nBy the end of the 15th century according to the Ruthenian pilgrim Isaiah, the monastery was Albanian.[1] The monastery was rebuilt in the 16th century by Moldavian voievod Peter IV Rareș.","Property in the Barcelonan locations of Espluga and Santa Coloma de Queralt, and in the â€žsegarrenquesâ€° of Passanant and Tallada.","The original founder endowed the convent with properties, but these were lost during the Latin occupation (Anargyroi: Typikon of Theodora Palaiologina for the Convent of Sts. Kosmas and Damian in Constantinople, ch. 2). In a tradition of place here from old Asclepius healed people with the healing waters of the source and the foundations of the holy Saints Anargyroi continue to treat people … not only from physical illness. The beginning of the history of the monastery dates back to the 11th century. A.D. But from the 16th century. clear and accurate evidence and details of its history.","Abbess Emma's dowry went to the community as soon as she had attained her majority. This substantial territory was bordered by the valley Santajuaneca, Estamariu, the valley of Ripoll, Mogrony, Conflent, Cabanes and Alt Emporda. Later, Emma's initiatives and influence helped to extend the community's territory as far as Congost, the Valles, and the valley of Cardener. Successive abbesses further enlarged the community's territory. ; Extremely wealthy. ; The community was very active in the effort to resettle Old Catalonia. All of the abbesses, beginning Abbess Emma, dedicated themselves to establishing new churches in their territories, and bringing in new settlers to populate them.","The inventory for the convent is alluded to in the typikon but no longer survives. The superior did possess a number of books which she was prohibited from loaning out (Neilos Damilas: Testament and Typikon of Neilos Damilas for the Convent of the Mother of God Pantanassa at Baionaia on Crete, ch. 19-20). ; Neilos Damilas forbid that nuns do any work outside the monastery, although he does allude to the possibility that nuns could produce goods to be sold to outsiders, monks, and laymen. Nuns also exchanged goods with the male monastery (see above) (Introduction,Â Neilos Damilas: Testament and Typikon of Neilos Damilas for the Convent of the Mother of God Pantanassa at Baionaia on Crete, p. 1463).","The monastery acquired a metochion at Kapraina, the modern village of Koprena or Avra near Kalabaka.","the school became one of the places where the Albanian Language was taught. The monastery has a Byzantine-orthodox architecture but with many romanesque features, which lies in a surface of 2.500 meters square. It is composed of the Saint Mary Church, the chapel of the Saint Trinity, a mill, and a barn.[5] The Church of Saint Mary in the Monastery of Ardenica has important frescos from Kostandin Zografi and Athanas Zografi. These painters from Korçë worked on the church in 1744. The frescos include an Old Testament and a New Testament, Dogmatica, Lithurgy, Life of Saints, etc.[5]","In 1097 the community recieved numerous gifts from Goffredo, conte di Conversano, among which were the castle of Tuturano and the churches of SS. Cosma e Damiano and S. Eustasio.","Originally well endowed, abbey suffered during Thirty Years War when nuns fled to Poland; fled again in 1663 because of Turkish invasion.","In 1244\u002f45, S. Giacomo, together withÂ S. Lorenzo di Collazone, paid one pound of wax.","The convent obtained various good throughout its existence, including vineyards and other properties (Schimmer 387). ; After the death of their Abbess Barbara in 1557, the sisters of S. Clara were incorporated into the S. Jakob convent (67).","During its existance, Himmelpforte purchased and was presented with several vineyards. ; The sisters were involved in various handiworks, such as weaving, laundering, sewing and knitting. Some of the oldest Viennese financial records and documents mention other ministrations and services that the Himmelpforte sisters personally provided to neighboring households (Zak 187).","[Letter to the monastery of St. Marienthal]","United with the monastery S. Antonio di Dronero in 1188 (seeÂ S. Antonio)","Substantial properties in Morozzo, and around the monastery.","The convent owned land, mills, villages, and had patronage rights in various churches. During the fourteenth century the convent's land holdings streached towards the west in the direction of FÃ¼rstenberg. When Hans von Arnim purchased all the convent's holdings in 1539, he purchased all the villages, fiefs, rents, tithes, outbuildings, fisheries, ponds, mills, water, woods, fields, and hunting rights as well as income from legal fees that the community had in its possession. ; The convent was quite wealthy in the thirteenth century due to donations. In 1281 the convent purchased land for 200 Talents. After 1350 the convent suffered economically and was forced to sell portions of its land. At the beginning of the fifteenth century, the convent recovered a bit economically, but it no longer acquired large amounts of land.","Owned church, vinyards, garden. Received land from emperors and bishops in 12th and 13th c. Had enough money to by 19 pcs. of land and a castle \"di Ceresio\" in Valle Castella. The also posessed land, houses and a church in Montelparo. Syndics administered the property and defended the nuns of acting according to the __Capitula et Constituziones de Castro Ceresia.__ At the end of the 13th c., they discovered thefts that they attributed to the 9 conversi and 3 familiares who adminsitered their property and they appealed to the pope. Two years later, on January 8, 1297, Boniface VIII wrote to the abbot of A. Pietro Interito and asked him to announce in church that, unless the stolen goods were returned, he would excommunicatae the delinquents. There seem to be no further references to this affair. In 1194, the monastery acquired mills from the Bishp Alberico in exchange for a gold challice and a case of silver. Nicholas IV sent the nuns two seperate bulls ordering that rectors should not permit the citizens to use the mills belonging to the monastery. By 1300, however, there was general agreement that the mills belonged to the city but that servants and other members of the monastery had every right to have their grain ground there. ; Very Wealthy.","Some time before 1448, the nus also gained the monastery of Contrada Torresane","Incorporated the cell of S. Croce de Clenti (diocese of Fermo) in 1260, by provision of Alexander IV.","A portion of the Petersfrauen property was guarded by the brothers at the abbey. This part mainly consisted of the dowries given by young women for their admission. Dowries could be any combination of money and land plots (Gueter). The convent also possessed a respectable Klosterschatz, or â€œconvent treasure,â€ comprised sacramental objects containing precious metals and stones, as well as statues and jewelery. ; The Petersfrauen led a humble existence in comparison to their neighbors at Nonnberg. This life was enriched under the rule of Abbot Otto II., the great benefactor of the womenâ€™s convent (â€der grosse Wohltaeter des Nonnenklostersâ€ â€“ Dopsch (Die Petersfrauen)), who pledged generous financial support to the nuns. ; While knitting and needlework were also important activities, the Petersfrauen were especially known for their writing and illustration of Psalters and other liturgical manuscripts. The sisters also ran a school for young women, according to 15th century documentation (Schellhorn,Â Die Petersfrauen, 147).","Nonnberg received generous material gifts from the 8th century duke of Bavaria and the 11th century Emperor Heinrich II. For further accounts of the conventâ€™s endowments, consult the Esterl chronicle, cited in the bibliography. ; The last two remaining members of the Petersfrauen of St. Peterâ€™s Abbey were absorbed into Nonnberg on August 12, 1583.","1459:Â S. Filipo; 1513:Â S. Maria Maddalena, which had also absorbedÂ S. OrsolinaÂ some time in the 13th c.","Incorporated S. Chiara (seeÂ S. Chiara) in 1485, per the order of Pope Innocent VIII. According toÂ RÃ©pertoire topo-bibliographique des abbayes et prieurÃ©s, both of these houses were combined to form a new monastery in the same town, founded by Baptiste Malatesta c. 1440.","Had lands around Assisi, perhaps came from the sister and niece of the Abbess Mattia di Andruccio (1404).","In 1356, the chapter discussed selling two properties (Salce and Scuccula) to pay for reparations. ; Wealthy in late 13th and early 14th c., then begins to decline. ; In 1408, it was united with S. Andrea de vineis. Transferred to the city to \"Poggio\" or \"Poio.\"","Some time between 1408 and 1411, it incorporated into S. Stefano di Vallacera and S. Tommaso de Bocetis. When the monastery took the name S. Nicolo, the church continued to be called \"Madonne delle Rosa until the late 18th c.","United with the monastery of S. Bartolomeo e S. Paolo in 1406.","Bulls of 1441 and 1445 (Eugenius IV) united S. Maria Maddelena d'Alba to Certosa. On March 11, 1556, Pius V's bull united S. Maria delle Gratie with Certosa. [Note: these seem to be the same monasteries that were united with #S. Maria di Belmonte, S. Maria di Belmonte. The foundation dates for Belmonte and Certosa are given as different, but otherwise the records do not contradict each other. It is therefore possible that the two houses are one and the same. --mk)","In 1406, sister Caterina di Lucia Alfani bought a house in Porta Cintra for 12 fiorini.","Owned land, vineyards, houses, olive trees and forests at Valliano, S. Maria de Oliveteto [sic?], Bolserano, Monteleone, Galterio, :upazone, Marignano, Casale and Villa di Campo. Also Chiesa di S. Maria di Presso, and Chiesa di Castiglione di Valle. ; Wealthy.","Halberstadt (Dominican nuns)Â andÂ S. Maria della CroceÂ in 1314.","In 1232, Pope Gregory IX gave the community ofÂ S. SylvesterÂ jointly to S. Maria Vallegloria and toÂ S. MariaÂ (Spoleto).","S. AgneseÂ in 1478, andÂ S. AnnaÂ in 1485.","In 1264, Paul and Thomas Offreducci, bound to S. Francis and S. Clare with family ties, sell lands, houses and gardens in the Porta Moiani, in the parish of S. Maria Maggiore. In 1316, Latinus Balerio, syndic and procurator, sells all the land the community owned in the vicinity of the commune, with the exception of the monastery gardens. In 1333\u002f34 it paid 7.5 decime, and in 1354 the property was valued at 6,171 lire. ; S. Paolo delle AbbadesseÂ in 1453 (See \"Litigations,\" below)","It owed 18 salme of grain and 30 cadi of wine and oil (to bishop? needs verification).","Owed 25 salme of grain, 100 codi of wine and oil (to the bishop? needs verification)","The monastery prospered in the early years, but as the Protestant Reformation gained influence, the daily search for food and alms for the poor began to dry up. Many Danes felt that the mendicant orders, nicknamed the 'beggar monks and nuns' were an additional burden over and above the regular tithes and fees paid to sustain the church. In 1527 a priest formerly assigned to the monastery wrote to King Christian II, describing a chest which the abbess of the monastery had given him to distribute to the Poor Clares in Odense, who were suffering dire poverty. The abbess had asked him to convey the money in secret because she was afraid if the amount became known the Order would be held up to scorn and ridicule. He encouraged Christian II to return to Denmark to take in hand the care of the Poor Clares who had been his mother's 'particular and elect' daughters.","The 1354 register of religious groups in the commune of Assisi estimated the property of the monastery at 53.290 librae per year.","The convent held possessions in 17 villages (Blesendorf, Boddin, BÃ¶lzke, Breitenfeld, Damelack, Halenbeck, Kemnitz, Kolrep, Old and New KrÃ¼ssow, Langnow, Rapshagen, Sadenbeck, Sarnow, SchÃ¶nebeck, Techow, Wilmersdor, and Klein-Woltersdorf). Provosts were responsible for the economic mangagement of the convent. Among the farm buildings were a corn house (used for storage of grain), a bakery with a bread cellar, a brewery with malt house, a brick oven, and a water mill. Among those dependent on the convent numbered millers, cooks, malters, fishers, cattleherds, blacksmiths, laborers, maids, and scribes. They also employed an apothecary and had their own brick oven for manufacturing bricks. ; The community supported approximately 180 people, including nuns, servants, the poor and ill.","S. Andrea de BiberaticaÂ (needs verification)","The community tried to build up a base of properties within the city of Rome and in the surrounding countryside (the Roman Campagna). The community's assets grew steadly during the course of the 15th c. ; Very affluent, esp. during the 15th and 16th centuries.","Through donations and the rich dowries of the inhabitants the convent's property was greatly expanded. By the time of its dissolution the convent held 65 farms with 183 dependents. In 1299 the convent acquired secular jurisdiction over its dependents, and in 1317 it obtained spiritual jurisdiction as well (Krausen, 90).","Real property including farm estates cultivated by tenant farmers in the enviorns of Rome, as well as buildings, and parts of various kinds of structures within Rome, including part of the Colosseum. ; S. Maria TempoliÂ (1221),Â S. Bibiana all'Orso PileatoÂ (1221),Â S. Cesario \"Corsarum\"Â (1433), Santa Aura,Â S. Cosma e S. Damiano in Mica AureaÂ (possibly in the fifteeth century). Santa Aura was Dominican and San Cosimato Benedictine at the time of incorporation. The other three Roman communities are generally considered or assumed to have been Benedictine.","In 1477, the abbess ofÂ S. Maria in GiuliaÂ united the communities of S. Filippo, S. Sepolcro, and S. Maria Maddalena with S. Maria del Ponte. The latter tried to reestablish itself as a separate community in 1452, but a bull of Pope Sixtus (1473) restored the union.","Had 2 mills. ; Fairly wealthy. ; Property was administered by a provost.","United withÂ S. Maria di CamianoÂ in 1413, and both communities were immediately incorporated byÂ S. Angelo della ValleÂ (see below).","In 1413, S. Giovanni temporarily took in nuns ofÂ Maggiore di Monte MascaranoÂ who were unsatisfied with the community ofÂ S. Angelo della ValleÂ into which their community had been incorporated. The nuns of Montesanto eventually rejoined S. Angelo (by then renamed S. Francesco della Valle) in 1433.","Very poor. ; 1316: received alms from the Brothers of Penitence","Received alms distributed by the Brothers of Penitence in 1316.","In 1399 they were given the goods of Monte Tezio, together with workers and animals.","In 1292, the priors of the comune of Perugia gave the community the castle of S. Egidio di Colle with its temporal and spiritual jurisdiction. ; Very wealthy.","Acquired the church of S. Angelo outside Montemelino in 1500. ; Very poor. Received alms in 1316, 1458, 1484, 1485, 1499 (the last of these was to repair damage to the walls). ; June 10th, 1253, nuns fromÂ S. Angelo de ArenariaÂ bought the properties from the Franciscans brothers (who moved on to the S. Francesco al Prato), and founded the community of S. Francesco. In 1302, they were united withÂ S. Maria di Valverde,Â S. GalganoÂ in 1412, andÂ S. AgneseÂ andÂ S. Giovanni di ColumbellaÂ in 1422.","The sisters requested alms and grain in 1455, 1458, 1459 and 1461.","Until 1302 they bought houses in the city to form a monastery. In 1310, Suor Agata, abbess, bought three houses from Rainaldo del fu Cambio. Abbess d. Anna and 15 nuns (date?) sent to Bishop Tifernate Ugolino the syndic fra Giovanni Dettalevi, asking him to allow the nuns to build an oratory. The bishop goave his permission, in exchange for one libra (pound?) of wax annually. In 1342, Bishop Ugolino II gave them the right to build a cemetery.","In 1477, Domina Giacobba di Giovanni Peri, Abbess ofÂ S. Maria in Giulia, orderedÂ S. Maria del PonteÂ (which had only 2 nuns) and S. Lorenzo di Borgo S. Sepolcro to be united with S. Sperandio. S. Maria del Ponte broke the union in 1452 and Sixtus IV renewed it in 1473. In 1574, the nuns of S. Maria transferred toÂ S. Margherita. A final union with S. Maria delle Grazie di Rsarello (Clares) was accomplished only on June 28, 1930, and was opposed by D. Caterina di Perugia.","In 1291, the community had a \"piscinale\" outside the Porta S. Maria, in the parish of S. Maria Maggiore. ; S. Agnese","23 March, 1460: incorporatedÂ S. Maria de PupulaÂ andÂ S. Maria della Fonte fuori della Porta S. Maria.","United with the monastery of Paradiso in 1658, and known thereafter as S. Cecilia in Paradiso.","The library catalogue ofÂ S. KatharinenklosterÂ , listing book donations to Altenhohenau, shows that the nuns here participated in the late firteenth-century book traffic.","In 1170 King Valdemar den Store gave the farm and church of Slangerup to a community of Benedictine nuns, to establish an abbey.[4] It was dedicated to Our Lady and Saint Nicholas at the suggestion of Absalon, Bishop of Roskilde. Valdemar moved his unmarried daughters to the abbey where they could be watched over and educated. The church became one wing of the cloister, in which the nuns were separated from the world. They had their own private entry to the choir of the church which was gated off from the rest of the congregation, who usually attended the church only on holy days. [5]\n\nIn 1187 a letter was written to Bishop Absalon, complaining that not all the nuns were \"virtuous\". This complaint led to the replacement of the Benedictine nuns with the new and strict Cistercian Order, which was seen as a reform. The original nuns either left or conformed to the new observance. Throughout the 13th-14th centuries, the abbey received many rental properties and gifts of money from noble families for services rendered by the nuns for recently departed family members or for burial inside the Church. They also received donations and allowances from families who sent unmarried women to live a quasi-religious life in the abbey until they married or took the vows of chastity, poverty, and obedience. By 1344, Princess Agnes Birgersdotter, the daughter of King Birger Magnusson and Queen Märta of Denmark, and her retinue were sent to live at Slangerup by King Erik VII. To ensure the abbey's continued existence it was given the town of Slangerup and several other large properties.","The foundation was primarily supported through income from villages of the parish of Eschlkam on the Bohemian border. ; The ministerial family of GrieÃŸenbeck belonged to the dependents of the convent.","1258: S. Maria de Gavillone (SeeÂ S. Maria de Gavillione e S. Juliana) & S. Julianna Toscanella (#S. Juliana Toscanella)","Among the goods in the conventâ€™s possession were a mill and several vineyards (414). ; In 1529, S. Lorenz absorbed the sisters of S. Magdalene vor Schottentor under the official approval of Archduke Ferdinand I. Founded in 1239 by Duke Friedrich II., the convent of S. Magdalene was threatened in the 16th century by the approach of Turkish hostile forces. In addition to their population, these fellow Augustinian canonesses brought their goods and income (Schimmer 413).","S. Clemente (Cambridge) in 1555","Combined the communities of S. Maria di Cortona (S. Maria di Cortona) & S. Juliana Toscanella (S. Juliana Toscanella) to become new community in 1258.","Founded in 1142 by Bishop Hartmann of Bressanone, the Augustinian Abbey of Novacella near Bressanone remains to this day the largest complex of religious and civil buildings in Tyrol. The monastery served primarily as a place of shelter for pilgrims coming from the north, not least due to its fortunate location along the Brenner route and the Val Pusteria road. At the same time, one of the major cultural centers also developed here, with a college and a rich library.","There is little information about the property and economic development of this convent.","The community had considerable holdings, especially in Helfta and Eisleben, including the churches of Augsdorf, Siebigerode, Katharinenhospital in Eisleben (1229). Helfta also took over the church in Schaafsee from Magdeburg in 1268. It acquired churches in Bennstedt and Wormsleben in 1298 and 1307 respectively. In 1400 it had the churches in Helfta, Neinstedt and S. Cyriaci in Reisdorf. ; The house was very wealthy.","During the 1420s, King Eric of Pomerania created Kronborg Castle, the castle immortalized in Shakespeare's play, Hamlet. It was built like a strong fortress for guarding Øresund and ensuring payment of sound dues which were enforced by the immediate firing of all cannons on any ship that refused to pay. It was very effective and collected two thirds of crown revenues. By the late Renaissance, tastes had changed and Kronborg's high walls and bastions made it impossible to have a grand renaissance garden. An old monastery north of the yard was therefore chosen as the new location and named Lundhave after the royal estate.","In 1506 this community united with S. Maria Maddalena di Valdipietra and the name changed to S. Caterina da Siena. Nuns from the Repentite house appealed to Pope Julius II to be allowed to return to their house and changed their name to S. Agostino.","The original location was partially destroyed, so the nuns moved to another location with nuns said to be from S. Agnese","Gained the congregation & church of S.Ambrogio from the bishop of Siena (1063). Gained the church and the well of S.Prospero in 1093","Hospital of Santa Maria della Scala (involvement): While not exclusively theirs, the early Jesuati, including Giovanni Colombini himself, were active in serving the sick at this great Sienese hospital.","The house had several castles, villas ,courts, ,vinyards, agricultural land, and woods (See \"contributor's notes,\" below)","Very wealthy, large patrimony, vast properties. Dominated by the family of Count Guidi, from before 1100 to the late 13th century.","The house had extensive holdings, including the church of S. Ilario in Puglia, which had been donated by the bishop of Arezzo in 1149 (See \"Early Documents,\" below).","Sacked by Luccan troops in 1325; Occupied by imperial troops in 1529","church dedicated in 1439","The house received a share of the properties of S. Jacopop di Ripoli (SeeÂ S. Jacopo di Ripoli) when members of that house founded S. Domenico.","The facility also served as hospital for the king's army until 1308, when King Haakon V established a hospital for this purpose at St Mary's Church, Oslo.","The conversion of Ottheinrich of Neuburg to Protestantism brought with it the alienation of many of the convent's rights and goods. ; The convent received numerous rich gifts and acquired wealth through the generous dowries of its inhabitants. ; The convent held numerous patronage rights in other parishes.","In 1218 during the conflict between Otto of Brunswick and Frederick II, Frederick destroyed the defenses of Quedlinburg. He later compensated the abbess with money for the remedy of his soul. Abbess Gertrude divided the income of the advocate and his functions into fragments which she then loaned, mortgaged, or sold to subadvocates. By the late thirteenth century, Quedlinburg had several advocates (McNamara, 269).","The convent was never very wealthy. The convent was frequently forced to sell its property, and in 1371 the number of nuns was restricted to fifty. The economic decline of the convent continued into the fifteeenth century.","After Easter 1243, Ulrich II of KÃ¶nigstein decided to bequeath his entire estate at Swinach to the beguines, while granting them the revenues from the property during his lifetime. His wife, Adelheid, and his daughter, Elizabeth, agreed to this arrangement, and the document was witnessed by Walter of Klingenburg, his son-in-law (Hindsley, xviii). In exchange the nuns prayed in perpetuum for the soul of the founder, his ancestors, and his descendants. Ulrich also expected the nuns to accept unmarriageable daughters and to establish a working scriptorium (Hindsley, xviii). Over the years the convent received gifts of land and dowries from the nuns who entered. The first account book of the monastery, dating from 1312, mentions 175 properties in 54 locations. By 1350 the nuns had added 70 more farms and estates. By the end of the thirteenth century, the monastery possessed almost the entire valley of Hammerbach (Hindsley, xx). The convent also benefitted from bequeaths of land made by the nuns of the convent (for example Adelheid Langmann, see above in social composition). ; According to the community's sister-book, the initial community performed the agricultural labor themselves. They cut the corn, washed, baked, and performed all the daily chores. The beguines also cared for the sick and poor in the surrounding area (Hindsley, xviii).","Countess Kunigunde provided the initial foundation with her acquired property in Grindlach, which included jurisdictional rights, an orchard, farm, and other possessions, in total worth approximately 5000 pounds (Krausen, 58). ; In the fourteenth century the convent struggled with economic difficulties caused by too great a number of inhabitants and building expenses. ; The parish of Gunzenhausen was incorporated into the convent by Pope Clemens VI in 1347.","In 1058Â HolzzelleÂ was transferred to the bishopric of Halberstadt by Heinrich IV and combined with DrÃ¼beck, although this union may have been quickly dissolved.","The community held the S. Mary-chapel and church in Domnitz.","Volkmar von Kemnathen granted the convent rights and property (?) in the parish of Dietkrich, in which the convent resided. ; Until the period of secularization, OberschÃ¶nenfeld held extensive property and was the cultural standard-bearer for the whole area of OberschÃ¶nenfeld and its settlements (Wienand, 338).","According to Cuneo, the nuns managed landholdings and properites and gained income from the manufacture of textiles. A document dated June 6, 1273 records the sale of a half of a farm in Eringen by the Prioress Gertrud with the support of the nuns of the community to Berthold Rucher in Kaufering, who in turn handed over his ownership of the Altar of S. Katharina (HÃ¶rmann, 301). On July 26, 1273 Ulrich, duke of Helfenstein, granted the sisters freedom from feudal duties (Lehnsfreiheit) for certain goods in Rumelsried, which had belonged to his vassal Heinrich (HÃ¶rmann, 301). On February 20, 1274 Bishop Hartmann gave the sisters fields. On February 28, 1277 the nuns received a third of the property in Buch from \"Schwigger and Heinrich von Mindelberch\" (HÃ¶rmann, 302). On October 7, 1278 Heinrich SchrÃ¶tele, judge of the episcopal court, sold the convent one farm and other properties in Thierdorf. On June 5, 1279 the sisters purchased a farm from Ulrich and Arnold von WÃ¶llenburg in the village of Bergen with the approval of Bishop Hartmann and the vicar of the cathedral. On August 6, 1279 Bishop Hartmann approved the sale of a farm belonging to his chuch in Bobingen by his vassals Heinrich and Grimold von Sevelt against a deposit of property in Ehingen (HÃ¶rmann, 302). On September 20, 1279 Bishop Hartmann permitted the convent to purchase from the sisters of the convent of HÃ¶rbruck the tithes from four fields. On March 12, 1280 S. Katharine's purchased from Heinrich and Friedrich von Freudertshofen property in Bobingen with permission from Bishop Hartmann. On December 29, 1282 King Rudolph von Habsburg freed a farm in Gablingen and one in Bobingen, which belonged to the convent, from their feudal duties (HÃ¶rmann, 302). On February 28, 1283 the convent purchased fields in Augsburg from the cathedral chapter. On August 18, 1283 Marquard von Kemnat handed over his property rights in a half of a farm in Bergen for one in Horgau, which Sebastian, a patrician from Augsburg gave to his daughter and he convent (HÃ¶rmann, 303). On December 6, 1283 the convnet purchased a farm in Inningen from Joh. Schongauer and on January 30, 1285 the convent received freedom from feudal dues for a farm in Inningen for a yearly payment to the cathedral chapter (HÃ¶rmann, 303). On may 13, 1286 Heinrich Schongauer gave the \"Mayrhof\" and a timberyard(?)in Holzhausen to the convent on condition that his daughter, a nun in the convnet, would be given 10 Shillings yearly from these holdings after his death (HÃ¶rmann, 303). In 1289 Heinrich von Mindelberch granted the convnent as compensation a farm in Mindelau and on June 18, 1290 he sold them a farm in Nassen. On January 29, 1291 Heinrich von Wolfberg relinquished his claims to the Mayerhof in Rumeltsried and a property in Kleinechsried. On Febraury 28, 1293 the Prioress Christina and the convent purchased a (lift?) in Eringen from Heinrich von Zeigershofen. On August 21, 1293 Wernhard von Hurenbach gave his daughter Sophie, a nun, property in Niederrammingen for her lifelong use and decreed that after her death the sisters Margaretha and Mechthildis should have the property for their use and after their death, it would fall to the convent itself (HÃ¶rmann, 303). In 1296 Margarethe, the prioress, and the sister purchased from Marquard, provost of Westerkitzigkofen, a farm in Dillishausen, which he had given to Michael, Hermann and Engelschalk von Rohrbach. In 1297, the prioress Tuta or Guta sold a yearly tithe of 13 Shillings to the chaplain of S. Katharina, Heinrich. In 1298 the convent purchased a farm from Sophie von Schwangau in Suntheim and a farm in Thierdorf from the brothers Menhofer. On March 12, 1298 Count Albrecht von Merstetten granted the convent farm properties in Thierdorf, which belonged by feudal tenure to the cathedral chapter, and the cathedral chapter freed this property from its feudal duties in exchange for a half of the yearly tithe (HÃ¶rmann, 304). On October 15, 1300 Ulrich von WÃ¶llenburg allowed his overseer to sell fields and farmland to the convent. On October 16, 1300 the convent purchased a farm in Lammerdingen from Sifrid von Wabern. On May 29, 1301 Bishop Walfard permitted the Count Conrad to exchange some fields along the path to GÃ¶gginger with the convent (HÃ¶rmann, 304). Haedwig and the convent purchased from Heinrich Ruch three properties in Erringen on March 17, 1303. In the same year the convent purchased a farm in Nassenbeuren from Conrad von Scheppach. On February 22, 1304 the convent purchased farm property in Rommelsried. on April 1, the Bishop Degenhart and others granted the farms in Erringen freedom from their feudal duties (HÃ¶rmann, 305). On October 21, 1301 Berthold Hurlocher sold a farm in Bobingen, in vassalage to the cathedral chapter, to the convent; the sale was confrimed on January 18, 1305 by the provost of the cathedral chapter, Egeno, and the deacon, Rudolf von Hurnheim. On February 18, 1306 the convent purchased a property in Thierdorf from Conrad Zollner. On February 4, 1309, the Count Conrad, with persmission of his overlord, the cathedral deacon, sold the convent two farm properties in Thierdorf and a field before the door of GÃ¶ggingen (HÃ¶rmann, 305). On June 25, 1311 the convent purchased farm properties in Holzhausen from Heinrich Schongauer. On February 14, 1312 Hermann and Gottfried von Wellenburg granted a farm in GÃ¶ggingen to the convent. On July 16, 1317 the convent purchased a farm in Zusamm-Altheim from Heinrich Portner for 65 Marks and 30 Shillings and another farm for 70 Marks, less 33 pennies (HÃ¶rmann, 306). In December 1318 the convent purchsed two farms in Grosskitzighofen from the convent Steingaden. On May 31, 1319 the sisters purchased a farm in Suntheim from the convent in Munich for 23 Marks. On November 24 of the same year Johannes Langenmantel granted the convent some farm property and an (income?) in Inningen, on account of his sister Anna, a nun in the convent (HÃ¶rmann, 306). In 1322 the convent purchaed a property in Haimeneck and another from Heinrich, provost of Erringen. On May 26, 1322? Johann von Rosenstein and the convent of Erringen sold a house in the Catharinen-street to the convent. On January 8, 1323 Heinrich of Zusammecker, a religious of St. Georg (with the permission of his provost) sold to his sisters Margaretha and Anna, who lived in the convent, a house, farm and storeroom; the convent also promissed that it would grant 6 Marks yearly for the Elsbeth (HÃ¶rmann, 307). On March 1, 1323 Heinrich Wizinger sold a farm in GÃ¶gginen to Agnes, countess von Burgau, a nun of the community. On March 30, he sold a a farm in Hiltefingen to the convent. On May 4, 1323 the sisters purchased a farm in Inningen from Heinrich Herbort. The convent also purchased properties in Gammenried von Conrad Masser von Dirlewang in the same year. On March 21, 1325 the prioress and the convennt forged a confraternity with two sisters, Adelheid and \"Hille\" from the convent of Heligen Grab to perform vigils and Masses and therefore would grant 10 Shillings from the income in Inningen and 3 Shilling from properties in Muehlhausen for wine (HÃ¶rmann, 307). In 1326 the convent received a farm from Wernher Hug in Obermeitingen. On March 24, 1333 the convent purchased from Wernher Drexl a farm and forest areas? in Hiltenfingen for approximately 90 Marks. On April 30, 1333 the convent purchased property in Unter-Meitingen from Conrad Rehlinger, and a farm in Hiltenfingen and another in GÃ¶ggingen from Heinrich Wissinger. On July 3, 1333 Conrad Porner gave the convent a garden before the door of Holy Cross, from which Adelheind, a nun, would receive a yearly tithe (HÃ¶rmann, 308). On November 21, 1333 the convent purchased tithes from a field near Augsburg. On October 2, 1337 the convent purchased a farm in Zusamaltheim for 70 Marks from Heinrich Portner. On July 13, 1338Â MedingenÂ sold a farm in Steinheim to the convent for approximately 130 Marks and 19 Shillings. On December 13, 1341 the convent purchased four properties in Lamerdingen from a certain Elisabeth for approximately 20 Marks and 10 Shillings. On March 12, 1344 the convent again purchased a small property in Michelmat fromÂ Medingen. On May 7, 1344 the convent purchased a property in Ziemetshausen from Heinrich Herbot, and on July 21, 1344 the convent made an agreement with Agnes von Laugingen for the use of a farm in Untermeitingen for the sister Agnes (HÃ¶rmann, 309). On August 31, 1344 the convent purchased some fields between Augsburg and GÃ¶ggingen from Heinrich Portner for approximately 274 Marks. On November 19 of the same year the convent received nine more fields from Heinrich Portner. On January 26, 1345 the convent purchased a property in Modelshausen and four farms in Laugna from Conrad von Lauterbach for 28 Marks and 10 pennies. On November 23, 1346 the convent purchased three farms in Lugna from Luipold Negelin and on December 15 of the same year the convent sold a farm in Gablingen to the nuns Adelheid Gerutin and Adelheid Portner (HÃ¶rmann, 309). On July 22, 1351 Prioress Agens and the convent purchased a tithe in GÃ¶ggingen from Gertraud Otterin. Circa 1353 margravine Agnes bequeathed to the convent after her death: two farms in GÃ¶ggingen and Schwabeck in return for a Vigil and Mass to be held for her memorial yearly, she also provided for the wine and fish for the convent (on this occassion?); she provided further money for the celebration of memorials for her parents and relatives and for the king and queen of Hungary; she provided an annual allotment of 10 Shillings on Easter; she bestowed from a farm in Schwabeck for the provision of an eternal light for her grave rye, and other goods. She further appointed two nuns named Adelheid to serve as caretakers of her memorial, who should be replaced after their deaths by two more appointed by the prioress and convent. The use of a farm in Hiltenfingen fell to the two nun-caretakers and fell to the convent after their deaths. The nun-caretakers also recieved her cell in the dormitory and her chamber in the infirmary, which she had built at her own expense, as their dwellings and for their own use. She left her \"livingroom\" to the prioress. The chamber belonging to the caretakers should also be shared with any relative of Agnes' within the third degree who decided to enter the convent (HÃ¶rmann, 310-311). On July 14, 1355 the convent purchased two properties in Ober and Untermeitingen from Ulrich Kartinchen and on November 18 the convent purchased a farm in Hurlach from Gisela Welserin. On March 29, 1356, the convent purchased four farms in Orlfingen from Walter Rott. On June 12, 1357 the convnet received several properties from Berthold Riederer in Altenbaindt and afterwards purchased from him a farm in Eisenbrechtshofen. In 1359 the convent continued to acquire lands: a farm in Thierdorf and four farms in Weissingen from Hartmann Onsorg. On July 3, 1363 Prioress Adelheid decreed four new memorial-days in exchange for the acquisition of farm property in Nordendorf. The four memorials were for: Guta von Lauingen and her relative Elisabeth, Hans Argau and his wife, Katharina Rieder and her sister Anna of Lauingen, and one for her sister Anna and her parents (HÃ¶rmann, 312). On May 10, 1365 the convent purchased a fram from Karl Gollenhofer in Erringen and another in Bobingen from Adelheid Bursnerin in November. On December 17, 1369 the convent purchased farm property in KnÃ¶rringen from Conrad von KnÃ¶r; on November 29, 1271 it purchased a property in Kleinkitzgkofen from Conrad von Wabern and on December 4 of the same year, it received a garden in Untermeitingen from Conrad Neumayr. On February 6, 1376 the convent recieved a farm in Grosskitzighofen and a garden in Schwabmenchingen. Under Pioress Elisabeth von Argon the convent purchased a farm in GÃ¶ggingen on May 30, 1377. On April 19, 1379, it purchased farm property in Orlfing and a mill in Pfaffenhausen and another property in SchÃ¶nenach (HÃ¶rmann, 313). On August 19, 1382 the convent purchased two farms in Schwabmuenchen from Anna Renzin. The convent also purchased property in WÃ¶rishofen, a mill in Gamenried and another property in Schonspach in 1382. Under prioress Anna Dach, Wilhelm left the convent a pasture and garden in Wertach. On November 29, 1400 the convent received a garden in the parish of S. Stephans from Jos Heldenberger (HÃ¶rmann, 314). In 1402 the convent purchased property and two farms in Obermeitingen from Hans Algerzhofer. On July 15, 1406 the convent purchased a property in Ustersbach from Peter VÃ¶gelin, and in 1410 Anna Werishoerin established an eternal light and added a farm in Werishofen as well. In 1411 the convnet purchased a farm from Lorenz Rieder. On October 16, 1415 the convnet purchased a farm in Weissingen from Wernher Rosshaupter von Luagingen. On October 27, 1416 the convent obtained freedom from feudal duties for a farm in WÃ¶rishofen from Duke Ulrich von Teck and purchased from Heinrich Schellenbold a farm (HÃ¶rmann, 315). On November 21, 1437 the convent purchased a farm property in Schwabmuenchen from Hartmann Ehinger of Ulm through its provost Stephan Hagenor. Under Prioress Afra the convnet purchased a farm in Schwabmuenchen from Ulrich Kinzelmann for approximately 1900 fl. Circa 1440 the Augsburg patrician Hans VÃ¶gelin bestowed a farm property and the advocacy of a fiefin Pliensprach for the two nuns Lucia and Afra Langenmantel, who were his sisters (HÃ¶rmann, 317). On August 28, 1454 the convent purchased a farm in Ropeltshausen from Georg von Ellerbach for 520 fl. and on February 5, 1457 it purchased a farm in Heudaorf from Wilhelm Schenk (HÃ¶rmann, 318). On October 9, 1461 the convent purchased a property from the abbot and convent of the Holy Cross in DonaruwÃ¶rth. On December 20, 1466 the convent purchased a farm property in Dillishausen from the abbot and convent of Irsee fro 275 Marks (HÃ¶rmann, 318). On January 20, 1486 the convent purchased a farm in Dillishausen from Erhard Eberhard. Prioress Elisabeth died on June 12, 1490 and bequeathed to the convent a perpetual tithe and other goods (HÃ¶rmann, 319). Under prioress Walter the convent purchased on October 4, 1490 pasture before the \"red gate\" from Jakob Rehlingen. Under prioress Welser and her predecessor Anna Walter (late fifteenth century), the convent purchased large tracts of land in and around Augsburg (Cuneo, 23). The convent was continually enriched through the bequests of its nuns, who were allowed to own their own property and goods. For example in 1495 the death of the nun Anna Riedler left the convent with a yearly tithe of 4 fl. in Ulm and a pasture in Lechhausen. On December 4, 1502 a memorial was established for Ulrich Walter, a citizen of Augsburg, his wife Barbara, Anna Walter (the prioresss) and Maria Walter, a nun at S. Katharina, with a choral Mass and vigil. In return, Walter gave the covent a green silk robe and two choir robes and a painting (HÃ¶rmann, 319). ; By the late fifteenth century, S. Katharine's was one of the wealthiest of the city's seven convents. S. Katherine's wealth and status was protected by various papal and royal privileges that had accrued to the convent since the thirteenth century. Despite Dominican rules, the nuns at S. Katherine's were allowed possession and control of personal items, properties, inheritances, gifts, and other sources of income (Cuneo, 23). In the late fourteenth century, despite the vast acquisitions of the convent, the income was not sufficient to cover the expenses of the nuns. ; In 1293 the convent forged an agreement with the community of GÃ¶ggingen for the rebuilding and repair of the Wertach-bridge and the yearly fee from it (HÃ¶rmann, 303).","The foundation of the convent was followed by donations from the founding family and surrounding nobles. In the fifteenth century the abbesses faced several disputes over the convent's properties. ; The convent became a pilgrimage spot for the Holy Trinity, making the convent wealthy. ; The parish of Pretzfeld was incorporated under the convent.","The parishes of Gerhardshofen and Unterlaimbach as well as FrÃ¼hmesser in Dachsbach were bound to provide feudal duties to the convent. ; The convent's wealth was doubtless increased by the dowries of women entering the community (Krausen, 33). In July 1379 Cardinal Pileus, the abbot of Ebrach granted permission for the absolution of nuns admitted through simony in several convents, among them Birkenfeld (Krausen, 33).","The convent acquired landholdings through gifts and purchases. By the fifteenth and sixteenth centuries the convent's aquisition of land halted. The convent primarily held property in and around the city of Braunschweig. In 1245\u002f49 the convent held 22 hides, a farm, and a parish in the west half of the city. In 1256 the ministry official Bertram \"the elder\" von Veltheim gave the convent four hides in Gevensleben free from advocacy on the occassion of the profession of his two daughters (RÃ¶mer-Johannsen, 70). In the fourteenth century the convent acquired three mills, and a portion in the Lueneburger saltworks, as well as a fish-farm(?) (RÃ¶mer-Johannsen, 71). In 1370 Duke Magnus II declared that in the future no knight or princely advocate could take food or feed from the convent or its farms (RÃ¶mer-Johannsen, 71). The convent also held possessions in the areas of Lamme and in Lehndorf (in the city of Braunschweig) on the Heerstrasse toward Hannover; it had important possessions in Wedtlenstedt (in 1270-1284: 19 hides, 8 farms) and Zweidorf (RÃ¶mer-Johannsen, 82). In Welkeleghe the convent had two hides in 1271 which were sold in 1319. In 1329 it had rights over the forest in Dutzem; in 1355 it had four hides in this location (RÃ¶mer-Johannsen, 82-3). The convent also had possessions in Bortfeld ( in 1312 five and a half hides and farms), in Voelkenrode, and Wendeburg. In 1269 the convent held three hides in Denstorf. In Lamme in 1315 the convent held two farms, four hides and their dependents, and in 1322 it received rents from three hides. In 1343 the convent records six hides in Vallstedt; in Sonnenberg from 1379-1756 it held five hides and a farm. In the area of the city of Salzgitter, the convent held two hides in 1254 in Lobmachtersen, and in 1309 income from two hides. In 1283 it held a hide in Watenstedt, and from 1448-1753 the convent received tithes from two farms in Heerte. In the area of WolfenbÃ¼ttel the convent also held property. In Weferlingen it held four hides in 1268, two farms and seven hides in 1331. In Evessen the convent held from 1395-1423 a portion of the income of the knightly farms (nine hides) for the Mary-Magdalene altar (RÃ¶mer-Johannsen, 83). In Watzum south of Schoeppenstedt it held three hides in 1262 and four and a half hides, two farms, and fields in 1312. In Bisdorf on the Flur Barnstorf the convent held a hide in 1285 and two hides and two 'areas' in 1314. In Achim the convent had two hides in 1297 which it sold in 1355 to the convent of Neuwerk in Goslar. From 1359-1361 the convent had ten hides in Klein Biewende, and from 1365-1373 it had a farm with one and a half hides in Berklingen. In Wetzleben the convent held three hides from 1387-1389. In Gevensleben am Heeseberg the convent possessed twenty and a half hides from 1256-1343. In 1282 it acquired seven and a half hides here. In 1358 it recieved taxes from a farm with a half a hide. In Volkmardorf between Neubrueck and Didderse the convent held two hides bestowed by Duke Albrecht. In Rethem an the Aller west of Celle the convent held five hides, a farm, and a forest complex in 1301 (RÃ¶mer-Johannsen, 84). In the fifteenth century the convent suffered under the alienation of some of its property. In 1432 certain possessions were ordered to be returned to the canons of S. Cyriacus by Pope Eugen IV (RÃ¶mer-Johannsen, 72). Nevertheless, the convent was able to retain much of its landed possessions up to the present day (RÃ¶mer-Johannsen, 81). The convent had mills in Weferlingen in 1270 and 1331, in SchÃ¶ppenstedt in 1309, a windmill in Braunschweig in 1310, and a water mill in Wahle from 1335-1584 (RÃ¶mer-Johannsen, 84-5). The convent also received fees from the mills in Braunschweig, Eitzum, Lobmachtersen, and Erkerode. The convent possessed half of the fishing area in the Oker from the 'door of Peter' in Braunschweig to the \"Pfahldorf\" Oelper. In 1365 the convent acquired a portion in the LÃ¼neburg saltworks from the Benedictine monastery of S. Michaelis in LÃ¼neburg.","In 1344 Kitzingen received patronage rights over the parish church of Darstadt. ; At the request of the Counts of Henneberg and Castell, the abbess was permitted to enjoy the income of the convent's parishes for two years, since the convent had suffered economically from wars (in the mid-thirteenth century). The parish of Kitzingen was incorporated into the convent at this time (Klosterbuch der Diocese Wurzburg., 562). In 1284 Pope Martin IV ordered the provost of Bamberg to secure the convent's alienated property for the convent again. It is likely this property was alienated under the protectorate of Friedrich of Hohenlohe. Hospital .  Bishop Heinrich allowed the nuns to eat meat as well as change their habits from white to black. During this period the convent had grown lax and Bishop Otto of Bamberg reestablished order within the community (Klosterbuch der Diocese Wurzburg., 561).","The founder donated a great deal of money, as well as houses and servants. The first 3 abbesses both leased and acquired much property.","church within Lucca, plus property around and behind it","property was returned to Abbess Cecilia of S. Maria di Pontetetto (SeeÂ S. Maria di Pontetetto) [c. 1187?]","Had very few assets. May have requested alms c. 1308.","The convent's possessions consisted of 771 acres of fields, 567 acres of meadow, and 1051 acres of forest (Link, 607). The convent also held rich possessions in the surrounding villages. ; The convent experienced financial difficulties during the sixteenth century, particularly due to the peasant's war.","In addition to the rich lands that the convent held in Zimmern, it also held patr
