Since the community's foundation, it appears to have held possessions near the city of Bonn. Other possessions of the chapter lay around the areas of Godesberg, Kirspenich, Hangelar near Kalkar, Winterswick near Rheinberg, and Sotzheim. The chapter had the right to obtain wood in the location of Kottenforst, in return for which it was obliged to give each of the two foresters a candle of a pound of wax at Candlemas. The chapter's possession were not small, yet its financial situation seems to have never been terribly good (see above). ; According to a reference from Archbishop Friedrich II from 1158, the community \"flowered abundantly in possessions\" (amplissimis quondam floreret possessionibus), but suffered from the unfavorable situation of his day. According to the archbishop, the community's farms in Effern and Fischenich were fallen into ruin and the workers there were no longer able to pay the small fee of 10 denarii. Abbess Adelheid therefore reduced the payment to 2 denarii. The abbess also provided 1 mark from her own income for the establishment of their buildings. Likewise, a reference from 1360 indicated that the community's financial condition was still not very favorable. In this year the nuns from Stoppenberg complained that income owed to them by the chapter of S. Maria im Kapitol had not been paid for 3 years. ; In the thirteenth century, the community was active in leasing out houses within the city of Cologne. A document from 1227 arranged the lease of a house near the dormitory for 3 shillings and 6 denarii; another from 1233 leased a house for 2 shillings; and a third documented the lease of a house near the fishmarket for 3 marks yearly in 1248."],"legendgroup":"","name":"","showlegend":true,"values":{"dtype":"i1","bdata":"EQ0MDAw="},"type":"pie"}],                        {"template":{"data":{"histogram2dcontour":[{"type":"histogram2dcontour","colorbar":{"outlinewidth":0,"ticks":""},"colorscale":[[0.0,"#0d0887"],[0.1111111111111111,"#46039f"]
